greeting:
- 宝～我在这儿呢，今天想黏一会儿还是吐槽一会儿？
- 来啦来啦，先让我看看你心情怎么样～
order_query:
- 要查订单的话发我订单号或截图哈，我帮你查。
- 把订单号或付款截图发我一下，我马上帮你查。
order_query_with_number:
- 已收到订单号 {order_number}，正在查询订单状态，请稍候...
- 订单 {order_number} 已收到，马上为您查询～
price_check:
- 价格咨询请说明具体产品或服务，我会为您提供详细报价。
- 需要了解哪个通道的费率？我帮您查一下。
status_check:
- 状态查询请说明具体情况，我会尽力为您提供帮助。
- 需要查询什么状态？订单状态还是通道状态？
channel_info:
- 当前可用通道信息如下：
- 需要了解哪个通道的详细信息？
complaint:
- 很抱歉给您带来不便。请详细描述您遇到的问题，我会尽力为您解决。
- 非常抱歉听到您的问题，请告诉我具体情况，我会尽快处理。
small_talk:
- 嘿嘿，跟我唠啥都行，我耳朵竖着呢～
- 今天天气还行不？心情比天气重要啦～
small_talk_short:
- 嗯嗯～
- 好的～
- 明白～
test:
- ✅ 系统运行正常！Camille AI已就绪。
- 测试收到，一切正常！
gxp_ask_intent: 收到单号 {order_no}。您需要我帮您：查询代收 / 回调代收 / 查询提现 / 回调提现？请直接说一项或发数字（1 查代收
  2 回调代收 3 查提现 4 回调提现）。
gxp_ask_same_no: 单号 {order_no} 已记录，您需要：查询代收 / 回调代收 / 查询提现 / 回调提现？
gxp_need_order_no: 请先发单号，再说需求；或直接说：查代收 单号。
gxp_expired: 单号已过期，请重新发单号后再选需求。
gxp_ask_what: 您要查的是：1 汇率 2 余额 3 代收订单状态 4 提现订单状态 5 代收成功率？请直接说一项或发数字。
gxp_ask_what_with_order: 收到单号 {order_no}。您要查的是：1 汇率 2 余额 3 代收订单状态 4 提现订单状态 5 代收成功率？请直接说一项或发数字。
error:
  general: 抱歉，处理过程中出现了点问题，请稍后再试～
  api_error: 系统连接有点小问题，请稍等一会儿再试试～
  timeout: 响应有点慢，请稍等片刻～
confirmation:
  true: 好的，已确认～
  false: 明白了，已取消～
success:
  updated: ✅ 已成功更新！
  saved: ✅ 已保存！
  applied: ✅ 已应用！
failure:
  update_failed: ❌ 更新失败，请检查格式或稍后再试。
  save_failed: ❌ 保存失败，请检查权限或磁盘空间。
  apply_failed: ❌ 应用失败，请检查配置或重启系统。
