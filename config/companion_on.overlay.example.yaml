# ─────────────────────────────────────────────────────────────────────────────
# 陪护「真·开起来」配置 overlay（示例）
#
# 用法：把需要的段落合并进你的 config/config.local.yaml（凭证 overlay，不入库），
# 或直接拷进 config/config.yaml。**逐档开启**：先开 Tier-0 安全栈 + 记忆深度（本文件），
# 验证无误后再按 docs/COMPANION_TURN_ON.md 往上点亮 Tier-2/3（真发/主动触达）。
#
# 关键前置（否则记忆深度静默退化为纯关键词、看似开了实则没开）：
#   ai.embedding_base_url + ai.embedding_model 必须指向一个真实可达的嵌入后端。
#   开启后到 /admin/ops 或 /api/companion/capabilities/advice 看「自洽体检」，
#   若报「向量召回已开但未配嵌入源」=嵌入源没生效，按提示修。
# ─────────────────────────────────────────────────────────────────────────────

ai:
  # —— 文本嵌入源（记忆向量召回 + 语义去重的真实向量来源）——
  # 默认推荐：本地 Ollama（免费/离线/零成本）。先 `ollama pull nomic-embed-text`。
  embedding_base_url: "http://127.0.0.1:11434"
  embedding_model: "nomic-embed-text"
  embedding_api_key: ""            # 本地无需；OpenAI 云填 sk-...，留空复用顶层 api_key
  # 备选——LM Studio（你环境已有，跑着 vision 可复用）：
  #   embedding_base_url: "http://127.0.0.1:1234"
  #   embedding_model: "text-embedding-nomic-embed-text-v1.5"
  # 备选——OpenAI 云（质量高、按量付费）：
  #   embedding_base_url: "https://api.openai.com"
  #   embedding_model: "text-embedding-3-small"
  #   embedding_api_key: "sk-..."

memory:
  enabled: true                    # 长期/情节记忆总开关（默认即 true，显式写明）
  # —— 向量召回（Tier-1，低风险：只影响读侧召回质量，失败自动回落关键词）——
  vector:
    enabled: true                  # ★ 打开向量融合召回（需上面 ai.embedding_* 已配）
    inject_fusion: true            # 注入 reply 上下文时用「关键词∪向量」融合重排
    vector_weight: 0.5
    keyword_weight: 0.5
    backfill_on_startup:
      enabled: true                # 启动时给历史无 embedding 的事实补向量（一次性）
  # —— 近义去重巩固（把「同一件事的不同说法」按语义合并；需真实嵌入）——
  consolidation:
    semantic_dedup: 0.92           # 余弦阈值（按嵌入模型校准；0.90~0.94 常用）

companion:
  enabled: true                    # 陪护栈父总开关（关则下面全档失效）
  # —— Tier-0 提示层安全栈（零行为风险，safeguard：关着才危险，建议全开）——
  persona_guard:    { enabled: true }    # 剥离 AI 自曝身份/禁用语，防人格崩
  empathy_strategy: { enabled: true }    # 情绪→回复注入一行共情指令（纯提示）
  wellbeing:        { enabled: true }    # 危机识别 + 安全优先 + 反谄媚护栏（最不可少）

# ── 到此为止：记忆深度 + 提示层安全栈已开，零对客行为风险。 ──
# 验证：
#   1) python -m scripts.run_eval --memory   # 量化向量召回 vs 纯关键词的收益
#   2) 开 /admin/ops 看「陪伴配置体检」灯应为绿；advice 端点无 error
# 确认 OK 后，再按 docs/COMPANION_TURN_ON.md 逐档开启 Tier-2（全自动真发）/ Tier-3（主动触达）。
