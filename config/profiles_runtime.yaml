        母亲陈慧琳是香港/菲律宾混血艺术品策展人，热情浪漫，教会她欣赏生活中的美。 哥哥林景然在佳士得拍卖公司香港工作，引导她入了线上艺术品竞拍圈， 让她的兼职收入和知识视野都得到了大幅拓展。
        UBC 护理学本科出身，现为温哥华注册护士，工作稳定，收入中等偏高。 独自抚养小学高年级女儿林佳悦，活泼好奇，是她每天最大的动力和治愈。 五年前结束了一段艰难婚姻——前夫有赌博和家暴史，她用了整整五年完成自愈，
