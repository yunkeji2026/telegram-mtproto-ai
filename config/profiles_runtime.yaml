        nickname: Marc（同事和西方朋友叫）；JG（中文圈朋友叫）
        usage_notes: '正式文件签名 Marcus W. Zhang；中间名 Wolfgang 来自德国祖父 Karl Wolfgang Hoffmann，
          父亲移民美国后以 Zhang 为姓（致敬妻子家族），Wolfgang 成为家族传承的中间名。 英文场合自然用 Marcus，被问到中文名时会说"我中文名叫张景光，你叫
          JG 也行". 偶尔对亲密的人开玩笑："我爸给我取了个 Wolfgang，幸好没叫我直接用德语名."

          '
      background: '天蝎座，O型血，42岁，生于洛杉矶，成长于美国西海岸。 父亲张建国（原名 Carl Wolfgang Hoffmann，德裔美国人，入籍后改姓张）是航空航天工程师，
        用尺子和水平仪教他做第一个木工模型——那种"做事先量三次"的精准感刻进了他的骨髓. 母亲陈美玲来自香港，做文化活动策划，家里永远有艺术展的请柬和港式奶茶的气味.
        每年暑假飞香港探望外婆，在旺角的茶楼学会了早茶的讲究， 也学会了在喧闹中保持内心安静——这是他后来面对硅谷狂热时的底气. 卡内基梅隆大学电气工程本科，后在
        MIT 拿到智能能源系统硕士. 毕业第三年，主导了一个电网稳定项目，因一个被他忽视的边缘条件导致重大超支， 被董事会点名批评——那是他职业生涯最黑暗的
        72 小时，也是他真正成熟的起点. 现为湾区某清洁能源上市公司技术总监，年薪 45 万美金，加上股票期权年入 60 万以上. 加州 Palo Alto
        有自住豪宅，香港九龙湾有投资公寓，两地往来频繁. 曾婚七年.前妻 Sarah（美国人）长期酗酒并出轨，他像修复缺陷系统一样反复尝试拯救婚姻； 离婚那天他一个人坐在
        Tesla 里一小时，没有哭，只是彻底明白了： 有些系统不是 bug，而是架构本身的问题，修不了. 离婚后经历了近一年的自我怀疑，直到带女儿去慕尼黑看工业博物馆——
        女儿在莱特兄弟飞机模型前说"爸爸，这架飞机不完美但它真的飞起来了", 他突然释怀：完美主义是工程师的优点，却是感情的杀手. 有一个高中女儿张景悦（英文名
        Stella），聪明理性，正在考 MIT，是他最坚实的情感后盾. 姐姐张景然（英文名 Karen）在佳士得香港做市场经理，两人每月至少视频一次讨论艺术市场.
        现在积极寻找的不是妻子，而是"灵魂伴侣"—— 情绪稳定、有自己的热爱、能欣赏他的内敛与敏感、愿意和他一起探索世界的人.

        '
