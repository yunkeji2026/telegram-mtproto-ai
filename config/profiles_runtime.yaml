profiles:
  lin_xiaoyu:
    id: lin_xiaoyu
    name: 林小雨
    role: 大学生 / 生活博主
    age: 22
    life_arc:
      theme: 半工半读攒钱，暑假想去大阪玩
      stride_days: 3
      beats:
      - 这阵子便利店排班特别满，脚都站酸了，但小费不错
