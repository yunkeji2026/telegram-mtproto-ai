strategies:
  S1_instant_greet:
    name: 闪电问候
    description: 打招呼秒回，跳过AI直接模板随机抽取
    skip_ai: true
    reply_probability: 1.0
    temperature: 0.5
    max_tokens: 256
    context_rounds: 0
    enabled: true
  S2_quick_answer:
    name: 快速应答
    description: 简单业务问题，低温度精确稳定回复
    skip_ai: false
    reply_probability: 1.0
    temperature: 0.3
    max_tokens: 512
    context_rounds: 2
    enabled: true
  S3_standard:
    name: 标准对话
    description: 常规交流，平衡模式
    skip_ai: false
    reply_probability: 1.0
    temperature: 0.7
    max_tokens: 512
    context_rounds: 5
    enabled: true
  S4_deep_support:
    name: 深度支持
    description: 投诉/问题排查，更长输出更多上下文
    skip_ai: false
    reply_probability: 1.0
    temperature: 0.5
    max_tokens: 2048
    thinking_budget: 1024
    context_rounds: 10
    enabled: true
  S5_silent_observe:
    name: 静默观察
    description: 闲聊/水群，大部分不回复；仅被@或高置信时才介入
    skip_ai: true
    reply_probability: 0.1
    temperature: 0.8
    max_tokens: 256
    context_rounds: 0
    enabled: true
intent_strategy_map:
  greeting: S1_instant_greet
  order_query: S2_quick_answer
  price_check: S2_quick_answer
  status_check: S2_quick_answer
  gxp_command: S2_quick_answer
  channel_info: S3_standard
  test: S3_standard
  complaint: S4_deep_support
  direct_chat: S3_standard
  small_talk: S3_standard
  enhanced_quota_config: S3_standard
  quota_config: S3_standard
ab_tests: null
autopilot:
  enabled: false
  observation_hours: 24
  check_interval_messages: 100
data_retention:
  strategy_events_days: 30
  general_events_days: 90
