# 引流话术合规巡检规则。
# 渲染后的话术发送前走一遍这里的规则——命中任一 blocked_keyword 直接拒发；
# 命中 warn_keyword 允许发但打审计标。
#
# 这些关键词是"运营自定业务层面不希望在引流里出现"的——
# 场景：情感陪聊引流，不能越界变成客服/交易/金融话术。

blocked_keywords:
  # 金融/交易类（引流场景严禁）
  - 下单
  - 付款
  - 收款
  - 打款
  - 银行卡
  - 转账
  - 投资
  - 返利
  - 博彩
  - 彩票
  # 明显违法
  - 毒品
  - 违禁
  - 色情

warn_keywords:
  # 客服味过重——陪聊场景不要
  - 客服
  - 人工服务
  - 业务办理
  - 竭诚为您
  # 金钱暗示——需要人工审
  - 红包
  - 打赏

max_length_chars: 240       # 太长不自然
min_length_chars: 10        # 太短没诚意
