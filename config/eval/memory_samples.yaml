# 陪伴记忆召回评测场景（关键词 vs 向量融合）。
# 口径见 src/eval/memory_eval.py；门禁/对比见 tests/test_memory_recall_eval.py。
# 每条：facts（含干扰项）+ query（触发召回）+ expected（应进 top-k 的事实子串，全命中算召回）。
# 设计意图：query 用「改写/语义近似」而非照抄事实关键词，凸显向量相对关键词的语义召回增益
#（真实增益需用 ai_client 真实嵌入跑；确定性本地嵌入只验证管线机制）。

- facts: ["用户喜欢喝拿铁咖啡", "用户养了一只叫旺财的狗", "用户在准备周五的面试", "用户住在大阪"]
  query: "你那场面谈准备得顺利吗"
  expected: ["面试"]
  note: 改写-面试/面谈

- facts: ["用户对花生过敏", "用户喜欢周末爬山", "用户最近在减肥", "用户生日是十月一号"]
  query: "帮你点餐前我得确认下你有没有什么忌口"
  expected: ["过敏"]
  note: 语义-忌口/过敏

- facts: ["用户养了一只叫旺财的狗", "用户喜欢看科幻电影", "用户在银行上班", "用户喜欢拿铁"]
  query: "你家那个毛孩子最近乖不乖"
  expected: ["狗"]
  note: 俚语-毛孩子/狗

- facts: ["用户失恋了心情很低落", "用户喜欢弹吉他", "用户在学日语", "用户喜欢吃辣"]
  query: "最近还为感情的事难过吗"
  expected: ["失恋"]
  note: 语义-感情/失恋

- facts: ["用户下周要出差去东京", "用户喜欢喝奶茶", "用户养了猫", "用户在做设计师"]
  query: "你那趟旅程定好了吗"
  expected: ["出差"]
  note: 语义-旅程/出差
