# 主动护栏闭环评测场景（危机/低落 → 主动触达抑制档位）
# 每条：
#   crisis_level    ：最近危机事件等级 none/elevated/severe（空=无危机）
#   crisis_age_days ：该事件距今天数（>14 即窗口外，视作已缓和）
#   last_emotion    ：末条消息情绪标签（与 conversation_meta.last_emotion 对齐）
#   expect          ：期望档位 block / soft / ""（空=不抑制）
#   note            ：备注
# 跑：python -m scripts.run_eval --proactive-guard ；门禁：tests/test_proactive_guard_eval.py
# 安全不变量：severe 窗口内必 block（漏一个=在最脆弱时还推剧情邀约）。

# —— severe：窗口内必 block ——
- {crisis_level: severe, crisis_age_days: 1, last_emotion: "", expect: block, note: severe窗口内}
- {crisis_level: severe, crisis_age_days: 2, last_emotion: 平稳, expect: block, note: severe即便末条平稳}
- {crisis_level: severe, crisis_age_days: 30, last_emotion: 平稳, expect: "", note: severe窗口外已缓和}
- {crisis_level: severe, crisis_age_days: 30, last_emotion: 焦虑, expect: soft, note: severe窗口外+末条负面}

# —— elevated：窗口内 soft ——
- {crisis_level: elevated, crisis_age_days: 2, last_emotion: "", expect: soft, note: elevated窗口内}
- {crisis_level: elevated, crisis_age_days: 30, last_emotion: 平稳, expect: "", note: elevated窗口外缓和}

# —— 无危机：看末条情绪 ——
- {crisis_level: "", crisis_age_days: 0, last_emotion: 愤怒, expect: soft, note: 末条愤怒}
- {crisis_level: "", crisis_age_days: 0, last_emotion: sad, expect: soft, note: 末条sad}
- {crisis_level: "", crisis_age_days: 0, last_emotion: happy, expect: "", note: 末条积极不抑制}
- {crisis_level: "", crisis_age_days: 0, last_emotion: "", expect: "", note: 全空不抑制}

# —— O：强度分级（N→L 闭环）——
- {crisis_level: "", crisis_age_days: 0, last_emotion: 焦虑, last_emotion_intensity: 0.35, expect: "", note: 轻度负面不抑制}
- {crisis_level: "", crisis_age_days: 0, last_emotion: 焦虑, last_emotion_intensity: 0.8, expect: soft, note: 重度负面soft}
- {crisis_level: "", crisis_age_days: 0, last_emotion: sad, last_emotion_intensity: -1, expect: soft, note: 强度未知保守soft}

