# HY-MT（ollama_mt）宽语种回译评测集：覆盖 Hunyuan-MT 模型卡内本业务高频目标语。
# 用法：python -m scripts.run_eval --translation --xlate-engine ollama_mt \
#         --dataset config/eval/translation_samples_hymt.yaml
# 口径：src→tgt→src 回译相似度（temp=0 可复现）。与默认 10 条集分离——
# 默认集保持 DeepL/Google 可评的窄语对（门禁契约），本集专门给本地 MT 拿宽覆盖硬数字。

