# Telegram MTProto AI Chat Assistant 配置文件
# 请复制此文件为 config.yaml 并填入实际值

# Active domain pack (directory name under domains/)
domain: payment

# Telegram API配置 (从 https://my.telegram.org 获取)
telegram:
  api_id: "YOUR_API_ID"           # 示例: "1234567"
  api_hash: "YOUR_API_HASH"       # 示例: "abcdef1234567890abcdef1234567890"
  phone_number: "+8612345678900"  # 手机号，带国际区号
  session_name: "camille_bot"     # 会话文件名 (不要带扩展名)
  
  # 安全设置
  use_test_dc: false              # 是否使用测试服务器
  proxy: null                     # 代理设置，如: {"scheme": "socks5", "hostname": "127.0.0.1", "port": 1080}
  
  # 消息处理设置
  max_workers: 5                  # 并发处理的最大工作线程数
  message_queue_size: 100         # 消息队列大小
  process_private: true           # 处理私聊消息
  process_groups: false           # 处理群组消息 (建议关闭，除非需要)
  process_channels: false         # 处理频道消息

  # ── Telegram 语音回复（TTS）────────────────────────────────
  # 启用后，AI 文字回复可自动合成语音发送；fallback 始终为纯文字
  voice_reply:
    enabled: false
    # when_peer_voice — 仅对方发语音时才回语音
    # always          — 所有回复都发语音（+ 可选文字摘要）
    # random          — 以 probability 概率随机发语音
    # never           — 关闭（与 enabled:false 等效）
    trigger: when_peer_voice
    probability: 0.3              # trigger=random 时生效
    backend: edge_tts             # edge_tts | openai | voice_clone_command
    voice: ja-JP-NanamiNeural     # edge_tts 声音 ID
    model: gpt-4o-mini-tts        # openai backend 模型
    format: mp3                   # mp3 | ogg；ogg 需 ffmpeg 转码
    out_dir: tmp_voice_replies
    max_text_chars: 220           # 超过此长度自动回退文字
    max_seconds: 60               # TTS 时长超限自动回退文字
    timeout_sec: 30               # TTS 合成超时（秒）
    send_text_summary: false      # true=语音发送后额外追加一条文字
    # 人设级音色覆盖（优先于此处；见 personas.profiles[].voice_profile）
    voice_profile:
      enabled: false
      owner_consent: true
      speaker_id: my_voice
      reference_audio_path: ""
      backend: voice_clone_command
      command_args: []
      command_timeout_sec: 120

# ── Telegram 语音消息接收转录（ASR）────────────────────────────────────────
# 对方发语音条 → 下载 OGG → Whisper 转文字 → 传给 AI 回复
# provider: whisper_local | faster_whisper | openai
voice_recognition:
  enabled: false               # true=开启语音接收转录
  provider: faster_whisper     # 推荐 faster_whisper；openai 需 api_key
  language: auto               # auto | zh | ja | en …
  temp_dir: ./temp/voice
  max_file_size: 16777216      # 16 MB
  whisper:
    model_size: base           # tiny(最快)|base|small|medium|large-v3
    device: cpu                # cpu | cuda
    download_root: ./models/faster-whisper
  openai:
    api_key: ""
    model: whisper-1

# ── Telegram 图片消息识别（OCR / Vision 兜底）────────────────────────────
# 对方发图片 → Vision AI 优先；无 Vision 配置则走 OCR 兜底
# Vision 配置位于顶层 vision.enabled；以下仅为 OCR 兜底配置
image_recognition:
  enabled: false               # true=开启 OCR 兜底（Vision 已配置则 OCR 极少触发）
  provider: tesseract          # tesseract | easyocr
  language: zh
  temp_dir: ./temp/images
  max_file_size: 10485760      # 10 MB
  supported_formats: [jpg, jpeg, png, gif, bmp]
  ocr:
    languages: [ch_sim, en]    # easyocr 语言列表；tesseract 用 chi_sim+eng
    psm: 3
    oem: 3

  # ── 多账号并行（单账号时留空/删除 accounts 块即可）──────────────
  # 每个账号共享 skill_manager/ai_client，独立 pyrogram session 文件
  # accounts:
  #   - id: acc_a
  #     label: "号 A"
  #     api_id: 12345678
  #     api_hash: "abcdef1234567890"
  #     phone_number: "+8613800000000"
  #     session_name: camille_a
  #     persona_ids: [warm_companion]
  #     enabled: true
  #   - id: acc_b
  #     label: "号 B"
  #     api_id: 87654321
  #     api_hash: "fedcba0987654321"
  #     phone_number: "+8613811111111"
  #     session_name: camille_b
  #     persona_ids: [professional_support]
  #     enabled: true

# LINE Messaging API（官方账号；与 Telegram 共用 Skill/AI，需 web 可公网 HTTPS）
# 控制台 Webhook URL 填: https://你的域名/line/webhook（与 webhook_path 一致）
line:
  enabled: false
  channel_secret: ""
  channel_access_token: ""
  webhook_path: "/line/webhook"
  unsupported_type_reply: "目前仅支持文字消息，请发文字。"

# 面向终端客户的网页聊天 Widget（web 渠道，公网入口；默认关）
# 开启后：客户官网嵌入 <script src="https://你的域名/chat/embed.js"></script> 即出现聊天气泡；
# 入站消息进同一 AI 大脑（auto_ai 自动回），落统一收件箱，坐席工作台可见、可人工接管。
web_chat:
  enabled: false
  account_id: web              # 统一收件箱里的 account 标识
  default_mode: auto_ai        # auto_ai=AI自动回 | manual/review=直接转人工等坐席回
  greeting: "你好～有什么可以帮您？"
  title: "在线客服"
  theme_color: "#2563eb"
  token_secret: ""             # 访客 token 签名密钥；留空回落 web_admin.secret_key
  token_max_age_sec: 2592000   # 访客 token 有效期（默认 30 天）
  rate_limit_per_min: 20       # 单访客每分钟消息上限（防滥用）
  # 嵌入/调用来源白名单（空=不限制）。设置后：仅这些站点可 iframe 嵌入（CSP frame-ancestors）
  # 且跨源 API 调用会校验 Origin。例：["https://shop.example.com", "https://www.example.com"]
  allowed_origins: []
  # web→LINE 自动引流：达到 readiness/cap/script 条件时，在 AI 回复尾部注入引流话术 + 暗号 token；
  # 客户到 LINE 发首条（含暗号）→ on_line_first_text 自动合并身份、归因 web 来源。
  # 需 contacts.enabled + 已配置 handoff 话术/LINE id；默认关，且首条不推（min_inbound 门槛）。
  handoff:
    enabled: false
    min_inbound: 2             # 访客累计入站达到此数才尝试引流（避免一上来就推 LINE）
  # Phase 5-4：pre-chat 留资表单（聊天前采集 姓名/手机/邮箱）。
  # required=true 时必须填完才能开始对话；采集到的 phone/email 会跨渠道去重合并身份
  # （老客户曾用同一手机/邮箱在 LINE/Messenger 联系过 → 自动合并为同一 Contact）。
  prechat:
    enabled: false
    required: false            # true=必填才能开聊；false=可跳过
    title: "开始对话前，请留下您的联系方式"
    fields:                    # 支持 key: name/phone/email/wechat/line_id/note
      - {key: name,  label: "称呼",   type: text,  required: false}
      - {key: phone, label: "手机号", type: tel,   required: false}
      - {key: email, label: "邮箱",   type: email, required: false}

# Web 管理后台（显示名、侧边栏标题；LINE RPA 提示中的「系统」名称亦取此字段）
web_admin:
  site_name: 智控王客户转化聊天系统
  host: 127.0.0.1
  port: 18787
  auth_token: YOUR_ADMIN_TOKEN
  secret_key: YOUR_FLASK_SECRET_KEY
  # P25-A / P26-C: 全局 body size 限制（防大 JSON / chunked 流式攻击）
  # 默认 2MB，按 path 可在 body_limits 覆盖。超限 → 413 + Connection:close + audit_log。
  max_body_bytes: 2097152                # 2 MiB
  # 个别 path 提升上限（如完整 intent_tags 字典写入）
  body_limits:
    "/api/rpa/intent-tags": 4194304      # 4 MiB
  # 完全跳过 body 检查的 path 前缀（如未来的文件上传端点 — 当前为空）
  max_body_exempt_prefixes: []

# RPA intent_tags 字典管理
rpa_intent_tags:
  # P26-A: 文件变更后自动 reload（基于 watchdog；保存外部编辑、热部署友好）
  # 关闭后只能靠 POST /api/rpa/intent-tags/reload 触发
  watch_enabled: true
  # 文件变更与 reload 之间的去抖延时（秒）— 防止编辑器多次 write 触发多次 reload
  watch_debounce_sec: 0.8

# 个人 LINE 客户端 RPA（ADB + uiautomator dump；与官方 Messaging API 独立）
# 需：开发者选项 USB 调试、已登录 LINE 的会话在前台、建议安装 ADB Keyboard 以输入中文
line_rpa:
  enabled: false
  adb_serial: ""   # 空则自动选择已安装 LINE 的设备
  prefer_line_device: true
  line_package: jp.naver.line.android
  splash_activity: jp.naver.line.android/.activity.SplashActivity
  dump_remote_path: /sdcard/line_rpa_dump.xml
  peer_left_ratio: 0.42
  chat_key: "line_rpa:default"
  default_reply_lang: zh
  after_launch_sleep_sec: 1.2
  after_text_sleep_sec: 0.35
  clear_input_del_count: 96
  use_adb_keyboard: true
  adb_keyboard_ime: com.android.adbkeyboard/.AdbIME
  adb_keyboard_prefer_b64: true
  adb_keyboard_package: com.android.adbkeyboard
  redump_before_send: true
  state_file: ""   # 空则使用 config/line_rpa_state.json（去重上次对方话术）
  try_root_ui_dump: true
  # hierarchy 失败时：none=直接失败；screenshot_ocr=adb screencap + 裁剪 +（可选）Tesseract / Vision
  read_fallback: none
  # 私聊场景：默认不因 S5 静默概率吞回复；可 reply_strategy_override 强制整策略（如 S3_standard）
  skip_silent_probability: true
  reply_strategy_override: ""
  # true：人设跟随后台 PersonaManager（与 Web「默认人设」一致）；false 时主要依赖 reply_style_hint
  use_backend_persona: true
  # LINE 渠道补充说明（非空则追加）；人设主体见 AI 系统提示中的「后台人设定位」
  reply_style_hint: ""
  # P2-4：群聊 @我 提权 / 回复策略
  self_names: []                  # 本账号昵称/别名列表，用于检测 peer_text 里 @我
  group_reply_policy: all         # all(群也回) | mention_only(仅被@才回) | never(群内完全不回)
  reply_style_hint_mentioned: ""  # 群内被 @ 时使用的替代风格（空=沿用普通 hint）
  # P4-3：回复模式 — auto=直接发送；approve=进入审核队列等人工批准；off=不回
  reply_mode: auto
  approve_max_deliver_per_cycle: 3  # 每轮最多投递几条已审批回复
  # P5-1：审批条目防陈旧 + 超时自动取消
  approve_stale_check:
    enabled: true                   # 投递前对比 peer_text 哈希，若对方又发了新消息则自动取消本条
  approve_pending_ttl_hours: 24.0   # 超过 N 小时未处理的 pending 自动 cancelled（0=关闭）
  # P5-2：多类告警阈值（0=关闭对应告警；整体告警系统由 health_check.enabled 主控）
  alert_thresholds:
    send_fail_streak: 3             # 连续 N 次 send_failed/open_fail/send_verify_failed 触发
    skill_error_burst: 5            # 近 skill_error_window_sec 秒内 ≥N 次 AI 技能错误触发
    skill_error_window_sec: 3600
    adb_lost: true                  # no_adb_device 立即触发
    ime_lost: true                  # P6: AdbKeyboard 广播失败时触发（IME 被切换/崩溃）
  # P4-5：后台健康检查（dumpsys notification 对账），连续多次 possibly_missed 自动入告警库
  health_check:
    enabled: true
    interval_sec: 300.0              # 每 N 秒检查一次（0=关闭）
    miss_streak_alert: 3             # 连续 N 次疑似漏读即告警
    alert_dedup_window_sec: 1800.0   # 同 kind 告警去重窗口
  # P3-3：连续对方气泡聚合（默认开启；对方一次发三段也能被 AI 完整看到）
  peer_multi_bubble:
    enabled: true
    max_gap_px: 220         # 相邻两条 bottom_y 差超过则截断（px）
    max_count: 6            # 最多合并几段
    left_cx_tol_px: 140     # 水平中心偏差超过则认为不是同方气泡
    joiner: "\n"            # 合并分隔符
    mark_latest: true       # P4-1：给最后一段加 [最新] 前缀，帮助 AI 判断时序
    latest_tag: "[最新] "
  # 每轮 run_once 追加一行 JSON（路径）；空则关闭
  metrics_jsonl: ""
  screenshot_ocr:
    enabled: true
    # 预设：phone_default | phone_tall_nav | max_chat_area；可与 crop_bottom_ratio 等同名字段混用（显式优先）
    preset: ""
    crop_bottom_ratio: 0.42
    # 在底部条带内再裁左侧比例（0.58 表示保留左 58% 宽度），弱化右侧己方气泡
    peer_left_strip_ratio: 0.58
    # false 时跳过 Tesseract，直接走 vision_read_fallback（本地 Ollama/Gemma 或云）
    use_tesseract: true
    tesseract_lang: chi_sim+eng
    # 裁剪区 SHA256 与上次处理成功时相同则跳过（省 OCR/Vision/大模型）
    skip_if_unchanged: true
  # OCR 仍读不到（或 use_tesseract: false）时，用多模态读同一裁剪图
  vision_read_fallback:
    enabled: false
    # 与全局 vision 合并；可在此覆盖 provider / base_url / model
    # provider: zhipu（默认，需 api_key）| openai_compatible（Ollama：base_url + model）
    # provider: openai_compatible
    # base_url: http://127.0.0.1:11434/v1
    # api_key: ollama
    api_key: ""
    model: glm-4v-flash
    # 空=使用内置结构化 JSON prompt（识别文字/贴图/图片/语音）；非空则走旧「纯文字」模式
    prompt: ""
  # P6/P7：uiautomator OOM 时，用 vision 扫聊天列表（需 vision_read_fallback.enabled=true）
  # Web /api/line-rpa/status 会返回 vision_scan.* 与 ime_lost_alerts_unacked（P7-2）
  vision_scan:
    enabled: false
    scan_budget_sec: 30.0           # 两次 vision 列表扫描最小间隔（防 API 爆量）
    max_pages: 5                  # 与 navigation.max_scroll_attempts 配合；多屏滑动上限
    list_prompt_override: ""      # 空=内置 LIST_VISION_PROMPT
  # 部分机型会 kill uiautomator（OOM）；无法 dump 时可用手动坐标 + --peer-text 走通 AI+发送试验
  fallback_edit_tap: []   # 例: [540, 2280] 输入框中心
  fallback_send_tap: []    # 例: [1000, 2280] 发送键中心
  # ── 多会话导航（MVP：扫未读 → 自动进入 → 读/回/返） ──
  # enabled=false 时仍走旧的"单聊停留"模式（不破坏原有行为）
  navigation:
    enabled: false
    max_chats_per_run: 3          # 单轮最多处理 N 个未读
    max_scan_rows: 10             # 扫列表时最多取前 N 行
    max_scroll_attempts: 1        # 屏幕无可处理未读时最多向下滑动几次揭示更多（带防抖；0=不滚动）
    scroll_to_top_attempts: 1     # P4-2：每轮开始先向上滑几次回到列表顶（0=关闭；防止用户手动滑到下半部分导致漏读）
    scroll_top_after_done: true   # P6：处理完未读后是否滚回列表顶（下一轮从最新开始）
    cycle_budget_sec: 60.0        # 单轮预算（超时自动 break）
    after_tap_sleep_sec: 0.8
    between_chats_ms: [900, 2200] # 会话之间的拟人停顿
    chat_list_tab_tap: []         # 可选：人工标定 '聊天' tab 坐标（例如 [150, 2360]）
    allow_list: []                # 对方名白名单（子串匹配）；为空=不限
    deny_list: []                 # 对方名黑名单（子串匹配）
    red_dot_fallback:             # P2-2：无数字徽章的红点未读（截图红像素比兜底）
      enabled: false
      min_red_ratio: 0.06         # 行右侧红色像素占比阈值
      right_strip_ratio: 0.2      # 仅扫行最右侧 20% 区域

  # P2-5：失败留痕（open_fail / no_peer_text / send_failed / skill_error 时自动截图）
  failure_shots:
    enabled: false
    dir: logs/line_rpa/failures   # 保留目录（单层文件名，Web 通过 /api/line-rpa/screenshot/{name} 取）
    max_files: 200                # FIFO 上限
    on_steps:
      - open_fail
      - no_peer_text
      - skill_error
      - send_failed
      - no_xml_in_room
  # ── 主进程托管的后台服务（Web 后台可控） ──
  # enabled=true 时主程序启动会拉起循环；可从 /line-rpa 页面暂停/恢复/立即触发
  service:
    autostart: true
    interval_sec: 15.0         # 基准轮询间隔（空闲时）
    fast_interval_sec: 4.0     # 刚收到对方消息后的短间隔
    fast_window_sec: 60.0      # 进入快轮询的窗口时长
    slow_interval_sec: 30.0    # 连续空轮后进入的慢轮询
    slow_after_empty: 6        # 多少次空轮后进入慢轮询
    jitter_pct: 0.25           # ±25% 随机抖动，避免机械感
    max_consecutive_fail: 20   # 连续失败 N 次触发自动暂停（0=关闭）
    auto_pause_sec_on_fail: 900
  # ── 拟人节奏（读停顿 / 分条 / 条间隔） ──
  human_pacing:
    enabled: true
    read_pause_ms: [800, 2000] # 看完对方消息的"思考"停顿
    per_char_ms: [40, 80]      # 打字节奏（slow_type=true 时每字符停顿）
    slow_type: false           # true 则逐字输入（更像人，但慢很多）
    split_mode: sentence       # sentence | length | none
    split_max_chars: 80        # 单条最多字符
    split_max_parts: 3         # 最多分成几条
    inter_msg_ms: [700, 1800]  # 分条之间的间隔
  # 近期 run 历史保留上限（SQLite，用于 Web 卡片"会话流"）
  recent_runs_buffer: 500

# ── 多平台设备协调器（Device Coordinator）─────────────────────────────────
# 设备注册表 DB（共享 openclaw.db，两个项目共用）
# 主控机可留空用默认路径；远程主机需配置为共享路径或本地副本
device_registry:
  db_path: ""                      # 空=用默认 ../mobile-auto0423/data/openclaw.db
  # 远程主机示例：
  # db_path: "\\\\192.168.8.100\\shared\\openclaw.db"   # Windows SMB
  # db_path: "/mnt/shared/openclaw.db"                   # Linux NFS

# 让一台手机轮流检查 LINE / WhatsApp / Messenger，有角标才进入 App 处理。
# 启用后，相关设备的独立 line_rpa / whatsapp_rpa / messenger_rpa service
# 应将 autostart 设为 false（由协调器统一驱动）。
device_coordinator:
  enabled: false
  devices:
    - serial: IJ8HZLORS485PJWW
      label: "IJ8-主机"
      enabled: true
      poll_interval_sec: 15         # 有通知时的检测间隔（秒）
      idle_poll_interval_sec: 30    # 无通知时的检测间隔
      force_check_interval_sec: 45  # 不管有无通知，每 N 秒强制检查一遍（防通知被关闭或漏消息）
      home_settle_sec: 1.5          # HOME 键后等待 Launcher 稳定的时间
      priority_by_badge: true       # true=通知数多的 App 优先处理
      platforms:
        - type: line
          account_id: line_ij8
        - type: whatsapp
          account_id: wa_ij8
        - type: messenger
          account_id: msg_ij8
    - serial: XW8TQKEQIVJRQO69
      label: "XW8"
      enabled: true
      poll_interval_sec: 15
      idle_poll_interval_sec: 30
      force_check_interval_sec: 45
      platforms:
        - type: line
          account_id: line_xw8
        - type: whatsapp
          account_id: wa_xw8

# ADB 热插拔自动纳管 — 检测新插入的手机并查 registry DB 动态创建 Coordinator
# 与 device_coordinator.devices[] 共存：静态配置的设备由上方管理，
# 不在静态配置但在 registry 中注册的设备由 HotPlug Watcher 管理。
hotplug_watcher:
  enabled: true                    # 默认跟随 device_coordinator.enabled
  host_name: ""                    # 本机名称，对应 registry DB 的 group_name
                                   # 空=""管所有在线已注册设备；"主控"/"W03"/"W175"则只管对应分组
  scan_interval_sec: 15            # ADB 扫描周期（秒）
  offline_timeout_sec: 30          # 设备离线多久才停止 Coordinator（防 USB 瞬断）

# ── Webhook 告警通知 ──────────────────────────────────────────────────────
# 设备熔断 / 配置变更 / 审计事件推到 Telegram / Slack / 企业微信
# 事件类型: device_coordinator.circuit_open / messenger_rpa.device_unhealthy
#           config.changed / audit.* 等
webhook:
  enabled: false
  timeout: 10
  retry: 1
  webhooks: []
    # Telegram Bot 示例：
    # - url: "https://api.telegram.org/bot<TOKEN>/sendMessage"
    #   format: telegram
    #   chat_id: "123456789"
    # Slack 示例：
    # - url: "https://hooks.slack.com/services/T.../B.../xxx"
    #   format: slack

# ── 设备模板（快速批量分配平台配置）─────────────────────────────────────
# 在 Web 面板 📊 设备统计 tab 可选择模板一键应用到勾选设备
device_templates:
  - name: "3-platform-full"
    description: "三平台全开（Messenger + LINE + WhatsApp）"
    fields:
      platform_messenger: "msg_auto"
      platform_line: "line_auto"
      platform_whatsapp: "wa_auto"
  - name: "messenger-only"
    description: "仅 Messenger"
    fields:
      platform_messenger: "msg_auto"
      platform_line: ""
      platform_whatsapp: ""
  - name: "line-wa"
    description: "LINE + WhatsApp（不含 Messenger）"
    fields:
      platform_messenger: ""
      platform_line: "line_auto"
      platform_whatsapp: "wa_auto"

# Facebook Messenger 客户端 RPA（ADB + Vision；与 Telegram/LINE 共用 Skill/AI）
# 多账号模式：在 accounts[] 下为每台手机写一条；device_coordinator.platforms 里
# 用 account_id 对应到具体账号，每账号自动使用独立 state DB。
messenger_rpa:
  enabled: false
  autostart: true
  adb_serial: ""        # 单账号模式保留此字段；多账号时由 accounts[].adb_serial 覆盖
  adb_user_id: 0
  messenger_package: com.facebook.orca
  # 多账号示例（4台手机各1个Messenger账号）：
  # accounts:
  #   - account_id: msg_ij8
  #     adb_serial: IJ8HZLORS485PJWW
  #   - account_id: msg_q4n
  #     adb_serial: Q4N7AM7HMZGU4LZD
  #   - account_id: msg_vwn
  #     adb_serial: VWNJFUNRV4LF4XTS
  #   - account_id: msg_xw8
  #     adb_serial: XW8TQKEQIVJRQO69
  # 更聪明的轮询：通知监听会立即触发；普通空闲轮询也不要拖到 30s+。
  interval_sec: 8.0
  min_interval_sec: 2.0
  max_interval_sec: 60.0
  backoff_multiplier: 1.25
  max_inbox_per_run: 2
  # run_once 开始位置：
  # - smart_current_thread: 已经在目标聊天页时直接读取并回复
  # - force_chats: 每次强制回 Chats 列表扫描
  run_once_start_mode: smart_current_thread
  thread_title_vision_fallback: true
  # MIUI lowmemkill 时 uiautomator dump 返回 "Killed"，XML/Vision/搜索三个
  # title 校验 fallback 全部失败；UI XML tap 已经像素精确点中目标行，此时
  # 信任 target.name 而不阻塞发送（true=系统能继续工作；false=严格校验）
  trust_xml_tap_target_name: true
  # P0-A peer message quiet window：生成 LLM 回复前等一小段，给对方把后续消息
  # 发完，避免"对方连发→机器人对每条单独回复"的重复。peer_typing 探测到打字
  # 时会自动延长到 detector 建议时间（封顶 max_sec）。设 0 即禁用。
  peer_message_quiet_window_sec: 1.8
  peer_message_quiet_window_max_sec: 10.0
  pre_thread_self_xml_guard: true
  stale_peer_after_self_guard: true
  stale_peer_after_self_window_sec: 900
  stale_peer_after_self_overlap_threshold: 0.45
  reply_mode: auto
  default_reply_lang: zh
  language_alignment: auto
  notif_watch_enabled: true
  notif_poll_ms: 700
  use_adb_keyboard: true
  adb_keyboard_ime: com.android.adbkeyboard/.AdbIME
  adb_keyboard_package: com.android.adbkeyboard
  thread_self_media_xml_guard: true
  audio_pipeline:
    enabled: false
    backend: faster_whisper
    model_size: base
    model: whisper-1
    device: cpu
    compute_type: int8
    language: auto
    download_root: models/whisper
    fallback_enabled: false
    fallback_backend: openai
    fallback_model: whisper-1
    min_text_chars: 3
    fallback_on_low_confidence: false
    min_avg_logprob: -0.8
    min_language_probability: 0.35
    cb_cooldown_sec: 300
  voice_input:
    enabled: false
    prefer_transcribe: true
    capture_mode: run_as        # run_as | helper_session | helper_app | screenrecord | external_file | ack_only
    record_sec: 8
    timeout_sec: 30
    fallback: ack_and_approve
    helper_apk_path: tools/audio_capture_helper/build/MrpAudioBridge.apk
    helper_package: com.codex.mrpaudiobridge
    helper_auto_install: true
    helper_wait_sec: 12
    silence_max_abs: 120
    find_voice_scroll_attempts: 2
    # voice_tap_xy: [158, 374]  # 可选：指定播放按钮坐标，留空则自动识别
    audio_pipeline:
      enabled: false
      backend: faster_whisper   # faster_whisper | openai | disabled
      model_size: base
      model: whisper-1
      device: cpu
      compute_type: int8
      language: auto
      download_root: models/whisper
      fallback_enabled: false
      fallback_backend: openai
      fallback_model: whisper-1
      min_text_chars: 3
      fallback_on_low_confidence: false
      min_avg_logprob: -0.8
      min_language_probability: 0.35
      cb_cooldown_sec: 300
  voice_output:
    enabled: false
    mode: approval_only         # approval_only | text_plus_voice | auto_voice
    trigger: when_peer_voice
    backend: edge_tts           # edge_tts | pyttsx3 | openai | disabled
    voice: ja-JP-NanamiNeural
    model: gpt-4o-mini-tts
    format: mp3
    out_dir: tmp_voice_replies
    voice_profile:
      enabled: false
      owner_consent: true       # 仅允许使用本人/已授权声音
      speaker_id: my_voice
      reference_audio_path: D:/workspace/telegram-mtproto-ai/voice_samples/my_voice.wav
      backend: voice_clone_command
      # 优先使用 command_args，避免 Windows 路径/引号问题；必须输出到 {out}
      command_args: [python, D:/workspace/telegram-mtproto-ai/tools/qwen_tts_wrapper.py, --region, cn, --text, "{text}", --out, "{out}", --voice-profile, D:/workspace/telegram-mtproto-ai/voice_samples/qwen_my_voice.json, --language-type, Japanese]
      # command_template 作为兼容旧脚本的 shell 字符串方案
      # command_template: python tools/glm_tts_infer.py --text {text} --ref {reference_audio} --out {out}
      command_timeout_sec: 120
    timeout_sec: 30
    max_seconds: 20
    max_text_chars: 220
    send_text_summary: true
    night_quiet: true
    fallback: text
    auto_find_share_send_button: true
    auto_search_share_recipient: true
    send_audit_dir: tmp_messenger_rpa
    # auto_voice 模式下用于 Messenger 分享页；默认用 chat_name 从 UI XML 自动找 Send 按钮
    # 若 UI XML 在部分手机上不可用，会搜索联系人并用截图识别蓝色 Send 按钮
    # share_recipient_name: Victor Zan
    # share_recipient_tap_xy: [600, 640]
    # share_send_tap_xy: [616, 634]
  mobile_auto:
    root_path: D:/workspace/mobile-auto0423
    api_base: http://127.0.0.1:18080
    openclaw_db_path: D:/workspace/mobile-auto0423/data/openclaw.db
  # Messenger 多人设 / 语言锁。按联系人名或 chat_key 命中；未命中走 default。
  reply_profiles:
    default: warm_companion
    profiles:
      - id: warm_companion
        language: auto
        style_hint: |
          你是自然的 Messenger 私聊对象，不是客服机器人。优先短句、口语、像真人聊天。
          用户很短时只回一小句；用户认真倾诉时先接住情绪，再轻问一个问题。
        persona:
          name: Camille
          role: 朋友式陪聊与转化助手
          personality:
            traits: [温柔, 机灵, 有边界感]
            style: 轻松自然的私聊口吻
          speaking:
            language_follow: true
            reply_length: concise
            max_reply_sentences: 3
            forbidden_phrases: [作为一个AI, 有什么可以帮您, 请问有什么需要]
      - id: professional_support
        match_names: []
        language: auto
        style_hint: |
          面向明确咨询、订单、付款、商务问题时使用。先给结论，再给下一步动作。
          避免恋爱腔，避免大段解释。
        persona:
          name: Camille
          role: 专业但不生硬的客户沟通助手
          speaking:
            language_follow: true
            reply_length: concise
            max_reply_sentences: 4

# WhatsApp RPA（ADB + uiautomator；与 Telegram/LINE/Messenger 共用 Skill/AI）
# 与 messenger_rpa 结构类似，accounts[] 下为每台手机一条
whatsapp_rpa:
  enabled: false
  accounts:
    - account_id: wa_q4n
      adb_serial: Q4N7AM7HMZGU4LZD
      use_business_app: false   # true → com.whatsapp.w4b
      reply_mode: auto          # auto | approve | off
      default_reply_lang: zh
      daily_cap: 200
      dedup_window_sec: 10
      catchup_limit: 3          # 发完后最多追补几轮漏消息
      # 语音识别（STT）— 直接从 WhatsApp 文件系统读取 .opus 文件
      voice_input:
        enabled: false
        max_age_sec: 600        # 语音文件最大年龄（秒）
        batch_max: 5            # 连续多条语音最多批量转写几条
      # 语音回复（TTS）— 通过 share intent 发送
      voice_output:
        enabled: false
        mode: approval_only     # approval_only | auto_voice
        trigger: when_peer_voice  # when_peer_voice | always | random
        voice_probability: 0.3  # trigger=random 时的概率
        max_text_chars: 220     # TTS 最大文本长度
        max_seconds: 20         # 音频最长秒数
        timeout_sec: 30         # TTS 合成超时
      # 多条消息引用回复（Quote Reply）
      # 当用户连续发送多条消息时，AI 先判断意图关系，再逐条引用回复
      multi_msg_reply_enabled: false  # 默认关闭，稳定后可开启
      multi_msg_max_count: 5          # 最多处理几条新消息（超出取最新 N 条）
      auto_quote_reply: false         # 单条主流程也用引用回复（long-press→回复），combined 模式始终生效
      # 多模态媒体理解 — 图片/视频/贴纸/GIF/文件
      media_input:
        enabled: false
        use_vision: true        # true=截图裁剪+VLM描述; false=仅 placeholder
        crop_padding: 24        # 裁剪媒体气泡时的边距 (px)
        max_image_dim: 960      # 送 VLM 前缩放最长边上限
        timeout_sec: 30         # VisionClient 超时
        # vision_cfg:           # 可覆盖全局 vision 配置（如单独超时/模型）
        #   timeout: 25
      human_pacing:
        enabled: true
        typing_cpm_lo: 240
        typing_cpm_hi: 480
      service:
        interval_sec: 30
        autostart: false

# ── 顶层人设池（跨平台复用：TG / Messenger / LINE）───────────────────────
# messenger_rpa.reply_profiles 继续有效（向后兼容 alias，读取时优先级最低）
# Telegram 通过 telegram.voice_reply 和本节 voice_profile 选择音色
personas:
  default: warm_companion
  profiles:
    - id: warm_companion
      name: Camille
      enabled: true
      style_hint: |
        你是自然的私聊对象，不是客服机器人。优先短句、口语、像真人聊天。
      # voice_profile 留空则继承 telegram.voice_reply 全局设置
      voice_profile:
        enabled: false
        backend: edge_tts
        voice: ja-JP-NanamiNeural
        owner_consent: true
        speaker_id: warm_companion_voice
        reference_audio_path: ""
        command_args: []
        command_timeout_sec: 120
    - id: professional_support
      name: Camille
      enabled: true
      style_hint: |
        面向明确咨询、订单、付款、商务问题时使用。先给结论，再给下一步动作。
      voice_profile:
        enabled: false
        backend: edge_tts
        voice: zh-CN-XiaoxiaoNeural

# 人工客服转接：同问多次追加 @ 人工；值班状态存 SQLite human_escalation.db
human_escalation:
  enabled: false
  repeat_threshold: 3
  repeat_window_sec: 600
  min_message_len: 6
  # 成功 @ 人工后，对「同一归一化问句」再次 @ 的最短间隔（秒）
  cooldown_sec: 120
  # per_normalized_question（默认）| per_user_chat（旧：同用户全群共享一条冷却）
  escalation_cooldown_scope: per_normalized_question
  duty_mode: always
  timezone: Asia/Shanghai
  mention_joiner: " "
  mention_mode: all
  agents: []
  agent_teams: []
  team_fallback_to_global: true
  team_pick_mode: union
  mention_round_robin_scope: global
  schedule_estimate_step_minutes: 15
  # 近端细扫窗口（小时）：0=关闭细扫，仅用粗步进；默认 24
  schedule_estimate_fine_horizon_hours: 24
  # GET /api/human-escalation/schedule-status 内「排班估计」短时缓存（秒），0=关闭
  schedule_status_cache_ttl_sec: 30
  work_hours: {}
  work_exceptions: {}
  # work_exceptions 示例（本地日历 YYYY-MM-DD；[] 为全天休息）:
  # work_exceptions:
  #   "2026-01-01": []
  #   "2026-03-21": [["10:00", "14:00"]]
  human_username: ""
  human_user_id: 0
  only_when_shift_online: false
  message_off_shift: ""
  escalation_line: "已多次询问同类问题，请人工客服协助："
  # 转接时附带用户问句：可点击跳转到该条消息（公开群 t.me/username/msg，无 username 的超级群 t.me/c/...，私聊 tg://openmessage）
  include_user_question_link: true
  user_question_max_len: 200
  user_question_line_prefix: "原文："
  # 触发 @ 人工且群内 AI 回复发送成功后，把用户该条群消息「转发」到各客服私聊（与 mention 名单一致，便于点转发条回到群内原话）
  forward_user_message_to_agents: true
  # 转发后再发一条私聊：内联按钮 + t.me/tg:// 直达链接（解决部分客户端转发条无法跳回群内指定消息）
  forward_private_jump_hint: true
  # agents 示例（优先于单客服字段）:
  # agents:
  #   - user_id: 123456789
  #     username: ""
  #     display_name: "白班-小王"
  #   - user_id: 0
  #     username: "night_staff"
  #     display_name: "夜班"
  # work_hours 示例（键 mon…sun，值为 [["HH:MM","HH:MM"], ...]）:
  # work_hours:
  #   mon: [["09:00","12:00"], ["13:00","18:00"]]
  #   tue: [["09:00","18:00"]]
  #   sat: []

# 收窄回复：仅处理客服在线 / 通道状态·限额·成功率 等（详见各子项）；enabled: false 恢复全量应答
narrow_reply:
  enabled: false
  allowed_intents:
    - greeting
    - channel_info
    - status_check
  cs_online_substrings: ["在吗", "在不", "有人吗", "客服", "人工", "在线吗", "上班吗", "有没有客服", "真人", "在不在"]
  greeting_substrings: ["你好", "您好", "hello", "hi", "嗨", "hey", "早上好", "下午好", "晚上好", "早", "在么"]
  channel_topic_substrings:
    - "通道"
    - "额度"
    - "限额"
    - "成功率"
    - "代收"
    - "代付"
    - "维护"
    - "波动"
    - "稳定"
    - "交易"
    - "跑单"
    - "正常"
    - "单笔"
    - "限制"
    - "状态"
    - "ep"
    - "jc"
    - "费率"
    - "手续费"
  deny_substrings:
    - "订单号"
    - "单号"
    - "查单"
    - "查订单"
    - "投诉"
    - "退款"
    - "凭证"
    - "截图"
    - "没到账"
    - "未到账"
    - "钱没到"
  inherit_followup_seconds: 120

# Web 保存的默认人设落盘（与 config.yaml 同目录；重启后覆盖域包 persona.yaml）
persona_persistence:
  enabled: true
  path: ""   # 空则使用 persona_runtime.yaml；可填相对 config 目录的路径

# AI 提供商配置
# ⚠️ 重要：ai_client.py 只实现两条分支——gemini（默认，native google-genai）
#   与 openai_compatible（OpenAI SDK + base_url，用于 DeepSeek/Ollama/vLLM）。
#   provider 写 "deepseek" 不是独立分支，会 fall-through 到 gemini！
#   要真正用 DeepSeek，必须 provider: openai_compatible + 下方 base_url/model。
ai:
  provider: "openai_compatible"   # gemini | openai_compatible（DeepSeek/Ollama/vLLM 走这条）
  api_key: "YOUR_API_KEY"         # 对应 provider 的 API 密钥
  base_url: "https://api.deepseek.com"  # openai_compatible 时必填（如 DeepSeek）
  model: "deepseek-chat"          # 使用的模型
  temperature: 0.7                # 温度参数 (0.0-1.0)
  max_tokens: 1024                # 最大回复token数
  timeout: 30                     # API调用超时(秒)
  # P1-3：会话历史轮数。10 偏短，话题切换时模型容易忘记上下文导致跳话题；
  # 16 是质量/成本平衡点（多 60% token 但显著改善连贯性）。配合 _build_contents
  # 的字符上限 12000 双重截断，不会超长。
  max_conversation_history: 16
  # 是否在实时通道数据里向模型注入「费率=」行（默认 false；对客不宣读具体费率数值）
  channel_status_include_fee: false
  # 后台人设注入：full 完整 | compact 精简（减与域 system_prompt 重复）| none 不注入（仅用域提示）
  persona_block_detail: full

  # 系统提示词
  system_prompt: |
    你是智能助手Camille，为用户提供友好、专业的客服服务。
    请保持回复简洁、有帮助，并适当使用表情符号增加亲和力。
    回复时考虑对话上下文，保持连贯性。

# 陪伴关系阶段（conversion 域）；状态存 bot.db user_context JSON
companion:
  enabled: true
  thresholds:
    initial_to_warming_exchanges: 4
    warming_to_intimate_exchanges: 14
    intimate_to_steady_exchanges: 35
  advance_suppress_after_downgrade: 8
  downgrade_keywords:
    - 别腻
    - 正经点
  natural_dialogue:
    enabled: true
    strict_exchange_max: 2
    short_user_chars: 22
    work_like_keywords: []
  # W2-D1：双信号融合 — 让 IntimacyEngine 的 score（含沉默衰减）参与 stage 决策
  # 沉默 30 天的 steady 关系 → score 衰减 → 自动降阶 + 注入 reunion 提示
  # 仅当 messenger_rpa runner 拿到 journey.intimacy_score 时生效（其它渠道静默回退）
  intimacy_fusion:
    enabled: true
    intimacy_bands:        # score(0-100) → stage 阈值，与 IntimacyEngine 对齐
      to_warming: 25
      to_intimate: 55
      to_steady: 80

# 图像理解：zhipu（智谱 GLM-4V）或 openai_compatible（Ollama 等，多模态 Gemma/LLaVA）
# 若同时配置 Ollama(base_url) 与智谱 key，请求时优先 Ollama，不可用或空结果时自动回退智谱
vision:
  provider: zhipu
  api_key: ""
  model: glm-4v-flash
  timeout: 30
  # 与 Ollama 并存时可用 zhipu_api_key 专存智谱 key（api_key 可填 ollama）
  # zhipu_api_key: ""
  # zhipu_model: glm-4v-flash
  # OpenAI 兼容多模态示例（Ollama）:
  # provider: openai_compatible
  # base_url: http://127.0.0.1:11434/v1
  # api_key: ollama
  # model: llava  # 或本机已拉取的多模态模型名

# Skill工作流配置
skills:
  # 启用哪些技能模块
  enabled:
    - greeting     # 问候处理
    - order_query  # 订单查询
    - price_check  # 价格咨询
    - status_check # 状态检查
    - channel_info # 通道信息
    - complaint    # 投诉处理
    - small_talk   # 闲聊
    - test         # 测试功能
  
  # 技能执行优先级 (数字越小优先级越高)
  priority:
    greeting: 1
    test: 2
    order_query: 3
    price_check: 4
    status_check: 5
    channel_info: 6
    complaint: 7
    small_talk: 8
  
  # 回复冷却设置 (单位: 秒)
  cooldown:
    per_user: 60      # 同一用户冷却时间
    per_content: 120  # 相同内容冷却时间
    global: 30        # 全局冷却时间

# 意图识别配置
intent:
  # 关键词匹配 (优先级从高到低)
  keywords:
    greeting: ["你好", "您好", "hello", "hi", "在吗", "在？", "有人吗"]
    order_query: ["订单", "下单", "查单", "单号", "订单号", "order", "查询订单"]
    price_check: ["价格", "价钱", "多少钱", "费率", "rate", "价格表", "报价"]
    status_check: ["状态", "情况", "怎么样了", "进度", "status", "怎么样"]
    channel_info: ["通道", "渠道", "channel", "有哪些通道", "通道状态"]
    complaint: ["投诉", "抱怨", "问题", "不爽", "不满意", "complaint", "issue"]
    small_talk: ["天气", "聊天", "聊会", "有空吗", "无聊", "干吗呢"]
    test: ["测试", "test", "试验", "试试", "camille"]
  
  # 正则表达式模式
  patterns:
    order_query: ["订单\\s*[：:](.*)", "订单号\\s*[：:](.*)"]
    price_check: ["(多少钱|价格|费率|rate).*"]
    channel_info: ["(通道|渠道|channel).*"]

# 回复模板配置
templates:
  # 问候回复模板（conversion/陪聊域勿用「有什么可以帮」客服腔）
  greeting:
    - "嗯嗯我在～怎么啦？"
    - "在呀，找我呢？"
    - "Hi～在呢"
  
  # 订单查询回复模板
  order_query:
    - "查询订单请提供订单号，我帮您查看状态。"
    - "请告诉我订单号，我来为您查询具体情况。"
    - "订单查询需要您的订单号，方便提供一下吗？"
  
  # 其他模板...

# 日志配置
logging:
  level: "INFO"                    # 日志级别: DEBUG, INFO, WARNING, ERROR
  file: "logs/app.log"             # 日志文件路径
  max_size_mb: 10                  # 日志文件最大大小(MB)
  backup_count: 5                  # 备份文件数量
  format: "[{time}] [{level}] {message}"  # 日志格式
  
  # 控制台输出
  console:
    enabled: true
    color: true

# 性能监控
monitoring:
  enabled: true
  metrics_port: 19190              # 监控端口（避免与常见 9090 冲突）
  update_interval: 60              # 更新间隔(秒)
  
  # 监控指标
  track:
    - messages_processed
    - api_calls
    - response_time
    - errors
    - queue_size

# 高级配置
advanced:
  # 重试机制
  retry:
    max_attempts: 3                # 最大重试次数
    backoff_factor: 1.5            # 指数退避因子
    max_delay: 60                  # 最大延迟(秒)
  
  # 缓存设置
  cache:
    enabled: true
    ttl: 300                       # 缓存生存时间(秒)
    max_size: 1000                 # 最大缓存条目数
  
  # 内存限制
  memory:
    max_queue_memory_mb: 100       # 队列最大内存占用(MB)
    gc_threshold: 80               # 垃圾回收阈值(%)
  
  # 健康检查
  health_check:
    interval: 300                  # 健康检查间隔(秒)
    timeout: 10                    # 检查超时(秒)
# ─ RPA 跨平台运行时调优（P16-B 引入）─────────────────────────────
# 跨平台聊天画像缓存（/api/rpa/cross-platform-profile）：
#   - 抽屉打开会同时查 LINE/Messenger/WA 三个 SQLite 后取并集
#   - in-process TTL cache + FIFO 淘汰；超大量同名访客时建议提高 max
#   - 不配置时使用代码默认值 (TTL 60s / MAX 256)
# 关键词字典 (config/intent_tags.yaml)：
#   - 通过 /rpa-overview 页面可视化编辑 + reload，无需改 config.yaml
#   - 写入会自动备份；最近 5 份带时间戳保留在同目录 (.bakN)
rpa:
  cache:
    cross_profile_ttl: 60               # 秒；后端 cross-platform-profile 缓存 TTL（最小 1）
    cross_profile_max: 256              # FIFO 上限；超出按插入序淘汰（最小 8）

  # P21-A: 反代后真实 IP 解析 — 只信任来自这些 IP 的 X-Forwarded-For
  # 推荐生产环境填 nginx/cloudflare 真实出口，否则黑客可伪造 XFF 绕开限流
  # trusted_proxies:
  #   - 127.0.0.1
  #   - 10.0.0.0/8           # 注：当前只支持精确 IP 匹配，CIDR 留待后续
  trusted_proxies: []

  # P21-B: intent-tags admin 端点限流（token bucket）
  # diff: 实时 lint 端点（编辑器输入触发），默认较宽松
  # restore: 备份恢复（写操作 + reload），默认严格
  rate_limits:
    diff:
      capacity: 20                      # 桶容量（短突发上限）
      refill_per_sec: 2                 # 每秒回血 token 数（持续吞吐 = 2 req/s）
    restore:
      capacity: 5
      refill_per_sec: 0.2               # 每 5 秒补一个 → 强制冷却
    # P23-D: /api/rpa/metrics 也限流 — Prometheus scrape 15s/次很安全，宽松设
    metrics:
      capacity: 100
      refill_per_sec: 1                 # 持续吞吐 1 req/s，足够多套监控系统拉

# ─ 跨平台 Contacts 子系统（Messenger → LINE 引流 + 漏斗 + 合并）──
# 默认关闭。启用后：
#   - 启动时自动建 config/contacts.db
#   - Web 自动挂 /api/contacts、/api/funnel、/ops/contacts、/ops/merge-reviews
#   - Messenger/LINE runner 需另行接 ContactHooks 才会真记录数据
#     （参考 docs/CONTACTS_RPA_INTEGRATION.md）
# ── 统一收件箱持久层（Phase A：统一数据地基）──────────────────────
# 纯旁路持久化：把各平台聚合到的会话/消息落到统一 conversations/messages 表，
# 并把 automation_mode 从「进程内 dict（重启即丢）」迁到持久表。
# store 故障或为空时，收件箱自动回落到原实时聚合，始终可用。
# ── 坐席工作台（/workspace）────────────────────────────────────────
workspace:
  claim_ttl_sec: 900          # 会话租约 TTL（秒）；无心跳则自动释放
  presence_stale_sec: 120     # 超过此秒数未心跳的坐席视为离线
  # 入站自动翻译：坐席打开会话时，将外语客户消息译为中文展示（默认关，控 API 成本）
  auto_translate_inbound:
    enabled: false
    target_lang: zh           # 译成何种语言
    source_langs: []          # 空=所有非 target 语言；例 [en, ja, ko] 仅译英日韩
    max_per_thread: 8         # 每次打开会话最多翻译条数
    max_chars: 400            # 超长消息跳过
  # 快捷回复模板（坐席输入栏「快捷回复」面板；与 messenger approval_templates、templates.yaml 合并展示）
  quick_templates:
    - label: 问候
      text: "你好～有什么可以帮您？"
    - label: 稍等
      text: "好的，我查一下马上回复您～"

inbox:
  enabled: true                      # 安全默认开；如需保守可设 false（全程走实时聚合）
  # db_path: config/inbox.db         # 可选：自定义 db 位置（相对路径基于 config_path）
  # A1 读路径灰度：收件箱列表 /api/unified-inbox/chats 的数据源。
  #   false（默认）= 实时聚合各平台（原行为）；
  #   true         = 改从统一 store 读（跨平台/跨重启持久；仍会先跑实时聚合做旁路 ingest）。
  # 注：thread/profile 端点仍走实时聚合；列表切 store 后历史survive 重启。store 不可用自动回落。
  read_from_store: false
  # Phase 6-8 SLA 阈值（秒）：客户消息未回复时长分级。
  #   warn = 黄色警告（会话列表 ⏱ 变橙、计入"SLA 超时"）；
  #   crit = 红色严重（变红加粗、计入"严重超时"）；首响达标率以 warn 为准。
  sla_warn_sec: 1800                  # 默认 30 分钟
  sla_crit_sec: 7200                  # 默认 2 小时

  # ── E2 自动草稿生成（Auto-Draft Pipeline）──────────────────────
  # 当新入站消息到达时，自动分析风险并生成 AI 回复草稿，供坐席审批。
  # 草稿风险映射：low→L2（自动发送）/ medium→L3（需审批）/ high→L4（拦截）。
  auto_draft:
    enabled: true             # false = 禁用自动草稿生成
    min_text_len: 3           # 少于此字符数的消息不生成草稿（过滤表情/贴图）
    automation_mode: auto_ai  # review | auto_ai — 决定 L2/L3 分界
                              # review:   low→L1, medium→L3, high→L4（无 L2 自动发）
                              # auto_ai:  low→L2, medium→L3, high→L4（L2 由 AutosendWorker 自动发）
    skip_platforms: []        # 跳过指定平台不生成草稿，如: [line, messenger]
    cleanup_age_days: 7       # 已处理草稿（approved/rejected/cancelled）超龄删除天数（0=禁用）
    cleanup_enabled: true     # false = 禁用自动清理（AutosendWorker 每日执行一次）

# ── Phase C：意图分析 LLM 升级 ────────────────────────────────────
# 规则版上叠 LLM：规则兜底、LLM 提升、风险只升不降；故障自动回落规则。
intent_analysis:
  use_llm: false                     # 默认关，灰度开 LLM（开后用 ai.* 同一提供方）
  timeout_sec: 8

# ── Phase C：翻译记忆持久化 + 术语库 + 成本 ───────────────────────
translation:
  memory:
    enabled: true                    # 持久翻译记忆（跨重启命中）；false 退化为纯内存缓存
    # db_path: config/translation_memory.db
  glossary:
    enabled: true
    extra_terms: {}                  # 全局术语，如 {"size": "尺码", "refund": "退款"}
  cost_tracking: false               # 接 llm_cost（按字符估算 token，best-effort）

# ── Phase D：电商工具层（订单/物流查询 + 事实校验） ───────────────
# 数据只能查不可编：查不到就如实告知，绝不编造订单/物流状态。
ecommerce_tools:
  enabled: false                     # 默认关；电商域上线时开
  provider: "mock"                   # mock / shopify（woocommerce 等为扩展点）
  timeout_sec: 8
  cache_ttl_sec: 0                   # 订单/物流查询短 TTL 内存缓存秒数；0=关闭（建议 30~60）
  cache_max_entries: 512             # 缓存条目上界（LRU 淘汰），防高基数单号撑爆内存
  logistics:                         # 物流聚合器（按运单号查轨迹，优先于电商 connector）
    enabled: false                   # 默认关；不启用时 track 回退电商 connector
    provider: "mock"                 # mock / aftership（17track 等为扩展点）
    # aftership:
    #   api_key: "your-aftership-key"
    #   base_url: "https://api.aftership.com/v4"
  # mock_orders: {}                  # provider=mock 时可注入演示订单数据
  # shopify:                         # provider=shopify 时填（缺 shop/token 自动回落 mock）
  #   shop: "your-store.myshopify.com"
  #   access_token: "shpat_xxx"
  #   api_version: "2024-01"

contacts:
  enabled: false                     # 总开关
  # db_path: config/contacts.db     # 可选：自定义 db 位置（相对路径基于 config_path）
  daily_cap: 15                      # 每个 Messenger 账号每天最多发多少次引流
  global_cap: 0                      # 全局日上限（0=不启用）
  token_ttl_hours: 72                # 引流暗号有效期
  readiness_threshold: 70            # 开引流窗的 readiness 阈值
  turn_saturation: 3                 # readiness 的 turn_count 饱和点
  min_silent_days: 3                 # reactivation 最少沉默天数
  min_intimacy_for_reactivation: 40  # reactivation 的最低亲密度
  reactivation_cooldown_days: 7      # 再次 reactivation 的冷却
  scripts_path: config/handoff_scripts.yaml
  compliance_path: config/handoff_compliance.yaml
  default_line_id: "@our_line"       # 回退用 LINE id
  line_ids_by_account:               # 每个 Messenger 账号对应的 LINE id
    # acc-A: "@line_handle_A"
    # acc-B: "@line_handle_B"

# Mobile Bridge：mobile-auto0423 ↔ telegram-mtproto-ai 双向同步
# 前置条件：contacts.enabled=true（bridge 依赖 contacts 子系统）
# Mobile → Telegram: 轮询 openclaw.db 的 lead_handoffs，同步到 contacts.db
# Telegram → Mobile: Web Admin 操作（ack/complete/reject）通过 mobile HTTP API 回写
mobile_bridge:
  # openclaw_db_path: ../mobile-auto0423/data/openclaw.db
  # 留空时自动推断：<telegram-config-dir>/../../mobile-auto0423/data/openclaw.db
  openclaw_db_path: ""
  # mobile-auto0423 的 API 地址（默认端口 18080，可通过 OPENCLAW_PORT 环境变量覆盖）
  mobile_api_base: "http://127.0.0.1:18080"
  # 轮询间隔（秒），建议 10~60
  poll_interval_sec: 15
