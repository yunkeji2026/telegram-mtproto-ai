# 意图分类关键词字典（跨平台 RPA 共享）
#
# 加载顺序：rpa_shared.py 启动时尝试读取本文件；缺失时回退到内置默认值。
# 修改后无需重启 — 通过 reload_intent_tags() 或下次进程启动生效。
#
# 匹配规则（详见 src/integrations/rpa_shared.py::_kw_matches）：
#   - 短 ASCII 关键词（≤ 5 字符）使用 word-boundary 正则，避免 'hi' 误匹配 'this'
#   - 中/泰/越/日/韩/印尼语等非 ASCII 直接子串匹配
#
# 字典遍历顺序即优先级（先 match 的标签胜出）。请按业务重要性排序。

