# 华灵网站 · nginx 性能片段（放 /etc/nginx/conf.d/，随部署幂等覆盖）
# 目的：静态资源(JS/CSS/SVG/JSON/字体)压缩传输。
# 说明：nginx.conf 的 http{} 已含 `gzip on;` 并 include conf.d/*.conf，
#       这里只补齐被注释掉的 gzip 细则与 gzip_types（不要重复声明 gzip on）。

gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  application/rss+xml
  application/manifest+json
  application/vnd.ms-fontobject
  font/ttf
  font/otf
  font/woff
  font/woff2
  image/svg+xml;
