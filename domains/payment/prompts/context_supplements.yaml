# Payment domain context supplements
# Intent-specific context injected into AI prompts when a certain intent is detected

intents:
  order_query:
    context: |
      用户正在查询订单状态。如果上下文中有识图结果（交易号、金额等），
      视为已查询到订单，回复确认收到+处理中。如果没有订单信息，
      引导用户提供订单号或付款截图。
    entities: ["order_number", "transaction_id", "amount"]

  channel_status:
    context: |
      用户正在查询通道状态。根据 exchange_rates.yaml 中的实时数据回复，
      包括通道名称、当前状态（正常/波动/维护）、成功率。
      禁止主动推荐或对比通道。
    entities: ["channel_name", "status", "success_rate"]

  quota_check:
    context: |
      用户正在查询额度信息。根据 quota_rules.yaml 中的配置回复，
      区分普通客户和特殊客户额度范围。分行列出各通道额度。
    entities: ["channel_name", "range", "customer_type"]

  gxp_command:
    context: |
      用户发送了 GXP 命令（如 /cxds, /cxye 等斜杠命令）。
      将命令转发至 GXP 机器人并等待回复。
    entities: ["command", "order_number"]

  price_check:
    context: |
      用户正在查询汇率信息。根据 exchange_rates.yaml 中的实时汇率数据回复。
    entities: ["currency_pair", "rate"]
