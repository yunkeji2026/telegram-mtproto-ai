{% extends "workspace_base.html" %}
{% block title %}{{ i18n.get('draft.page_title', '草稿审批工作台') }}{% endblock %}
{% block head %}
<style>
  .dr-wrap{height:100%;overflow-y:auto;background:#f7f8fa;padding:18px;}
  .dr-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .dr-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .dr-tab{padding:5px 14px;border:1px solid #d1d5db;border-radius:16px;font-size:13px;cursor:pointer;background:#fff;color:#374151;}
  .dr-tab.active{background:#2563eb;color:#fff;border-color:#2563eb;}
  .dr-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin-bottom:12px;transition:box-shadow .15s;}
  .dr-card:hover{box-shadow:0 2px 12px rgba(37,99,235,.12);}
  .dr-card.l4{border-left:4px solid #dc2626;}
  .dr-card.l3{border-left:4px solid #d97706;}
  .dr-card.l2{border-left:4px solid #16a34a;}
  .dr-card.l1{border-left:4px solid #2563eb;}
  .dr-card.l0{border-left:4px solid #9ca3af;}
  .dr-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap;}
  .badge-l4{background:#fee2e2;color:#991b1b;}
  .badge-l3{background:#fef3c7;color:#92400e;}
  .badge-l2{background:#d1fae5;color:#065f46;}
  .badge-l1{background:#dbeafe;color:#1d4ed8;}
  .badge-l0{background:#f3f4f6;color:#6b7280;}
  .dr-platform{font-size:11px;color:#94a3b8;}
  .dr-peer{background:#f1f5f9;border-radius:8px;padding:10px;font-size:13px;color:#334155;margin:8px 0;}
  .dr-draft{background:#eff6ff;border-radius:8px;padding:10px;font-size:13px;color:#1e3a5f;margin:8px 0;}
  .dr-reasons{font-size:11px;color:#dc2626;margin:4px 0;}
  .dr-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .dr-btn{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid;transition:opacity .15s;}
  .dr-btn:disabled{opacity:.45;cursor:default;}
  .btn-approve{background:#16a34a;color:#fff;border-color:#16a34a;}
  .btn-reject{background:#fff;color:#dc2626;border-color:#dc2626;}
  .btn-edit{background:#fff;color:#2563eb;border-color:#2563eb;}
  .btn-override{background:#991b1b;color:#fff;border-color:#991b1b;}
  .btn-autosend{background:#059669;color:#fff;border-color:#059669;}
  .dr-empty{text-align:center;padding:40px 0;color:#94a3b8;font-size:14px;}
  .dr-edit-box{width:100%;min-height:70px;border:1px solid #d1d5db;border-radius:6px;padding:8px;font-size:13px;resize:vertical;display:none;margin:6px 0;}
  .dr-warn{background:#fff7ed;border:1px solid #fb923c;border-radius:8px;padding:10px 14px;font-size:12px;color:#9a3412;margin:8px 0;}
  .dr-loading{text-align:center;padding:30px;color:#94a3b8;}
  /* D1 SLA 超时徽章 */
  .badge-sla{background:#fce7f3;color:#9d174d;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:700;}
  /* C2 Copilot 面板 */
  .dr-copilot{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin:8px 0;font-size:12px;}
  .dr-copilot-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
  .dr-copilot-body{margin-top:8px;display:none;}
  .dr-copilot-body.open{display:block;}
  .dr-copilot-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .dr-copilot-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;background:#e0f2fe;color:#0369a1;font-weight:500;}
  .dr-copilot-risk-low{background:#d1fae5;color:#065f46;}
  .dr-copilot-risk-medium{background:#fef3c7;color:#92400e;}
  .dr-copilot-risk-high{background:#fee2e2;color:#991b1b;}
  .dr-copilot-kb{background:#f1f5f9;border-radius:6px;padding:6px 10px;margin:3px 0;font-size:11px;}
  .dr-copilot-kb strong{color:#2563eb;}
  .dr-copilot-loading{color:#94a3b8;font-style:italic;}
  /* I1 对话智能元数据徽章 */
  .dr-intel{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0;align-items:center;}
  .dr-intel-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
  .dr-intel-intent{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;}
  .dr-intel-emotion{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;}
  .dr-intel-emotion.rising{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
  .dr-intel-emotion.falling{background:#f0fdf4;color:#166534;border-color:#bbf7d0;}
  .dr-intel-risk-medium{background:#fefce8;color:#854d0e;border:1px solid #fef08a;}
  .dr-intel-risk-high{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
  .dr-intel-trend{font-size:15px;line-height:1;}
  /* I3 模板选择器 */
  .dr-tpl{background:#fafafa;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;}
  .dr-tpl-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
  .dr-profile{background:#fdf4ff;border:1px solid #e9d5ff;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;}
  .dr-profile-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;font-weight:600;color:#7c3aed;}
  .dr-profile-body{display:none;margin-top:8px;}
  .dr-profile-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .dr-profile-tag{padding:2px 8px;border-radius:10px;background:#ede9fe;color:#5b21b6;font-size:11px;}
  .dr-profile-dec{font-size:11px;color:#374151;padding:3px 0;border-bottom:1px solid #f1f5f9;}
  .dr-profile-dec:last-child{border-bottom:0;}
  .dr-tpl-body{display:none;margin-top:8px;}
  .dr-tpl-body.open{display:block;}
  .dr-tpl-filters{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;}
  .dr-tpl-filter{padding:3px 8px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid #cbd5e1;background:#fff;color:#475569;}
  .dr-tpl-filter.active{background:#3b82f6;color:#fff;border-color:#3b82f6;}
  .dr-tpl-list{max-height:200px;overflow-y:auto;}
  .dr-tpl-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin:3px 0;transition:background .15s;border-left:3px solid transparent;}
  .dr-tpl-item:hover{background:#eff6ff;border-left-color:#3b82f6;}
  .dr-tpl-item-title{font-weight:600;color:#1e293b;font-size:12px;}
  .dr-tpl-item-content{color:#64748b;font-size:11px;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:300px;}
  .dr-tpl-search{width:100%;padding:5px 8px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;margin-bottom:6px;}
  /* H1 翻译面板 */
  .dr-trans{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;}
  .dr-trans-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
  .dr-trans-body{margin-top:8px;display:none;}
  .dr-trans-body.open{display:block;}
  .dr-trans-text{background:#e0f2fe;border-radius:6px;padding:8px 10px;font-size:13px;color:#0c4a6e;margin-bottom:8px;word-break:break-word;line-height:1.5;}
  .dr-trans-tag{font-size:10px;color:#0369a1;background:#e0f2fe;padding:2px 7px;border-radius:8px;margin-right:4px;}
  /* H2 批量操作栏 */
  .dr-select-bar{display:none;position:sticky;top:0;background:#1e3a5f;color:#fff;padding:10px 16px;border-radius:8px;margin-bottom:12px;z-index:100;justify-content:space-between;align-items:center;font-size:13px;}
  .dr-select-bar.visible{display:flex;}
  .dr-select-btn{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:none;font-weight:600;}
  /* H2 键盘快捷键提示 */
  .dr-kb-hint{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#94a3b8;font-size:11px;padding:6px 12px;border-radius:8px;opacity:.8;pointer-events:none;}
  /* F1 快捷回复按钮组 */
  .dr-suggest{margin-top:8px;border-top:1px solid #bbf7d0;padding-top:8px;}
  .dr-suggest-lbl{font-size:10px;color:#6b7280;margin-bottom:4px;font-weight:600;letter-spacing:.03em;}
  .dr-suggest-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .dr-suggest-btn{padding:4px 10px;border:1px solid #16a34a;border-radius:12px;font-size:11px;background:#fff;color:#15803d;cursor:pointer;transition:background .12s;}
  .dr-suggest-btn:hover{background:#dcfce7;}
  /* E1 对话历史时间轴 */
  .dr-ctx{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:12px;}
  .dr-ctx-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;color:#475569;}
  .dr-ctx-body{margin-top:8px;display:none;max-height:220px;overflow-y:auto;}
  .dr-ctx-body.open{display:block;}
  .dr-bubble-wrap{display:flex;margin:4px 0;}
  .dr-bubble-wrap.out{justify-content:flex-end;}
  .dr-bubble{max-width:75%;padding:6px 10px;border-radius:10px;font-size:12px;line-height:1.45;word-break:break-word;}
  .dr-bubble-wrap.in .dr-bubble{background:#e0f2fe;color:#0c4a6e;border-radius:10px 10px 10px 2px;}
  .dr-bubble-wrap.out .dr-bubble{background:#d1fae5;color:#064e3b;border-radius:10px 10px 2px 10px;}
  .dr-bubble-ts{font-size:10px;color:#94a3b8;margin-top:2px;text-align:right;}
  .ui-ic{display:inline-block;vertical-align:middle;flex:0 0 auto;}
  .dr-hdr-ic{display:inline-flex;align-items:center;gap:5px;}
</style>
{% endblock %}
{% block content %}
<div class="dr-wrap">
  <div class="dr-header">
    <h2 style="margin:0;font-size:18px;display:inline-flex;align-items:center;"><span data-ui-icon="clipboard" data-size="17" style="margin-right:7px;"></span><span data-i18n="draft.title">草稿审批工作台</span></h2>
    <div style="display:flex;gap:10px;align-items:center;">
      <button onclick="triggerBulkAutosend()" id="btn-bulk" style="padding:5px 12px;border:1px solid #16a34a;border-radius:6px;background:#fff;color:#16a34a;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;"><span data-ui-icon="zap" data-size="13" style="margin-right:5px;"></span><span data-i18n="draft.bulk_l2">一键发所有 L2</span></button>
      <a href="/workspace/draft-audit" id="audit-link" style="font-size:13px;color:#2563eb;text-decoration:none;display:none;" data-i18n="draft.audit_link">查看审计日志 →</a>
    </div>
  </div>
  <div class="dr-tabs">
    <button class="dr-tab active" onclick="setFilter('pending','','')" data-i18n="draft.tab.all">全部待审</button>
    <button class="dr-tab" onclick="setFilter('pending','','L3')" data-i18n="draft.tab.l3">L3 待审批</button>
    <button class="dr-tab" onclick="setFilter('pending','','L4')"><span data-ui-icon="ban" data-size="13" style="margin-right:5px;vertical-align:-2px;"></span><span data-i18n="draft.tab.l4">L4 拦截</span></button>
    <button class="dr-tab" onclick="setFilter('pending','','L2')" data-i18n="draft.tab.l2">L2 自动</button>
    <button class="dr-tab" onclick="setFilter('approved','','')" data-i18n="draft.tab.approved">已批准</button>
    <button class="dr-tab" onclick="setFilter('rejected','','')" data-i18n="draft.tab.rejected">已拒绝</button>
  </div>
  <!-- H2 批量操作栏 -->
  <div id="dr-select-bar" class="dr-select-bar">
    <span id="dr-select-count"></span>
    <div style="display:flex;gap:8px;">
      <button class="dr-select-btn" style="background:#16a34a;display:inline-flex;align-items:center;" onclick="bulkAct('approve')"><span data-ui-icon="check" data-size="13" style="margin-right:5px;"></span><span data-i18n="draft.sel.approve">批量批准</span></button>
      <button class="dr-select-btn" style="background:#dc2626;display:inline-flex;align-items:center;" onclick="bulkAct('reject')"><span data-ui-icon="x" data-size="13" style="margin-right:5px;"></span><span data-i18n="draft.sel.reject">批量拒绝</span></button>
      <button class="dr-select-btn" style="background:#475569;" onclick="clearSel()" data-i18n="draft.sel.clear">取消选择</button>
    </div>
  </div>
  <div id="dr-list"><div class="dr-loading" data-i18n="dash.loading">加载中…</div></div>
</div>
<div class="dr-kb-hint" data-i18n="draft.kb_hint">? = 快捷键说明</div>
<script>
(function(){
var _status='pending', _platform='', _level='';
var _isSup=false;
var COLORS={L0:'l0',L1:'l1',L2:'l2',L3:'l3',L4:'l4'};
var BADGES={L0:'badge-l0',L1:'badge-l1',L2:'badge-l2',L3:'badge-l3',L4:'badge-l4'};
function LABEL(lv){ return window.T('draft.lvl.'+lv, lv); }
function _drHdr(icon,key){
  return '<span class="dr-hdr-ic">'+(typeof uiIcon==='function'?uiIcon(icon,13):'')+'<span>'+window.T(key)+'</span></span>';
}
function _platIcon(plat){
  if(typeof platformIconSVG==='function') return platformIconSVG(plat,{size:15});
  if(typeof uiIcon==='function') return uiIcon('inbox',15);
  return '';
}

fetch('/api/workspace/me').then(function(r){return r.json();}).then(function(m){
  if(m&&m.ok){ _isSup=!!(m.is_supervisor); }
  var auditLink=document.getElementById('audit-link');
  if(_isSup && auditLink) auditLink.style.display='inline';
  load();
}).catch(function(){ load(); });

function setFilter(s,p,l){
  _status=s; _platform=p; _level=l;
  document.querySelectorAll('.dr-tab').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  load();
}
function esc(t){ var d=document.createElement('div'); d.textContent=t||''; return d.innerHTML; }

// K1/K2 toast（复用 workspace_base CRMW；降级为原生 alert 兜底）
function _drToast(msg, style, dur, icon){
  style = style||'info';
  try{
    var color={'warn':'#b91c1c','info':'#0f766e','success':'#16a34a'}[style]||'#2563eb';
    if(window.CRMW&&CRMW.toast){ CRMW.toast(msg, color, icon); return; }
  }catch(_){}
  var el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 18px;'
    +'border-radius:8px;background:#1e293b;color:#fff;font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.25);max-width:320px;cursor:pointer;';
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();}, dur||4000);
  el.onclick=function(){el.remove();};
}
function fmtTs(ts){ if(!ts) return ''; return window.wsFmtDate(ts,{month:'2-digit',day:'2-digit'})+' '+window.wsFmtTime(ts,{hour:'2-digit',minute:'2-digit'}); }

function load(){
  var url='/api/drafts?status='+encodeURIComponent(_status)+'&limit=100';
  if(_platform) url+='&platform='+encodeURIComponent(_platform);
  document.getElementById('dr-list').innerHTML='<div class="dr-loading">'+window.T('dash.loading')+'</div>';
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok){ document.getElementById('dr-list').innerHTML='<div class="dr-empty">'+window.T('draft.empty.svc')+'</div>'; return; }
    var drafts=(d.drafts||[]).filter(function(dr){
      if(!_level) return true;
      return (dr.autopilot_level||'L1')===_level;
    });
    if(!drafts.length){ document.getElementById('dr-list').innerHTML='<div class="dr-empty">'+window.T('draft.empty.none')+'</div>'; return; }
    document.getElementById('dr-list').innerHTML=drafts.map(function(dr,ix){
      var lv=dr.autopilot_level||'L1';
      var cls=COLORS[lv]||'l1';
      var badgeCls=BADGES[lv]||'badge-l1';
      var lbl=LABEL(lv);
      var plat=dr.platform||'inbox';
      var platIcon=_platIcon(plat);
      var isL4=lv==='L4';
      var isL2=lv==='L2';
      var isL3=lv==='L3';
      var reasons=(dr.risk_reasons||[]).join('、');
      var isPending=(dr.status||'pending')==='pending';
      // D1 SLA 超时检测（4h = 14400s）
      var createdTs=parseFloat(dr.created_ts||0);
      var slaTimeout=4*3600;
      var isSlaOverdue=(isL3||isL4)&&createdTs>0&&(Date.now()/1000-createdTs)>slaTimeout;
      var warnHtml=isL4?'<div class="dr-warn">'+window.T('draft.l4_warn')+'</div>':'';
      var editBoxId='edit-'+ix;
      var actHtml='';
      if(isPending){
        if(isL2){
          actHtml+='<button class="dr-btn btn-autosend" onclick="resolve(\''+esc(dr.draft_id)+'\',\'autosend\',\'\',this)">'+window.T('draft.act.autosend')+'</button>';
        }
        if(!isL4){
          actHtml+='<button class="dr-btn btn-approve" onclick="resolve(\''+esc(dr.draft_id)+'\',\'approve\',\'\',this)">'+window.T('draft.act.approve')+'</button>';
          actHtml+='<button class="dr-btn btn-edit" onclick="toggleEdit(\''+editBoxId+'\',this)">'+window.T('draft.act.edit')+'</button>';
        }
        actHtml+='<button class="dr-btn btn-reject" onclick="resolve(\''+esc(dr.draft_id)+'\',\'reject\',\'\',this)">'+window.T('draft.act.reject')+'</button>';
        if(isL4 && _isSup){
          actHtml+='<button class="dr-btn btn-override" onclick="forceOverride(\''+esc(dr.draft_id)+'\',this)">'+window.T('draft.act.override')+'</button>';
        }
        // P2: KB 归档按钮（主管，回复文本存在时显示）
        if(_isSup && (dr.draft_text||dr.final_text)){
          actHtml+='<button class="dr-btn" style="border:1px solid #7c3aed;color:#7c3aed;background:#faf5ff;" '
            +'onclick="kbArchive(\''+esc(dr.draft_id)+'\',this)">'+window.T('draft.act.kb')+'</button>';
        }
      }
      var slaHtml=isSlaOverdue?'<span class="badge-sla">'+window.T('draft.sla_overdue')+'</span> ':'';
      // C2 Copilot 面板（懒加载，点击展开）
      var copilotId='copilot-'+ix;
      var peerEncoded=encodeURIComponent(dr.peer_text||'');
      var copilotHtml='';
      if(dr.peer_text){
        copilotHtml='<div class="dr-copilot">'
          +'<div class="dr-copilot-header" onclick="toggleCopilot(\''+copilotId+'\',\''+peerEncoded+'\',this)">'
          +_drHdr('bot','draft.cp.title')+'<span style="font-size:11px;color:#6b7280;">'+window.T('draft.expand')+'</span></div>'
          +'<div class="dr-copilot-body" id="'+copilotId+'"><span class="dr-copilot-loading">'+window.T('dash.loading')+'</span></div>'
          +'</div>';
      }
      // E1 对话历史上下文（有 conversation_id 才渲染）
      var ctxId='ctx-'+ix;
      var ctxHtml='';
      if(dr.conversation_id){
        var convEnc=encodeURIComponent(dr.conversation_id);
        ctxHtml='<div class="dr-ctx">'
          +'<div class="dr-ctx-header" onclick="toggleCtx(\''+ctxId+'\',\''+convEnc+'\',this)">'
          +_drHdr('scroll','draft.ctx.title')+'<span style="font-size:11px;">'+window.T('draft.expand')+'</span></div>'
          +'<div class="dr-ctx-body" id="'+ctxId+'"></div>'
          +'</div>';
      }
      // K3 客户画像面板
      var profileId='profile-'+ix;
      var profileHtml='';
      if(dr.conversation_id){
        profileHtml='<div class="dr-profile">'
          +'<div class="dr-profile-header" onclick="toggleProfile(\''+profileId+'\',\''+encodeURIComponent(dr.conversation_id)+'\',this)">'
          +_drHdr('user','draft.profile.title')+'<span style="font-size:11px;color:#7c3aed;">'+window.T('draft.expand')+'</span></div>'
          +'<div class="dr-profile-body" id="'+profileId+'"></div>'
          +'</div>';
      }
      // I3 模板选择器面板
      var tplId='tpl-'+ix;
      var tplHtml='';
      if(isPending){
        tplHtml='<div class="dr-tpl">'
          +'<div class="dr-tpl-header" onclick="toggleTpl(\''+tplId+'\',\''+esc(dr.draft_id)+'\',this)">'
          +_drHdr('book','draft.tpl.title')+'<span style="font-size:11px;color:#475569;">'+window.T('draft.expand')+'</span></div>'
          +'<div class="dr-tpl-body" id="'+tplId+'"></div>'
          +'</div>';
      }
      // I1 对话智能徽章（通过 conv-meta API 懒加载）
      var intelId='intel-'+ix;
      var intelHtml='<div class="dr-intel" id="'+intelId+'">';
      if(dr.conversation_id){
        intelHtml+='<span style="font-size:11px;color:#94a3b8;">'+window.T('draft.intel.loading')+'</span>';
      }
      intelHtml+='</div>';
      // H1 翻译面板
      var transId='trans-'+ix;
      var transHtml='';
      if(dr.draft_text&&isPending){
        transHtml='<div class="dr-trans">'

function toggleEdit(boxId, btn){
  var box=document.getElementById(boxId);
  if(!box) return;
  if(box.style.display==='none'||!box.style.display){
    box.style.display='block'; btn.textContent=window.T('draft.cancel_edit');
    // 在编辑框旁加一个发送按钮
    if(!box.nextSibling||!box.nextSibling.classList||!box.nextSibling.classList.contains('send-edited')){
      var sendBtn=document.createElement('button');
      sendBtn.className='dr-btn btn-approve send-edited';
      sendBtn.textContent=window.T('draft.confirm_send');
      sendBtn.onclick=function(){
        var did=box.getAttribute('data-did');
        if(!did){ did=boxId; }
        resolve(did,'edit_send',box.value,sendBtn);
      };
      // 保存 draft_id 到 box
      var draftId=boxId.replace('edit-','');
      box.setAttribute('data-did', (window._drafts&&window._drafts[draftId])||'');
      box.parentNode.insertBefore(sendBtn, box.nextSibling);
    }
  } else {
    box.style.display='none'; btn.textContent=window.T('draft.act.edit');
    var next=box.nextSibling;
    if(next&&next.classList&&next.classList.contains('send-edited')) next.remove();
  }

function resolve(draftId, action, text, btn){
  if(btn){ btn.disabled=true; btn.textContent='…'; }
  fetch('/api/drafts/'+encodeURIComponent(draftId)+'/resolve',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:action, text:text||''})
  }).then(function(r){return r.json();}).then(function(d){
    if(d&&d.ok){
      if(btn){ btn.textContent=window.T('draft.done'); btn.style.opacity='0.6'; }
      setTimeout(load, 600);
    } else {
      if(btn){ btn.disabled=false; btn.textContent=window.T('draft.retry'); }
      var msg=(d&&d.detail)||(d&&d.error)||window.T('draft.op_fail');
      alert(window.Tf('draft.op_fail_msg',{msg:msg}));
    }
  }).catch(function(){
    if(btn){ btn.disabled=false; btn.textContent=window.T('draft.retry'); }
    alert(window.T('draft.net_err_retry'));
  });
}

function forceOverride(draftId, btn){
  if(!confirm(window.T('draft.override_confirm'))) return;
  if(btn){ btn.disabled=true; btn.textContent='…'; }
  fetch('/api/drafts/'+encodeURIComponent(draftId)+'/force-override',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:'approve'})
  }).then(function(r){return r.json();}).then(function(d){
    if(d&&d.ok){
      if(btn){ btn.textContent=window.T('draft.released'); btn.style.opacity='0.6'; }
      setTimeout(load, 600);
    } else {
      if(btn){ btn.disabled=false; btn.textContent=window.T('draft.act.override'); }
      alert(window.Tf('draft.release_fail',{msg:((d&&d.detail)||(d&&d.error)||window.T('dash.unknown'))}));
    }
  }).catch(function(){
    if(btn){ btn.disabled=false; btn.textContent=window.T('draft.act.override'); }
    alert(window.T('draft.net_err'));
  });
}

function fillDraft(editBoxId, text){
  // F1：把快捷回复文本填入编辑框（展开编辑框 + 填入 + 提示）
  var box=document.getElementById(editBoxId);
  if(!box) return;
  box.value=text;
  // 自动展开编辑框（如果是隐藏状态）
  if(box.style.display==='none'||!box.style.display){
    box.style.display='block';
    // 找到同卡片的「编辑后发」按钮并更新
    var editBtn=box.previousSibling;
    if(editBtn&&editBtn.classList&&editBtn.classList.contains('btn-edit')){
      editBtn.textContent=window.T('draft.cancel_edit');
      // 如果还没有「确认发送」按钮则插入
      if(!box.nextSibling||!box.nextSibling.classList||!box.nextSibling.classList.contains('send-edited')){
        var sendBtn=document.createElement('button');
        sendBtn.className='dr-btn btn-approve send-edited';
        sendBtn.textContent=window.T('draft.confirm_send');
        sendBtn.onclick=function(){
          var did=box.getAttribute('data-did');
          resolve(did,'edit_send',box.value,sendBtn);
        };
        box.parentNode.insertBefore(sendBtn,box.nextSibling);
      }
    }
  }
  box.focus();
  box.setSelectionRange(box.value.length, box.value.length);
}

// H2 批量操作
function getSelectedIds(){
  var ids=[];
  document.querySelectorAll('.dr-chk:checked').forEach(function(c){ ids.push(c.getAttribute('data-id')); });
  return ids;
}
function updateSelectBar(){
  var ids=getSelectedIds();
  var bar=document.getElementById('dr-select-bar');
  var cnt=document.getElementById('dr-select-count');
  if(ids.length>0){
    bar.classList.add('visible');
    if(cnt) cnt.textContent=window.Tf('draft.sel.count',{n:ids.length});
  } else {
    bar.classList.remove('visible');
  }
}
function clearSel(){
  document.querySelectorAll('.dr-chk:checked').forEach(function(c){ c.checked=false; });
  updateSelectBar();
}
function bulkAct(action){
  var ids=getSelectedIds();
  if(!ids.length) return;
  var label=action==='approve'?window.T('draft.bulk.approve'):window.T('draft.bulk.reject');
  if(!confirm(window.Tf('draft.bulk.confirm',{label:label,n:ids.length}))) return;
  fetch('/api/drafts/bulk-resolve',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({action:action,draft_ids:ids})
  }).then(function(r){return r.json();}).then(function(d){
    if(d&&d.ok){
      alert(window.Tf('draft.bulk.done2',{label:label,ok:d.succeeded,fail:d.failed}));
      clearSel(); load();
    } else { alert((d&&d.detail)||(d&&d.error)||window.Tf('draft.bulk.fail2',{label:label})); }
  }).catch(function(){ alert(window.T('draft.net_err')); });
}

// H2 键盘快捷键（card 级导航）
var _curCardIdx=-1;
function cardKeydown(ev, cardEl){
  if(ev.key==='a'||ev.key==='A'){
    ev.preventDefault();
    var did=cardEl.getAttribute('data-draft-id');
    if(did&&cardEl.getAttribute('data-pending')==='true'){
      var approveBtn=cardEl.querySelector('.btn-approve');
      if(approveBtn&&!approveBtn.disabled) approveBtn.click();
    }
  } else if(ev.key==='r'||ev.key==='R'){
    ev.preventDefault();
    var did=cardEl.getAttribute('data-draft-id');
    if(did&&cardEl.getAttribute('data-pending')==='true'){
      var rejectBtn=cardEl.querySelector('.btn-reject');
      if(rejectBtn&&!rejectBtn.disabled) rejectBtn.click();
    }
  } else if(ev.key==='ArrowDown'||ev.key==='j'){
    ev.preventDefault();
    var next=cardEl.nextElementSibling;
    if(next&&next.classList&&next.classList.contains('dr-card')) next.focus();
  } else if(ev.key==='ArrowUp'||ev.key==='k'){
    ev.preventDefault();
    var prev=cardEl.previousElementSibling;
    if(prev&&prev.classList&&prev.classList.contains('dr-card')) prev.focus();
  } else if(ev.key==='?'){
    alert(window.T('draft.kb_alert'));
  }
}

// I1 对话智能元数据懒加载
var _intelCache = {};
function loadIntel(intelId, convId){
  var el=document.getElementById(intelId);
  if(!el || !convId) return;
  if(_intelCache[convId]){
    _renderIntel(el, _intelCache[convId]);
    return;
  }
  fetch('/api/unified-inbox/conv-meta?conversation_id='+encodeURIComponent(convId))
    .then(function(r){return r.json();}).then(function(d){
      if(d&&d.found&&d.meta){
        _intelCache[convId]=d.meta;
        _renderIntel(el, d.meta);
      } else {
        el.innerHTML='';
      }
    }).catch(function(){ el.innerHTML=''; });
}
function _renderIntel(el, meta){
  if(!el||!meta) return;
  var trend=meta.emotion_trend||'stable';
  var trendIcon={'rising':uiIcon('trend-up',12),'falling':uiIcon('trend-down',12),'stable':uiIcon('chart',12)}[trend]||uiIcon('chart',12);
  var trendCls=trend==='rising'?'rising':trend==='falling'?'falling':'';
  var riskCls=meta.last_risk==='high'?'dr-intel-risk-high':meta.last_risk==='medium'?'dr-intel-risk-medium':'';
  var html='<span class="dr-intel-trend" title="'+window.T('draft.intel.trend_t')+'">'+trendIcon+'</span>';
  if(meta.last_intent) html+='<span class="dr-intel-badge dr-intel-intent" title="'+window.T('draft.intel.intent_t')+'">'+esc(meta.last_intent)+'</span>';
  if(meta.last_emotion) html+='<span class="dr-intel-badge dr-intel-emotion '+trendCls+'" title="'+window.T('draft.intel.emotion_t')+'">'+esc(meta.last_emotion)+'</span>';
  if(meta.last_risk&&meta.last_risk!=='low') html+='<span class="dr-intel-badge '+riskCls+'" title="'+window.T('draft.intel.risk_t')+'">'+uiIcon('alert',12)+' '+esc(meta.last_risk)+'</span>';
  if(meta.msg_count) html+='<span style="font-size:10px;color:#94a3b8;">'+window.Tf('draft.intel.msg_count',{n:meta.msg_count})+'</span>';
  el.innerHTML=html;
}

  body.setAttribute('data-loaded','1');
  body.innerHTML='<span style="color:#94a3b8;font-size:12px;">'+window.T('dash.loading')+'</span>';
  var cid=decodeURIComponent(convEnc);
  body.setAttribute('data-cid',cid);
  fetch('/api/unified-inbox/contact-profile?conversation_id='+encodeURIComponent(cid))
    .then(function(r){return r.json();})
    .then(function(d){ _renderProfile(body, d); })
    .catch(function(){ body.innerHTML='<span style="color:#94a3b8;font-size:12px;">'+window.T('dash.load_fail')+'</span>'; });
}
function _renderProfile(body, d){
  var html='';
  // R9d 危机概览（最高优先级，置顶醒目）
  var cr=d.crisis;
  if(cr&&cr.total){
    var lt=cr.latest||{};
    var sev=lt.level==='severe';
    var bg=sev?'#fee2e2':'#fef3c7', fg=sev?'#991b1b':'#92400e';
    var when=lt.created_at?window.wsFmtDateTime(lt.created_at):'';
    html+='<div style="background:'+bg+';color:'+fg+';border-radius:8px;padding:8px 10px;margin-bottom:8px;">';
    html+='<div style="font-weight:700;font-size:12px;margin-bottom:3px;">'+window.Tf('draft.pf.crisis',{n:cr.total})
      +(cr.unhandled>0?(' · <span style="text-decoration:underline;">'+window.Tf('draft.pf.unhandled',{n:cr.unhandled})+'</span>'):' · '+window.T('draft.pf.all_handled'))+'</div>';
    html+='<div style="font-size:11px;">'+window.T('draft.pf.latest')+esc(lt.level||'')+(lt.category?('／'+esc(lt.category)):'')
      +(lt.escalated?' · '+window.T('draft.pf.escalated'):'')+(when?(' · '+when):'')+'</div>';
    html+='<a href="/crisis-audit?only_unhandled=1" target="_blank" style="display:inline-block;margin-top:4px;font-size:11px;color:'+fg+';font-weight:600;">'+window.T('draft.pf.go_crisis')+'</a>';
    html+='</div>';
  }
  var m=d.conv_meta||{};
  // 对话智能
  if(m&&(m.last_intent||m.last_emotion||m.msg_count)){
    html+='<div style="font-weight:600;font-size:11px;color:#5b21b6;margin-bottom:4px;">'+window.T('draft.pf.conv_intel')+'</div>';
    html+='<div class="dr-profile-row">';
    if(m.last_intent) html+='<span class="dr-profile-tag">'+window.T('draft.f.intent')+esc(m.last_intent)+'</span>';
    if(m.last_emotion) html+='<span class="dr-profile-tag">'+window.T('draft.f.emotion')+esc(m.last_emotion)+'</span>';
    if(m.emotion_trend){
      var trendIcon={'rising':uiIcon('trend-up',12),'falling':uiIcon('trend-down',12),'stable':uiIcon('chart',12)}[m.emotion_trend]||'';
      html+='<span class="dr-profile-tag">'+window.T('draft.pf.trend')+trendIcon+esc(m.emotion_trend)+'</span>';
    }
    if(m.last_risk) html+='<span class="dr-profile-tag">'+window.T('draft.f.risk')+esc(m.last_risk)+'</span>';
    if(m.msg_count) html+='<span class="dr-profile-tag">'+window.Tf('draft.pf.msg_n',{n:m.msg_count})+'</span>';
    html+='</div>';
    // 意图历史气泡
    if(m.intent_history&&m.intent_history.length){
      html+='<div style="font-size:11px;color:#6b7280;margin-bottom:4px;">'+window.T('draft.pf.recent_intents')+m.intent_history.slice(-5).map(function(i){ return '<span style="padding:1px 5px;background:#ede9fe;border-radius:6px;margin-right:3px;">'+esc(i)+'</span>'; }).join('')+'</div>';
    }
  }
  // CRM 档案
  var c=d.contact||{};
  if(c&&(c.name||c.funnel_stage||c.tags)){
    html+='<div style="font-weight:600;font-size:11px;color:#5b21b6;margin:6px 0 4px;">'+window.T('draft.pf.crm')+'</div>';
    html+='<div class="dr-profile-row">';
    if(c.name) html+='<span class="dr-profile-tag">'+window.T('draft.f.customer')+esc(c.name)+'</span>';
    if(c.funnel_stage) html+='<span class="dr-profile-tag">'+window.T('draft.pf.funnel')+esc(c.funnel_stage)+'</span>';
    if(c.follow_up_overdue) html+='<span class="dr-profile-tag" style="background:#fee2e2;color:#991b1b;">'+window.T('draft.pf.followup_overdue')+'</span>';
    (c.tags||[]).slice(0,5).forEach(function(t){ html+='<span class="dr-profile-tag">'+esc(t)+'</span>'; });
    html+='</div>';
    if(c.note) html+='<div style="font-size:11px;color:#374151;margin-top:2px;">'+window.T('draft.pf.note')+esc(c.note)+'</div>';
  }
  // R14 记忆画像聚合（确切知道什么 vs AI 待确认）
  var mp=d.memory_profile;
  if(mp&&mp.total){
    html+='<div style="font-weight:600;font-size:11px;color:#5b21b6;margin:6px 0 4px;">'+window.T('draft.pf.memory')+'</div>';
    html+='<div class="dr-profile-row">';
    html+='<span class="dr-profile-tag" style="background:#dbeafe;color:#1e40af;">'+window.Tf('draft.pf.stable',{n:mp.stable})+'</span>';
    html+='<span class="dr-profile-tag">'+window.Tf('draft.pf.raw',{n:mp.raw})+'</span>';
    html+='<span class="dr-profile-tag" style="background:#dcfce7;color:#166534;">'+window.Tf('draft.pf.user_stated',{n:mp.user_stated})+'</span>';
    if(mp.ai_inferred>0) html+='<span class="dr-profile-tag" style="background:#fef3c7;color:#92400e;">'+window.Tf('draft.pf.ai_inferred',{n:mp.ai_inferred})+'</span>';
    html+='</div>';
    if(mp.top_stable&&mp.top_stable.length){
      html+='<div style="font-size:11px;color:#374151;margin-top:2px;">'+window.T('draft.pf.core')
        +mp.top_stable.map(function(t){ return '<span style="padding:1px 5px;background:#eff6ff;border-radius:6px;margin-right:3px;">'+esc(t)+'</span>'; }).join('')+'</div>';
    }
    // R15 待确认推断：坐席一键转明说
    if(mp.pending_inferred&&mp.pending_inferred.length){
      html+='<div style="font-size:11px;color:#92400e;margin-top:5px;">'+window.T('draft.pf.pending_inferred')+'</div>';
      mp.pending_inferred.forEach(function(p){
        html+='<div style="display:flex;align-items:center;gap:6px;margin-top:3px;">'
          +'<span style="flex:1;font-size:11px;background:#fef3c7;color:#92400e;border-radius:6px;padding:2px 6px;">'+esc(p.content)+'</span>'
          +'<button onclick="_confirmFact(this,'+p.id+')" style="font-size:11px;border:none;background:#16a34a;color:#fff;border-radius:6px;padding:2px 8px;cursor:pointer;">'+window.T('draft.pf.confirm')+'</button>'
          +'</div>';
      });
    }
  }
  // 近期草稿决策
  var decs=d.recent_decisions||[];
  if(decs.length){
    html+='<div style="font-weight:600;font-size:11px;color:#5b21b6;margin:6px 0 4px;">'+window.T('draft.pf.recent_dec')+'</div>';
    var _acn={'approved':window.T('draft.acn.approved'),'rejected':window.T('draft.acn.rejected'),'autosend':window.T('draft.acn.autosend'),'force_override':window.T('draft.acn.force_override'),'auto_reassigned':window.T('draft.acn.auto_reassigned')};
    decs.forEach(function(r){
      var ts=r.ts>0?window.wsFmtDate(r.ts):'';
      html+='<div class="dr-profile-dec">'+(_acn[r.action]||esc(r.action))+' '
        +(r.risk_level?'<span style="color:#94a3b8;">['+esc(r.risk_level)+']</span> ':'')+esc(r.agent_id||'')
        +(ts?' <span style="color:#94a3b8;float:right;">'+ts+'</span>':'')+'</div>';
    });
  }
  if(!html) html='<span style="color:#94a3b8;font-size:12px;">'+window.T('draft.pf.no_data')+'</span>';
  body.innerHTML=html;
}

// R15：确认一条 AI 推断为属实，成功后就地刷新画像
function _confirmFact(btn, id){
  btn.disabled=true; var old=btn.textContent; btn.textContent='…';
  var holder=btn; while(holder&&!holder.getAttribute('data-cid')) holder=holder.parentNode;
  fetch('/api/episodic-memory/'+id+'/confirm',{method:'POST'})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(){
      if(holder){
        var cid=holder.getAttribute('data-cid');
        holder.innerHTML='<span style="color:#94a3b8;font-size:12px;">'+window.T('draft.pf.refreshing')+'</span>';
        fetch('/api/unified-inbox/contact-profile?conversation_id='+encodeURIComponent(cid))
          .then(function(r){return r.json();})
          .then(function(d){ _renderProfile(holder, d); })
          .catch(function(){ holder.innerHTML='<span style="color:#94a3b8;font-size:12px;">'+window.T('draft.pf.refresh_fail')+'</span>'; });
      }
    })
    .catch(function(){ btn.disabled=false; btn.textContent=old; });
}

function toggleTpl(bodyId, draftId, headerEl){
  var body=document.getElementById(bodyId);
  if(!body) return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    headerEl.lastChild.textContent=window.T('draft.expand');
    return;
  }
  body.classList.add('open');
  headerEl.lastChild.textContent=window.T('draft.collapse');
  _renderTplBody(body, draftId, '');
}
function _renderTplBody(body, draftId, search){
  body.innerHTML='<input class="dr-tpl-search" placeholder="'+window.T('draft.tpl_search_ph')+'" oninput="tplSearch(this,\''+bodyId(body)+'\',\''+esc(draftId)+'\')" value="'+esc(search)+'">'
    +'<div class="dr-tpl-filters" id="tplf-'+bodyId(body)+'">'
    +'<span class="dr-tpl-filter '+((!_tplLang)?' active':'')+'" onclick="tplLang(this,\'\',\''+bodyId(body)+'\',\''+esc(draftId)+'\')">'+window.T('draft.tpl.all')+'</span>'
    +'<span class="dr-tpl-filter '+((_tplLang==='zh')?' active':'')+'" onclick="tplLang(this,\'zh\',\''+bodyId(body)+'\',\''+esc(draftId)+'\')">'+window.T('draft.tpl.lang_zh')+'</span>'
    +'<span class="dr-tpl-filter '+((_tplLang==='en')?' active':'')+'" onclick="tplLang(this,\'en\',\''+bodyId(body)+'\',\''+esc(draftId)+'\')">EN</span>'
    +'<span class="dr-tpl-filter '+((_tplLang==='ja')?' active':'')+'" onclick="tplLang(this,\'ja\',\''+bodyId(body)+'\',\''+esc(draftId)+'\')">'+window.T('draft.tpl.lang_ja')+'</span>'
    +'</div>'
    +'<div id="tpll-'+bodyId(body)+'"><span style="color:#94a3b8;font-size:11px;">'+window.T('dash.loading')+'</span></div>';
  _loadTplList(bodyId(body), draftId, search);
}
function bodyId(el){ return el.id||''; }
function tplSearch(input, bid, draftId){
  var search=input.value.trim();
  var listEl=document.getElementById('tpll-'+bid);
  if(listEl) listEl.innerHTML='<span style="color:#94a3b8;font-size:11px;">'+window.T('base.gs.searching')+'</span>';
  clearTimeout(input._st);
  input._st=setTimeout(function(){ _loadTplList(bid, draftId, search); }, 300);
}
function tplLang(el, lang, bid, draftId){
  _tplLang=lang;
  var fbar=document.getElementById('tplf-'+bid);
  if(fbar) fbar.querySelectorAll('.dr-tpl-filter').forEach(function(f){ f.classList.remove('active'); });
  if(el) el.classList.add('active');
  _loadTplList(bid, draftId, '');
}
function _loadTplList(bid, draftId, search){
  var listEl=document.getElementById('tpll-'+bid);
  if(!listEl) return;
  var url='/api/reply-templates?limit=50';
  if(_tplLang) url+='&language='+encodeURIComponent(_tplLang);
  if(search) url+='&search='+encodeURIComponent(search);
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.templates||!d.templates.length){
      listEl.innerHTML='<span style="color:#94a3b8;font-size:11px;">'+window.T('draft.tpl.no_tpl')+'</span>';
      return;
    }
    listEl.innerHTML=d.templates.map(function(t){
      return '<div class="dr-tpl-item" onclick="applyTpl(\''+esc(t.id)+'\','+JSON.stringify(t.content)+',\''+esc(draftId)+'\')" title="'+window.T('draft.tpl.apply_t')+'">'
        +'<div class="dr-tpl-item-title">'+esc(t.title)+'</div>'
        +'<div class="dr-tpl-item-content">'+esc(t.content)+'</div>'
        +'</div>';
    }).join('');
  }).catch(function(){
    listEl.innerHTML='<span style="color:#ef4444;font-size:11px;">'+window.T('dash.load_fail')+'</span>';
  });
}
function applyTpl(tplId, content, draftId){
  // 找到对应草稿卡片的编辑框
  var card=document.querySelector('[data-draft-id="'+CSS.escape(draftId)+'"]');
  if(!card) return;
  var box=card.querySelector('textarea');
  if(!box) return;
  fillDraft(box.id, content);
  // 上报模板使用
  fetch('/api/reply-templates/'+encodeURIComponent(tplId)+'/use',{method:'POST'}).catch(function(){});
}

// Q2: 显示 Copilot 质量评分徽章（注入到草稿卡）
function _showQualityBadge(copilotData, cardEl){
  if(!copilotData || copilotData.quality_score == null || copilotData.quality_score < 0) return;
  var score = copilotData.quality_score;
  var badge = copilotData.quality_badge || '';
  var breakdown = copilotData.quality_breakdown || {};
  var existing = cardEl && cardEl.querySelector('.q2-quality-badge');
  if(existing) existing.remove();
  if(!badge) return;
  var bdHtml = '';
  if(Object.keys(breakdown).length){
    var tips = [];
    if(breakdown.length!=null) tips.push(window.T('draft.q.length')+':'+breakdown.length);
    if(breakdown.politeness!=null) tips.push(window.T('draft.q.politeness')+':'+breakdown.politeness);
    if(breakdown.completeness!=null) tips.push(window.T('draft.q.completeness')+':'+breakdown.completeness);
    if(breakdown.lang_match!=null) tips.push(window.T('draft.q.lang_match')+':'+breakdown.lang_match);
    if(breakdown.risk_match!=null) tips.push(window.T('draft.q.risk_match')+':'+breakdown.risk_match);
    bdHtml = ' <span style="font-size:10px;color:#94a3b8;">('+tips.join(' ')+')</span>';
  }
  var el = document.createElement('span');
  el.className = 'q2-quality-badge';
  el.style.cssText = 'margin-left:6px;vertical-align:middle;';
  el.innerHTML = badge + bdHtml;
  var copilotHeader = cardEl && cardEl.querySelector('.dr-copilot-header');
  if(copilotHeader) copilotHeader.appendChild(el);
}

// P2: 知识库归档
window.kbArchive = function(draftId, btn){
  var title = prompt(window.T('draft.kb.prompt'));
  if(!title || !title.trim()) return;
  var origText = btn.textContent;
  btn.disabled = true;
  btn.textContent = window.T('draft.kb.archiving');
  fetch('/api/workspace/kb-archive', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({draft_id: draftId, title: title.trim()})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.ok){
      btn.textContent = window.T('draft.kb.archived');
      btn.style.background = '#f0fdf4';
      btn.style.color = '#16a34a';
      btn.style.borderColor = '#16a34a';
    } else {
      btn.textContent = window.T('draft.kb.fail');
      btn.disabled = false;
      setTimeout(function(){ btn.textContent = origText; btn.disabled = false; }, 2000);
    }
  })
  .catch(function(){
    btn.textContent = origText;
    btn.disabled = false;
  });
};
