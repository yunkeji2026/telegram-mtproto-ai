<!DOCTYPE html>
<html lang="{{ ui_lang|default('zh') }}-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}坐席工作台{% endblock %} · {{ site_name|default('智控王客户转化聊天系统') }}</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;color:#111827;background:#f3f4f6;}
  .ws-top{height:52px;display:flex;align-items:center;gap:12px;padding:0 18px;background:#1b2038;color:#fff;}
  .ws-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;}
  .ws-brand svg{width:20px;height:20px;}
  .ws-spacer{flex:1;}
  .ws-user{font-size:13px;color:#cbd5e1;}
  .ws-presence{border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:3px 8px;font-size:12px;background:rgba(255,255,255,.08);color:#fff;}
  .ws-funnel{font-size:11px;color:#cbd5e1;white-space:nowrap;}
  .ws-agents{font-size:11px;color:#94a3b8;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ws-logout{color:#fff;text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:4px 12px;}
  .ws-logout:hover{background:rgba(255,255,255,.12);}
  .ws-body{height:calc(100vh - 52px);overflow:hidden;}
  .ws-review{display:none;cursor:pointer;font-size:12px;background:#f59e0b;color:#1b2038;font-weight:600;border-radius:7px;padding:3px 9px;}
  .ws-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;}
  .ws-modal-box{background:#fff;border-radius:12px;max-width:560px;width:92vw;max-height:80vh;overflow:auto;padding:18px;}
  .ws-modal-box h3{margin:0 0 12px;font-size:16px;}
  .ws-rv-item{border:1px solid #e5e7eb;border-radius:9px;padding:10px;margin-bottom:10px;font-size:13px;}
  .ws-rv-cmp{display:flex;gap:10px;margin:6px 0;}
  .ws-rv-col{flex:1;background:#f9fafb;border-radius:7px;padding:7px;font-size:12px;}
  .ws-rv-acts{display:flex;gap:8px;margin-top:6px;}
  .ws-rv-acts button{flex:1;border:0;border-radius:7px;padding:7px;font-size:13px;cursor:pointer;}
  .ws-rv-yes{background:#16a34a;color:#fff;} .ws-rv-no{background:#e5e7eb;color:#374151;}
  .ws-modal-close{float:right;cursor:pointer;color:#6b7280;font-size:18px;}
</style>
{% block head %}{% endblock %}
<script>
(function(){
  var _f=window.fetch;
  window.fetch=function(url,opts){
    opts=opts||{};
    var m=(opts.method||'GET').toUpperCase();
    if(m!=='GET'&&m!=='HEAD'&&m!=='OPTIONS'){
      var t=document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      if(t){
        opts.headers=opts.headers||{};
        if(opts.headers instanceof Headers){opts.headers.set('X-CSRF-Token',t[1])}
        else{opts.headers['X-CSRF-Token']=t[1]}
      }
    }
    return _f.call(this,url,opts);
  };
})();
</script>
<script src="/static/workspace/crm-widgets.js"></script>
</head>
<body>
<header class="ws-top">
  <span class="ws-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M4 4h16v16H4z"/><path d="M4 9l8 5 8-5"/></svg>
    {{ site_name|default('智控王客户转化聊天系统') }} · 坐席工作台
  </span>
  <a class="ws-logout" href="/workspace" style="border:0;">会话</a>
  <a class="ws-logout" href="/workspace/contacts" style="border:0;">客户</a>
  <a class="ws-logout" href="/workspace/tasks" style="border:0;">待办</a>
  <a class="ws-logout" href="/workspace/dash" style="border:0;">概览</a>
  <a class="ws-logout" href="/workspace/drafts" style="border:0;" id="ws-drafts-link" title="L3/L4 待审草稿">草稿审批</a>
  <a class="ws-logout" href="/workspace/agent-perf" style="border:0;display:none;" id="ws-perf-link" title="坐席绩效看板（主管）">绩效</a>
  <span class="ws-spacer"></span>
  <a class="ws-review" id="ws-esc" style="background:#7c3aed;color:#fff;text-decoration:none;cursor:pointer;" title="升级：无人处理的严重超时会话"></a>
  <a class="ws-review" id="ws-l4-badge" href="/workspace/dash" style="background:#991b1b;color:#fff;text-decoration:none;cursor:pointer;display:none;" title="L4 高风险草稿待审批（需主管放行）"></a>
  <a class="ws-review" id="ws-sla" style="background:#dc2626;color:#fff;text-decoration:none;cursor:pointer;" title="SLA 严重超时未回复会话"></a>
  <a class="ws-review" id="ws-followup" style="background:#dc2626;color:#fff;text-decoration:none;" href="/workspace/tasks" title="到期待跟进任务"></a>
  <span id="ws-prefs-btn" style="cursor:pointer;font-size:16px;padding:0 6px;" title="告警设置（SLA 阈值 / 免打扰）">⚙</span>
  <span class="ws-review" id="ws-review" title="待裁决的合并候选" onclick="window.__wsReviews&&window.__wsReviews.open()"></span>
  <span class="ws-funnel" id="ws-funnel" title="今日 web 漏斗"></span>
  <span class="ws-agents" id="ws-agents-online" title="在线坐席"></span>
  <select class="ws-presence" id="ws-presence" title="我的状态">
    <option value="online">🟢 在线</option>
    <option value="busy">🟡 忙碌</option>
    <option value="offline">⚫ 离线</option>
  </select>
  <span class="ws-user">{{ (user_display_name or user_name or '') }}</span>
  <a class="ws-logout" href="/logout">退出登录</a>
</header>
<script>
(function(){
  var AGENT_ID = {{ (user_name or '')|tojson }};
  var AGENT_NAME = {{ (user_display_name or user_name or '')|tojson }};
  window.__wsAgent = { id: String(AGENT_ID||'agent'), name: String(AGENT_NAME||AGENT_ID||'agent') };

  function setPresence(st){
    fetch('/api/workspace/presence',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:st,display_name:window.__wsAgent.name})}).catch(function(){});
  }
  function heartbeat(){
    var sel=document.getElementById('ws-presence');
    fetch('/api/workspace/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:sel?sel.value:'online',display_name:window.__wsAgent.name})}).catch(function(){});
  }
  function loadFunnel(){
    fetch('/api/workspace/metrics/web-funnel').then(function(r){return r.json();}).then(function(d){
      var m=(d&&d.metrics)||{};
      var el=document.getElementById('ws-funnel');
      if(!el) return;
      var sess=m.web_sessions||0, inbound=m.web_inbound||0, ho=m.handoff_sent||0, cv=m.line_converted||0;
      el.textContent = 'Web 今日 '+sess+'会话 · '+inbound+'入站 · 引流'+ho+' · 转化'+cv;
    }).catch(function(){});
  }
  function loadAgents(){
    fetch('/api/workspace/presence').then(function(r){return r.json();}).then(function(d){
      var el=document.getElementById('ws-agents-online');
      if(!el) return;
      var agents=(d&&d.agents)||[];
      if(!agents.length){ el.textContent=''; return; }
      el.textContent = '在线 '+agents.map(function(a){
        var dot=a.status==='busy'?'🟡':(a.status==='online'?'🟢':'⚫');
        return dot+(a.display_name||a.agent_id);
      }).join(' · ');
    }).catch(function(){});
  }
  var sel=document.getElementById('ws-presence');
  if(sel){
    sel.addEventListener('change',function(){ setPresence(sel.value); });
    setPresence('online');
  }
  heartbeat(); loadFunnel(); loadAgents();
  setInterval(heartbeat, 30000);
  setInterval(loadFunnel, 120000);
  setInterval(loadAgents, 60000);
  window.addEventListener('beforeunload',function(){ setPresence('offline'); });
  window.__wsPresence = { refreshAgents: loadAgents, refreshFunnel: loadFunnel };
})();
</script>
<div class="ws-modal" id="ws-review-modal">
  <div class="ws-modal-box">
    <span class="ws-modal-close" onclick="window.__wsReviews&&window.__wsReviews.close()">×</span>
    <h3>待裁决的合并候选</h3>
    <div id="ws-review-list"></div>
  </div>
</div>
<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var badge=document.getElementById('ws-review');
  var modal=document.getElementById('ws-review-modal');
  var list=document.getElementById('ws-review-list');
  function ov(o){ if(!o) return '—'; return esc(o.primary_name||'未命名')+' · '+((o.channels||[]).map(esc).join('/')||'无渠道'); }
  function refresh(){
    fetch('/api/workspace/merge-reviews').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(badge) badge.style.display='none'; return; }
      var n=(d.reviews||[]).length;
      if(badge){ badge.style.display=n?'inline-block':'none'; badge.textContent='待审合并 '+n; }
      window.__wsReviewData=d.reviews||[];
      if(modal.style.display==='flex') render();
    }).catch(function(){});
  }
  function render(){
    var rv=window.__wsReviewData||[];
    if(!rv.length){ list.innerHTML='<div style="color:#6b7280;font-size:13px;">暂无待审项</div>'; return; }
    list.innerHTML=rv.map(function(r){
      return '<div class="ws-rv-item">'
        +'<div>置信度 '+(Number(r.confidence||0).toFixed(2))+' · 渠道 '+esc(r.candidate_channel||'')+'</div>'
        +'<div class="ws-rv-cmp"><div class="ws-rv-col"><b>候选</b><br>'+ov(r.candidate)+'</div>'
        +'<div class="ws-rv-col"><b>并入</b><br>'+ov(r.target)+'</div></div>'
        +'<div class="ws-rv-acts">'
        +'<button class="ws-rv-yes" onclick="window.__wsReviews.resolve(\''+esc(r.review_id)+'\',\'approve\')">通过合并</button>'
        +'<button class="ws-rv-no" onclick="window.__wsReviews.resolve(\''+esc(r.review_id)+'\',\'reject\')">拒绝</button>'
        +'</div></div>';
    }).join('');
  }
  window.__wsReviews={
    open:function(){ modal.style.display='flex'; render(); },
    close:function(){ modal.style.display='none'; },
    resolve:function(id,action){
      fetch('/api/workspace/merge-reviews/'+encodeURIComponent(id),{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action})})
        .then(function(r){return r.json();}).then(function(){ refresh(); }).catch(function(){});
    },
    refresh:refresh
  };
  modal.addEventListener('click',function(e){ if(e.target===modal) window.__wsReviews.close(); });
  refresh(); setInterval(refresh, 60000);

  // 到期待跟进徽标（优先显示「我的」到期任务，括号内为全部）
  var fuBadge=document.getElementById('ws-followup');
  function refreshFu(){
    fetch('/api/workspace/follow-ups?scope=due&limit=1').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(fuBadge) fuBadge.style.display='none'; return; }
      var mine=d.due_tasks_mine||0, all=(d.due_tasks!=null?d.due_tasks:(d.due_follow_ups||0));
      var show=mine||all;
      if(fuBadge){
        fuBadge.style.display=show?'inline-block':'none';
        fuBadge.textContent= mine ? ('待跟进 '+mine+(all>mine?(' / '+all):'')) : ('待跟进 '+all);
      }
    }).catch(function(){});
  }
  refreshFu(); setInterval(refreshFu, 60000);

  // SLA 严重超时徽标 + 下钻清单
  var slaBadge=document.getElementById('ws-sla');
  var _slaItems=[];
  function fmtWaitMin(sec){ return CRMW.fmtWaitMin(sec); }
  function refreshSla(){
    fetch('/api/workspace/sla-alerts').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(slaBadge) slaBadge.style.display='none'; return; }
      _slaItems=d.items||[];
      if(d.quiet){ if(slaBadge) slaBadge.style.display='none'; return; }
      var crit=d.critical||0, brk=d.breaching||0;
      if(slaBadge){
        slaBadge.style.display=(crit||brk)?'inline-block':'none';
        slaBadge.style.background = crit?'#dc2626':'#d97706';
        slaBadge.textContent = crit?('SLA 严重 '+crit):('SLA 超时 '+brk);
        slaBadge.title = crit? _slaItems.slice(0,8).map(function(it){return it.name+'（'+fmtWaitMin(it.wait_sec)+'）';}).join('\n') : ('有 '+brk+' 个会话超过警告阈值');
      }
    }).catch(function(){});
  }
  if(slaBadge){
    slaBadge.addEventListener('click',function(){
      if(!_slaItems.length){ location.href='/workspace'; return; }
      var top=_slaItems[0];
      try{ sessionStorage.setItem('ws_focus_conv', top.conversation_id); }catch(_){ }
      location.href='/workspace';
    });
  }
  refreshSla(); setInterval(refreshSla, 30000);

  // 升级徽标：无人有效处理的严重超时（全局口径，不受个人静默影响）
  var escBadge=document.getElementById('ws-esc');
  var _escItems=[];
  function refreshEsc(){
    fetch('/api/workspace/escalations').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(escBadge) escBadge.style.display='none'; return; }
      _escItems=d.items||[];
      var n=d.count||0;
      if(escBadge){
        escBadge.style.display=n?'inline-block':'none';
        escBadge.textContent='升级 '+n;
        escBadge.title=n? _escItems.slice(0,8).map(function(it){
          var rz={unclaimed:'无人认领',holder_offline:'坐席离线',holder_quiet:'坐席静音'}[it.reason]||it.reason;
          return it.name+'（'+fmtWaitMin(it.wait_sec)+'·'+rz+'）';
        }).join('\n') : '';
      }
    }).catch(function(){});
  }
  if(escBadge){
    escBadge.addEventListener('click',function(){
      if(!_escItems.length){ location.href='/workspace/dash'; return; }
      try{ sessionStorage.setItem('ws_focus_conv', _escItems[0].conversation_id); }catch(_){ }
      location.href='/workspace';
    });
  }
  refreshEsc(); setInterval(refreshEsc, 30000);

  // 告警设置面板（每坐席 SLA 阈值 + 免打扰时段 + 静音）
  function _hm(min){ if(min==null||min<0) return ''; var h=Math.floor(min/60),m=min%60; return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
  function _toMin(s){ if(!s) return -1; var p=String(s).split(':'); if(p.length<2) return -1; var h=parseInt(p[0],10),m=parseInt(p[1],10); if(isNaN(h)||isNaN(m)) return -1; return h*60+m; }
  function openPrefs(){
    var ov=document.getElementById('ws-prefs-modal');
    if(!ov){
      ov=document.createElement('div'); ov.id='ws-prefs-modal';
      ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9999;display:flex;align-items:center;justify-content:center;';
      ov.innerHTML='<div style="background:#fff;border-radius:12px;padding:20px;width:340px;max-width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.2);font-size:14px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><strong>告警设置</strong><span id="ws-prefs-x" style="cursor:pointer;color:#64748b;font-size:18px;">✕</span></div>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">警告阈值（分钟，空=全局）<input id="wp-warn" type="number" min="0" style="width:90px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">严重阈值（分钟，空=全局）<input id="wp-crit" type="number" min="0" style="width:90px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">免打扰 起<input id="wp-dnds" type="time" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">免打扰 止<input id="wp-dnde" type="time" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">完全静音告警<input id="wp-mute" type="checkbox"></label>'
        +'<div id="wp-hint" style="font-size:12px;color:#94a3b8;margin:6px 0 12px;"></div>'
        +'<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="wp-cancel" style="padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">取消</button><button id="wp-save" style="padding:6px 14px;border:0;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer;">保存</button></div>'
        +'</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click',function(e){ if(e.target===ov) ov.style.display='none'; });
      ov.querySelector('#ws-prefs-x').addEventListener('click',function(){ ov.style.display='none'; });
      ov.querySelector('#wp-cancel').addEventListener('click',function(){ ov.style.display='none'; });
      ov.querySelector('#wp-save').addEventListener('click',savePrefs);
    }
    ov.style.display='flex';
    fetch('/api/workspace/prefs').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return; var p=d.prefs||{};
      document.getElementById('wp-warn').value = p.warn_sec? Math.round(p.warn_sec/60):'';
      document.getElementById('wp-crit').value = p.crit_sec? Math.round(p.crit_sec/60):'';
      document.getElementById('wp-dnds').value = _hm(p.dnd_start);
      document.getElementById('wp-dnde').value = _hm(p.dnd_end);
      document.getElementById('wp-mute').checked = !!p.muted;
      document.getElementById('wp-hint').textContent = '全局默认：警告 '+Math.round(d.global_warn_sec/60)+' 分 / 严重 '+Math.round(d.global_crit_sec/60)+' 分';
    }).catch(function(){});
  }
  function savePrefs(){
    var warn=parseInt(document.getElementById('wp-warn').value,10);
    var crit=parseInt(document.getElementById('wp-crit').value,10);
    var body={ warn_sec: isNaN(warn)?0:warn*60, crit_sec: isNaN(crit)?0:crit*60,
      muted: document.getElementById('wp-mute').checked?1:0,
      dnd_start: _toMin(document.getElementById('wp-dnds').value),
      dnd_end: _toMin(document.getElementById('wp-dnde').value) };
    fetch('/api/workspace/prefs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok){ document.getElementById('ws-prefs-modal').style.display='none'; CRMW.toast('告警设置已保存'); refreshSla(); }
        else { CRMW.toast('保存失败','#dc2626'); }
      }).catch(function(){ CRMW.toast('保存失败','#dc2626'); });
  }
  var prefsBtn=document.getElementById('ws-prefs-btn');
  if(prefsBtn){ prefsBtn.addEventListener('click',openPrefs); }

  // 轻量 toast（SLA 实时告警）— 委托共享组件
  function wsToast(text){ CRMW.toast(text); }

  // 当前坐席身份（Phase 6-24：定向升级 toast 需知道 MY_AGENT_ID）
  var MY_AGENT_ID='', MY_IS_SUP=false;
  fetch('/api/workspace/me').then(function(r){return r.json();}).then(function(m){
    if(m&&m.ok){ MY_AGENT_ID=String(m.agent_id||''); MY_IS_SUP=!!(m.is_supervisor); }
    if(MY_IS_SUP){
      refreshL4();
      var _pl=document.getElementById('ws-perf-link');
      if(_pl) _pl.style.display='inline';
    }
  }).catch(function(){});

  // B2：L4 高风险草稿 badge + 顶栏告警（主管专属）
  var _l4Badge=document.getElementById('ws-l4-badge');
  var _l4Prev=0, _slaPrev=0;
  function refreshL4(){
    if(!MY_IS_SUP) return;
    fetch('/api/drafts/risk-summary').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return;
      var l4=(d.by_level&&d.by_level['L4'])||0;
      var l3=(d.by_level&&d.by_level['L3'])||0;
      var high=l4+l3;
      var sla=(d.sla_overdue&&d.sla_overdue>0)?d.sla_overdue:0;
      if(_l4Badge){
        _l4Badge.style.display=l4?'inline-block':'none';
        if(l4) _l4Badge.textContent='L4 '+l4;
      }
      // 草稿审批链接显示待审总数 + SLA 告警
      var _dl=document.getElementById('ws-drafts-link');
      if(_dl){
        var label='草稿审批';
        if(high) label+='('+high+')';
        if(sla) label+=' ⏰'+sla;
        _dl.textContent=label;
      }
      // 新出现 L4 → loud toast（仅主管，仅增量触发）
      if(l4>_l4Prev){
        CRMW.toast('🚨 新增 L4 高风险草稿待审：共 '+l4+' 条（需主管放行）','#991b1b');
      }
      // D1：新出现 SLA 超时 → loud toast
      if(sla>_slaPrev&&_slaPrev>=0){
        CRMW.toast('⏰ SLA 告警：'+sla+' 条 L3/L4 草稿超过 4 小时未审批','#9d174d');
      }
      _l4Prev=l4; _slaPrev=sla;
    }).catch(function(){});
  }

  // SSE 实时刷新：跟进任务变更即时更新徽标（及待办页若打开）+ SLA 告警 toast
  try{
    var es=new EventSource('/api/workspace/stream');
    es.onmessage=function(e){
      if(!e.data) return;
      var msg; try{ msg=JSON.parse(e.data); }catch(_){ return; }
      if(msg && msg.type==='follow_up'){
        refreshFu();
        if(window.TK && typeof window.TK.load==='function') window.TK.load();
      } else if(msg && msg.type==='sla_alert' && msg.data){
        wsToast('⚠ 客户「'+(msg.data.name||'?')+'」已等待 '+fmtWaitMin(msg.data.wait_sec)+'未回复');
        refreshSla();
      } else if(msg && msg.type==='draft_created' && msg.data){
        // G1：新自动草稿生成 → toast 通知 + 转发 CustomEvent 给草稿审批页
        var _dc=msg.data;
        var _lvlColor={'L2':'#16a34a','L3':'#d97706','L4':'#dc2626'}[_dc.autopilot_level]||'#2563eb';
        var _toastEl=CRMW.toast(
          '📋 新草稿 ['+(_dc.autopilot_level||'?')+'] '+(_dc.chat_name||_dc.platform||'?')+'：'+(_dc.peer_text||'').slice(0,30),
          _lvlColor);
        if(_toastEl && _dc.autopilot_level!=='L2'){
          // 非 L2 需要人工审批 → 点击 toast 跳转草稿审批页
          _toastEl.style.cursor='pointer';
          _toastEl.onclick=function(){ location.href='/workspace/drafts'; };
        }
        // 刷新顶栏草稿角标
        refreshL4();
        // 通过 CustomEvent 告知草稿审批页面刷新列表（若当前页已打开）
        try{ document.dispatchEvent(new CustomEvent('draft_created',{detail:_dc})); }catch(_){}
      } else if(msg && msg.type==='escalation' && msg.data){
        var _d=msg.data;
        var _rz={unclaimed:'无人认领',holder_offline:'坐席离线',holder_quiet:'坐席静音'}[_d.reason]||_d.reason;
        var _assigned=String(_d.assigned_to||'');
        var _isMe=MY_AGENT_ID&&(_assigned===MY_AGENT_ID);
        if(_isMe){
          // 指派给我 → loud 紫色 toast（点击跳转对应会话）
          var _toastEl=CRMW.toast(
            '🔔 升级已指派给您：客户「'+(_d.name||'?')+'」'+fmtWaitMin(_d.wait_sec)+'未回复（'+_rz+'）',
            '#7c3aed');
          if(_toastEl && _d.conversation_id){
            _toastEl.style.cursor='pointer';
            _toastEl.onclick=function(){
              try{ sessionStorage.setItem('ws_focus_conv',_d.conversation_id); }catch(_){}
              location.href='/workspace';
            };
          }
        } else if(MY_IS_SUP && !_isMe){
          // 主管但不是我的单 → 低调灰色 toast（知情不干扰）
          CRMW.toast('📋 升级（指派给 '+(_assigned||'未指定')+'）：客户「'+(_d.name||'?')+'」','#64748b');
        }
        // 普通坐席不收升级 toast（仅徽标更新）
        refreshEsc();
      }
    };
    window.addEventListener('beforeunload',function(){ try{ es.close(); }catch(_){ } });
  }catch(_){ }
})();
</script>
<main class="ws-body">
{% block content %}{% endblock %}
</main>
</body>
</html>
