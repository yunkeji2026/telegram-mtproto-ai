<!DOCTYPE html>
<html lang="{{ ui_lang|default('zh') }}-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}坐席工作台{% endblock %} · {{ site_name|default('华灵科技客户转化聊天系统') }}</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;color:#111827;background:#f3f4f6;}
  .ws-top{height:52px;display:flex;align-items:center;gap:10px;padding:0 16px;background:#1b2038;color:#fff;flex-wrap:nowrap;overflow:visible;}
  .ws-brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;white-space:nowrap;flex-shrink:0;}
  .ws-brand svg{width:20px;height:20px;}
  .ws-brand .ws-brand-sub{font-weight:400;color:#aeb8d4;}
  .ws-spacer{flex:1;}
  .ws-user{font-size:13px;color:#cbd5e1;white-space:nowrap;flex-shrink:0;}
  .ws-presence{border:1px solid rgba(255,255,255,.25);border-radius:7px;padding:3px 8px;font-size:12px;background:rgba(255,255,255,.08);color:#fff;white-space:nowrap;flex-shrink:0;}
  .ws-funnel{font-size:11px;color:#cbd5e1;white-space:nowrap;max-width:230px;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;}
  .ws-agents{font-size:11px;color:#94a3b8;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
  .ws-logout{color:#fff;text-decoration:none;font-size:13px;border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:4px 12px;white-space:nowrap;flex-shrink:0;}
  .ws-logout:hover{background:rgba(255,255,255,.12);}
  /* 顶栏导航：主入口 + “更多”下拉（降密度，标签永不折行） */
  .ws-nav{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .ws-nav a{color:#fff;text-decoration:none;font-size:13px;padding:5px 10px;border-radius:7px;white-space:nowrap;}
  .ws-nav a:hover{background:rgba(255,255,255,.12);}
  .ws-more-wrap{position:relative;flex-shrink:0;}
  .ws-more-btn{color:#fff;font-size:13px;padding:5px 10px;border-radius:7px;cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,.28);user-select:none;}
  .ws-more-btn:hover{background:rgba(255,255,255,.12);}
  .ws-more-menu{display:none;position:absolute;top:38px;left:0;min-width:160px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.16);z-index:9999;padding:6px;}
  .ws-more-menu.show{display:block;}
  .ws-more-menu a{display:block;color:#374151;text-decoration:none;font-size:13px;padding:7px 10px;border-radius:7px;white-space:nowrap;}
  .ws-more-menu a:hover{background:#f3f4f6;}
  @media (max-width:1280px){ .ws-brand .ws-brand-sub{display:none;} .ws-funnel,.ws-agents{display:none;} }
  .ws-body{height:calc(100vh - 52px);overflow:hidden;}
  .ws-review{display:none;cursor:pointer;font-size:12px;background:#f59e0b;color:#1b2038;font-weight:600;border-radius:7px;padding:3px 9px;}
  .ws-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;align-items:center;justify-content:center;}
  .ws-modal-box{background:#fff;border-radius:12px;max-width:560px;width:92vw;max-height:80vh;overflow:auto;padding:18px;}
  .ws-modal-box h3{margin:0 0 12px;font-size:16px;}
  .ws-rv-item{border:1px solid #e5e7eb;border-radius:9px;padding:10px;margin-bottom:10px;font-size:13px;}
  .ws-rv-cmp{display:flex;gap:10px;margin:6px 0;}
  .ws-rv-col{flex:1;background:#f9fafb;border-radius:7px;padding:7px;font-size:12px;}
  .ws-rv-acts{display:flex;gap:8px;margin-top:6px;}
  .ws-rv-acts button{flex:1;border:0;border-radius:7px;padding:7px;font-size:13px;cursor:pointer;}
  .ws-rv-yes{background:#16a34a;color:#fff;} .ws-rv-no{background:#e5e7eb;color:#374151;}
  .ws-modal-close{float:right;cursor:pointer;color:#6b7280;font-size:18px;}
  /* P24: 通知中心 */
  .ws-notif-btn{position:relative;cursor:pointer;padding:0 6px;font-size:18px;line-height:52px;color:#fff;user-select:none;}
  .ws-notif-badge{position:absolute;top:8px;right:0;background:#ef4444;color:#fff;font-size:10px;font-weight:700;border-radius:8px;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 3px;display:none;}
  .ws-notif-panel{position:fixed;top:52px;right:0;width:360px;max-width:95vw;background:#fff;border-radius:0 0 12px 12px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:8900;display:none;flex-direction:column;max-height:480px;}
  .ws-notif-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px;border-bottom:1px solid #e5e7eb;}
  .ws-notif-hdr strong{font-size:14px;color:#111827;}
  .ws-notif-read{font-size:12px;color:#2563eb;cursor:pointer;padding:2px 6px;}
  .ws-notif-list{overflow-y:auto;flex:1;}
  .ws-notif-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .12s;}
  .ws-notif-item:hover{background:#f8fafc;}
  .ws-notif-item.unread{background:#eff6ff;}
  .ws-notif-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .ws-notif-body{flex:1;min-width:0;}
  .ws-notif-title{font-size:12px;font-weight:600;color:#111827;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ws-notif-sub{font-size:11px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ws-notif-ts{font-size:10px;color:#94a3b8;white-space:nowrap;}
  .ws-notif-empty{padding:32px 16px;text-align:center;color:#9ca3af;font-size:13px;}
</style>
{% block head %}{% endblock %}
<script>
(function(){
  var _f=window.fetch;
  window.fetch=function(url,opts){
    opts=opts||{};
    var m=(opts.method||'GET').toUpperCase();
    if(m!=='GET'&&m!=='HEAD'&&m!=='OPTIONS'){
      var t=document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      if(t){
        opts.headers=opts.headers||{};
        if(opts.headers instanceof Headers){opts.headers.set('X-CSRF-Token',t[1])}
        else{opts.headers['X-CSRF-Token']=t[1]}
      }
    }
    return _f.call(this,url,opts);
  };
})();
</script>
<script src="/static/workspace/crm-widgets.js"></script>
</head>
<body>
<header class="ws-top">
  <span class="ws-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M4 4h16v16H4z"/><path d="M4 9l8 5 8-5"/></svg>
    {{ site_name|default('华灵科技客户转化聊天系统') }}<span class="ws-brand-sub"> · 坐席工作台</span>
  </span>
  <nav class="ws-nav">
    <a href="/workspace" id="nav-inbox">💬 聊天</a>
    <a href="/workspace/contacts">客户</a>
    <a href="/workspace/dash">概览</a>
    <div class="ws-more-wrap">
      <span class="ws-more-btn" id="ws-more-btn" onclick="_wsToggleMore(event)">更多 ▾</span>
      <div class="ws-more-menu" id="ws-more-menu">
        <a href="/workspace/tasks">待办</a>
        <a href="/workspace/drafts" id="ws-drafts-link" title="L3/L4 待审草稿">草稿审批</a>
        <a href="/workspace/templates" title="回复模板库">模板库</a>
        <a href="/workspace/golive" id="ws-golive-link" style="display:none;" title="上线自检清单（主管）">上线自检</a>
        <a href="/workspace/setup" id="ws-setup-link" style="display:none;" title="渠道接入向导（主管）">接入向导</a>
        <a href="/workspace/kb-start" id="ws-kbstart-link" style="display:none;" title="知识库冷启动（主管）">知识库起步</a>
        <a href="/workspace/roi" id="ws-roi-link" style="display:none;" title="经营 ROI 看板（老板/主管）">ROI 看板</a>
        <a href="/workspace/ai-quality" id="ws-aiq-link" style="display:none;" title="AI 回复质量看板（主管）">AI 质量</a>
        <a href="/workspace/usage" id="ws-usage-link" style="display:none;" title="用量计量看板（老板/主管）">用量</a>
        <a href="/workspace/agent-perf" id="ws-perf-link" style="display:none;" title="坐席绩效看板（主管）">绩效</a>
        <a href="/workspace/queue" id="ws-queue-link" style="display:none;" title="实时运营队列看板（主管）">队列</a>
        <a href="/workspace/workflows" id="ws-workflow-link" style="display:none;" title="工作流 / 路由规则配置">工作流</a>
      </div>
    </div>
  </nav>
  <!-- P39: 全局搜索 -->
  <div id="gs-wrap" style="position:relative;display:flex;align-items:center;">
    <input id="gs-input" placeholder="🔍 全局搜索…" style="
      width:180px;height:26px;border:1px solid rgba(255,255,255,.25);border-radius:13px;
      background:rgba(255,255,255,.12);color:#fff;font-size:12px;padding:0 10px 0 10px;
      outline:none;transition:width .2s;" onfocus="this.style.width='240px'" onblur="if(!this.value)this.style.width='180px'"
      oninput="_gsOnInput(this.value)" onkeydown="_gsKey(event)">
    <div id="gs-panel" style="display:none;position:absolute;top:32px;left:0;width:340px;background:#fff;
      border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);
      z-index:9999;max-height:380px;overflow-y:auto;"></div>
  </div>
  <span class="ws-spacer"></span>
  <a class="ws-review" id="ws-esc" style="background:#7c3aed;color:#fff;text-decoration:none;cursor:pointer;" title="升级：无人处理的严重超时会话"></a>
  <a class="ws-review" id="ws-l4-badge" href="/workspace/dash" style="background:#991b1b;color:#fff;text-decoration:none;cursor:pointer;display:none;" title="L4 高风险草稿待审批（需主管放行）"></a>
  <a class="ws-review" id="ws-sla" style="background:#dc2626;color:#fff;text-decoration:none;cursor:pointer;" title="SLA 严重超时未回复会话"></a>
  <a class="ws-review" id="ws-followup" style="background:#dc2626;color:#fff;text-decoration:none;" href="/workspace/tasks" title="到期待跟进任务"></a>
  <!-- P24: 通知铃铛 -->
  <span class="ws-notif-btn" id="ws-notif-btn" title="通知中心">
    🔔<span class="ws-notif-badge" id="ws-notif-badge"></span>
  </span>
  <span id="ws-prefs-btn" style="cursor:pointer;font-size:16px;padding:0 6px;" title="告警设置（SLA 阈值 / 免打扰）">⚙</span>
  <span class="ws-review" id="ws-review" title="待裁决的合并候选" onclick="window.__wsReviews&&window.__wsReviews.open()"></span>
  <span class="ws-funnel" id="ws-funnel" title="今日 web 漏斗"></span>
  <span class="ws-agents" id="ws-agents-online" title="在线坐席"></span>
  <select class="ws-presence" id="ws-presence" title="我的状态">
    <option value="online">🟢 在线</option>
    <option value="busy">🟡 忙碌</option>
    <option value="offline">⚫ 离线</option>

  <span class="ws-user">{{ (user_display_name or user_name or '') }}</span>
  <a class="ws-logout" href="/logout">退出登录</a>

<script>
function _wsToggleMore(e){ e.stopPropagation(); var m=document.getElementById('ws-more-menu'); if(m) m.classList.toggle('show'); }
document.addEventListener('click',function(e){ var m=document.getElementById('ws-more-menu'); if(m && !e.target.closest('.ws-more-wrap')) m.classList.remove('show'); });
</script>
<script>
(function(){
  var AGENT_ID = {{ (user_name or '')|tojson }};
  var AGENT_NAME = {{ (user_display_name or user_name or '')|tojson }};
  window.__wsAgent = { id: String(AGENT_ID||'agent'), name: String(AGENT_NAME||AGENT_ID||'agent') };

  function setPresence(st){
    fetch('/api/workspace/presence',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:st,display_name:window.__wsAgent.name})}).catch(function(){});
  }
  function heartbeat(){
    var sel=document.getElementById('ws-presence');
    fetch('/api/workspace/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:sel?sel.value:'online',display_name:window.__wsAgent.name})}).catch(function(){});
  }
  function loadFunnel(){
    fetch('/api/workspace/metrics/web-funnel').then(function(r){return r.json();}).then(function(d){
      var m=(d&&d.metrics)||{};
      var el=document.getElementById('ws-funnel');
      if(!el) return;
      var sess=m.web_sessions||0, inbound=m.web_inbound||0, ho=m.handoff_sent||0, cv=m.line_converted||0;
      el.textContent = 'Web 今日 '+sess+'会话 · '+inbound+'入站 · 引流'+ho+' · 转化'+cv;
    }).catch(function(){});
  }
  function loadAgents(){
    fetch('/api/workspace/presence').then(function(r){return r.json();}).then(function(d){
      var el=document.getElementById('ws-agents-online');
      if(!el) return;
      var agents=(d&&d.agents)||[];
      if(!agents.length){ el.textContent=''; return; }
      el.textContent = '在线 '+agents.map(function(a){
        var dot=a.status==='busy'?'🟡':(a.status==='online'?'🟢':'⚫');
        return dot+(a.display_name||a.agent_id);
      }).join(' · ');
    }).catch(function(){});
  }
  var sel=document.getElementById('ws-presence');
  if(sel){
    sel.addEventListener('change',function(){ setPresence(sel.value); });
    setPresence('online');
  }
  heartbeat(); loadFunnel(); loadAgents();
  setInterval(heartbeat, 30000);
  setInterval(loadFunnel, 120000);
  setInterval(loadAgents, 60000);
  window.addEventListener('beforeunload',function(){ setPresence('offline'); });
  window.__wsPresence = { refreshAgents: loadAgents, refreshFunnel: loadFunnel };
})();
</script>
<div class="ws-modal" id="ws-review-modal">
  <div class="ws-modal-box">
    <span class="ws-modal-close" onclick="window.__wsReviews&&window.__wsReviews.close()">×</span>
    <h3>待裁决的合并候选</h3>
    <div id="ws-review-list"></div>
  </div>
</div>
<script>
(function(){
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  var badge=document.getElementById('ws-review');
  var modal=document.getElementById('ws-review-modal');
  var list=document.getElementById('ws-review-list');
  function ov(o){ if(!o) return '—'; return esc(o.primary_name||'未命名')+' · '+((o.channels||[]).map(esc).join('/')||'无渠道'); }
  function refresh(){
    fetch('/api/workspace/merge-reviews').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(badge) badge.style.display='none'; return; }
      var n=(d.reviews||[]).length;
      if(badge){ badge.style.display=n?'inline-block':'none'; badge.textContent='待审合并 '+n; }
      window.__wsReviewData=d.reviews||[];
      if(modal.style.display==='flex') render();
    }).catch(function(){});
  }
  function render(){
    var rv=window.__wsReviewData||[];
    if(!rv.length){ list.innerHTML='<div style="color:#6b7280;font-size:13px;">暂无待审项</div>'; return; }
    list.innerHTML=rv.map(function(r){
      return '<div class="ws-rv-item">'
        +'<div>置信度 '+(Number(r.confidence||0).toFixed(2))+' · 渠道 '+esc(r.candidate_channel||'')+'</div>'
        +'<div class="ws-rv-cmp"><div class="ws-rv-col"><b>候选</b><br>'+ov(r.candidate)+'</div>'
        +'<div class="ws-rv-col"><b>并入</b><br>'+ov(r.target)+'</div></div>'
        +'<div class="ws-rv-acts">'
        +'<button class="ws-rv-yes" onclick="window.__wsReviews.resolve(\''+esc(r.review_id)+'\',\'approve\')">通过合并</button>'
        +'<button class="ws-rv-no" onclick="window.__wsReviews.resolve(\''+esc(r.review_id)+'\',\'reject\')">拒绝</button>'
        +'</div></div>';
    }).join('');
  }
  window.__wsReviews={
    open:function(){ modal.style.display='flex'; render(); },
    close:function(){ modal.style.display='none'; },
    resolve:function(id,action){
      fetch('/api/workspace/merge-reviews/'+encodeURIComponent(id),{method:'POST',
        headers:{'Content-Type':'application/json'},body:JSON.stringify({action:action})})
        .then(function(r){return r.json();}).then(function(){ refresh(); }).catch(function(){});
    },
    refresh:refresh
  };
  modal.addEventListener('click',function(e){ if(e.target===modal) window.__wsReviews.close(); });
  refresh(); setInterval(refresh, 60000);

  // 到期待跟进徽标（优先显示「我的」到期任务，括号内为全部）
  var fuBadge=document.getElementById('ws-followup');
  function refreshFu(){
    fetch('/api/workspace/follow-ups?scope=due&limit=1').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(fuBadge) fuBadge.style.display='none'; return; }
      var mine=d.due_tasks_mine||0, all=(d.due_tasks!=null?d.due_tasks:(d.due_follow_ups||0));
      var show=mine||all;
      if(fuBadge){
        fuBadge.style.display=show?'inline-block':'none';
        fuBadge.textContent= mine ? ('待跟进 '+mine+(all>mine?(' / '+all):'')) : ('待跟进 '+all);
      }
    }).catch(function(){});
  }
  refreshFu(); setInterval(refreshFu, 60000);

  // SLA 严重超时徽标 + 下钻清单
  var slaBadge=document.getElementById('ws-sla');
  var _slaItems=[];
  function fmtWaitMin(sec){ return CRMW.fmtWaitMin(sec); }
  function refreshSla(){
    fetch('/api/workspace/sla-alerts').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(slaBadge) slaBadge.style.display='none'; return; }
      _slaItems=d.items||[];
      if(d.quiet){ if(slaBadge) slaBadge.style.display='none'; return; }
      var crit=d.critical||0, brk=d.breaching||0;
      if(slaBadge){
        slaBadge.style.display=(crit||brk)?'inline-block':'none';
        slaBadge.style.background = crit?'#dc2626':'#d97706';
        slaBadge.textContent = crit?('SLA 严重 '+crit):('SLA 超时 '+brk);
        slaBadge.title = crit? _slaItems.slice(0,8).map(function(it){return it.name+'（'+fmtWaitMin(it.wait_sec)+'）';}).join('\n') : ('有 '+brk+' 个会话超过警告阈值');
      }
    }).catch(function(){});
  }
  if(slaBadge){
    slaBadge.addEventListener('click',function(){
      if(!_slaItems.length){ location.href='/workspace'; return; }
      var top=_slaItems[0];
      try{ sessionStorage.setItem('ws_focus_conv', top.conversation_id); }catch(_){ }
      location.href='/workspace';
    });
  }
  refreshSla(); setInterval(refreshSla, 30000);

  // 升级徽标：无人有效处理的严重超时（全局口径，不受个人静默影响）
  var escBadge=document.getElementById('ws-esc');
  var _escItems=[];
  function refreshEsc(){
    fetch('/api/workspace/escalations').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok){ if(escBadge) escBadge.style.display='none'; return; }
      _escItems=d.items||[];
      var n=d.count||0;
      if(escBadge){
        escBadge.style.display=n?'inline-block':'none';
        escBadge.textContent='升级 '+n;
        escBadge.title=n? _escItems.slice(0,8).map(function(it){
          var rz={unclaimed:'无人认领',holder_offline:'坐席离线',holder_quiet:'坐席静音'}[it.reason]||it.reason;
          return it.name+'（'+fmtWaitMin(it.wait_sec)+'·'+rz+'）';
        }).join('\n') : '';
      }
    }).catch(function(){});
  }
  if(escBadge){
    escBadge.addEventListener('click',function(){
      if(!_escItems.length){ location.href='/workspace/dash'; return; }
      try{ sessionStorage.setItem('ws_focus_conv', _escItems[0].conversation_id); }catch(_){ }
      location.href='/workspace';
    });
  }
  refreshEsc(); setInterval(refreshEsc, 30000);

  // 告警设置面板（每坐席 SLA 阈值 + 免打扰时段 + 静音）
  function _hm(min){ if(min==null||min<0) return ''; var h=Math.floor(min/60),m=min%60; return (h<10?'0':'')+h+':'+(m<10?'0':'')+m; }
  function _toMin(s){ if(!s) return -1; var p=String(s).split(':'); if(p.length<2) return -1; var h=parseInt(p[0],10),m=parseInt(p[1],10); if(isNaN(h)||isNaN(m)) return -1; return h*60+m; }
  function openPrefs(){
    var ov=document.getElementById('ws-prefs-modal');
    if(!ov){
      ov=document.createElement('div'); ov.id='ws-prefs-modal';
      ov.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:9999;display:flex;align-items:center;justify-content:center;';
      ov.innerHTML='<div style="background:#fff;border-radius:12px;padding:20px;width:340px;max-width:92vw;box-shadow:0 10px 40px rgba(0,0,0,.2);font-size:14px;">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><strong>告警设置</strong><span id="ws-prefs-x" style="cursor:pointer;color:#64748b;font-size:18px;">✕</span></div>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">警告阈值（分钟，空=全局）<input id="wp-warn" type="number" min="0" style="width:90px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">严重阈值（分钟，空=全局）<input id="wp-crit" type="number" min="0" style="width:90px;padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">免打扰 起<input id="wp-dnds" type="time" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">免打扰 止<input id="wp-dnde" type="time" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<label style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;">完全静音告警<input id="wp-mute" type="checkbox"></label>'
        +'<label style="display:flex;flex-direction:column;gap:4px;margin:8px 0;"><span>我会的语言（自动派单按语言匹配）</span><input id="wp-langs" type="text" placeholder="如 en,ja,zh（逗号分隔，留空=不限）" style="padding:4px 6px;border:1px solid #d1d5db;border-radius:6px;"></label>'
        +'<div id="wp-hint" style="font-size:12px;color:#94a3b8;margin:6px 0 12px;"></div>'
        +'<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="wp-cancel" style="padding:6px 14px;border:1px solid #d1d5db;border-radius:6px;background:#fff;cursor:pointer;">取消</button><button id="wp-save" style="padding:6px 14px;border:0;border-radius:6px;background:#2563eb;color:#fff;cursor:pointer;">保存</button></div>'
        +'</div>';
      document.body.appendChild(ov);
      ov.addEventListener('click',function(e){ if(e.target===ov) ov.style.display='none'; });
      ov.querySelector('#ws-prefs-x').addEventListener('click',function(){ ov.style.display='none'; });
      ov.querySelector('#wp-cancel').addEventListener('click',function(){ ov.style.display='none'; });
      ov.querySelector('#wp-save').addEventListener('click',savePrefs);
    }
    ov.style.display='flex';
    fetch('/api/workspace/prefs').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return; var p=d.prefs||{};
      document.getElementById('wp-warn').value = p.warn_sec? Math.round(p.warn_sec/60):'';
      document.getElementById('wp-crit').value = p.crit_sec? Math.round(p.crit_sec/60):'';
      document.getElementById('wp-dnds').value = _hm(p.dnd_start);
      document.getElementById('wp-dnde').value = _hm(p.dnd_end);
      document.getElementById('wp-mute').checked = !!p.muted;
      var _lg=document.getElementById('wp-langs'); if(_lg) _lg.value = p.languages||'';
      document.getElementById('wp-hint').textContent = '全局默认：警告 '+Math.round(d.global_warn_sec/60)+' 分 / 严重 '+Math.round(d.global_crit_sec/60)+' 分';
    }).catch(function(){});
  }
  function savePrefs(){
    var warn=parseInt(document.getElementById('wp-warn').value,10);
    var crit=parseInt(document.getElementById('wp-crit').value,10);
    var _lgEl=document.getElementById('wp-langs');
    var body={ warn_sec: isNaN(warn)?0:warn*60, crit_sec: isNaN(crit)?0:crit*60,
      muted: document.getElementById('wp-mute').checked?1:0,
      dnd_start: _toMin(document.getElementById('wp-dnds').value),
      dnd_end: _toMin(document.getElementById('wp-dnde').value),
      languages: _lgEl? _lgEl.value : '' };
    fetch('/api/workspace/prefs',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
      .then(function(r){return r.json();}).then(function(d){
        if(d&&d.ok){ document.getElementById('ws-prefs-modal').style.display='none'; CRMW.toast('告警设置已保存'); refreshSla(); }
        else { CRMW.toast('保存失败','#dc2626'); }
      }).catch(function(){ CRMW.toast('保存失败','#dc2626'); });
  }
  var prefsBtn=document.getElementById('ws-prefs-btn');
  if(prefsBtn){ prefsBtn.addEventListener('click',openPrefs); }

  // 轻量 toast（SLA 实时告警）— 委托共享组件
  function wsToast(text){ CRMW.toast(text); }

  // 当前坐席身份（Phase 6-24：定向升级 toast 需知道 MY_AGENT_ID）
  var MY_AGENT_ID='', MY_IS_SUP=false;
  fetch('/api/workspace/me').then(function(r){return r.json();}).then(function(m){
    if(m&&m.ok){ MY_AGENT_ID=String(m.agent_id||''); MY_IS_SUP=!!(m.is_supervisor); }
    // C1-2：演示模式横幅（存在 demo 数据时）
    if(m && m.demo_mode){
      var dbar=document.getElementById('ws-demo-banner');
      if(!dbar){
        dbar=document.createElement('div'); dbar.id='ws-demo-banner';
        dbar.style.cssText='background:#7c3aed;color:#fff;text-align:center;font-size:12px;'
          +'padding:5px 12px;font-weight:600;';
        dbar.textContent='🎬 演示模式：当前含示例数据，可在「设置 → 试用/演示」一键清空';
        var body=document.querySelector('.ws-body');
        if(body&&body.parentNode){ body.parentNode.insertBefore(dbar, body); }
      }
    }
    // C0-3：授权失效只读模式 → 全局橙色横幅
    if(m && m.license && m.license.read_only){
      var bar=document.getElementById('ws-lic-readonly');
      if(!bar){
        bar=document.createElement('div'); bar.id='ws-lic-readonly';
        bar.style.cssText='background:#b91c1c;color:#fff;text-align:center;font-size:13px;'
          +'padding:7px 12px;font-weight:600;';
        bar.textContent='⛔ '+(m.license.message||'授权已失效，系统处于只读模式，请联系厂商续费。');
        var body=document.querySelector('.ws-body');
        if(body&&body.parentNode){ body.parentNode.insertBefore(bar, body); }
      }
    }
    if(MY_IS_SUP){
      refreshL4();
      var _gl=document.getElementById('ws-golive-link');
      if(_gl) _gl.style.display='block';  // P2-1: 上线自检仅主管可见
      var _sl=document.getElementById('ws-setup-link');
      if(_sl) _sl.style.display='block';  // P1-1: 接入向导仅主管可见
      var _ksl=document.getElementById('ws-kbstart-link');
      if(_ksl) _ksl.style.display='block';  // P1-2: 知识库冷启动仅主管可见
      var _rl=document.getElementById('ws-roi-link');
      if(_rl) _rl.style.display='block';  // P0-3: ROI 看板仅主管/老板可见
      var _aql=document.getElementById('ws-aiq-link');
      if(_aql) _aql.style.display='block';  // P3-1: AI 质量看板仅主管可见
      var _ul=document.getElementById('ws-usage-link');
      if(_ul) _ul.style.display='block';  // C0-2: 用量看板仅主管/老板可见
      var _pl=document.getElementById('ws-perf-link');
      if(_pl) _pl.style.display='block';
      var _ql=document.getElementById('ws-queue-link');
      if(_ql) _ql.style.display='block';  // P29: 队列看板仅主管可见
      var _wfl=document.getElementById('ws-workflow-link');
      if(_wfl) _wfl.style.display='block';  // P37: 工作流配置仅主管可见
    }
  }).catch(function(){});

  // B2：L4 高风险草稿 badge + 顶栏告警（主管专属）
  var _l4Badge=document.getElementById('ws-l4-badge');
  var _l4Prev=0, _slaPrev=0;
  function refreshL4(){
    if(!MY_IS_SUP) return;
    fetch('/api/drafts/risk-summary').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return;
      var l4=(d.by_level&&d.by_level['L4'])||0;
      var l3=(d.by_level&&d.by_level['L3'])||0;
      var high=l4+l3;
      var sla=(d.sla_overdue&&d.sla_overdue>0)?d.sla_overdue:0;
      if(_l4Badge){
        _l4Badge.style.display=l4?'inline-block':'none';
        if(l4) _l4Badge.textContent='L4 '+l4;
      }
      // 草稿审批链接显示待审总数 + SLA 告警
      var _dl=document.getElementById('ws-drafts-link');
      if(_dl){
        var label='草稿审批';
        if(high) label+='('+high+')';
        if(sla) label+=' ⏰'+sla;
        _dl.textContent=label;
      }
      // 新出现 L4 → loud toast（仅主管，仅增量触发）
      if(l4>_l4Prev){
        CRMW.toast('🚨 新增 L4 高风险草稿待审：共 '+l4+' 条（需主管放行）','#991b1b');
      }
      // D1：新出现 SLA 超时 → loud toast
      if(sla>_slaPrev&&_slaPrev>=0){
        CRMW.toast('⏰ SLA 告警：'+sla+' 条 L3/L4 草稿超过 4 小时未审批','#9d174d');
      }
      _l4Prev=l4; _slaPrev=sla;
    }).catch(function(){});
  }

  // SSE 实时刷新：跟进任务变更即时更新徽标（及待办页若打开）+ SLA 告警 toast
  try{
    var es=new EventSource('/api/workspace/stream');
    es.onmessage=function(e){
      if(!e.data) return;
      var msg; try{ msg=JSON.parse(e.data); }catch(_){ return; }
      if(msg && msg.type==='follow_up'){
        refreshFu();
        if(window.TK && typeof window.TK.load==='function') window.TK.load();
      } else if(msg && msg.type==='sla_alert' && msg.data){
        wsToast('⚠ 客户「'+(msg.data.name||'?')+'」已等待 '+fmtWaitMin(msg.data.wait_sec)+'未回复');
        refreshSla();
      } else if(msg && msg.type==='draft_created' && msg.data){
        // G1：新自动草稿生成 → toast 通知 + 转发 CustomEvent 给草稿审批页
        var _dc=msg.data;
        var _lvlColor={'L2':'#16a34a','L3':'#d97706','L4':'#dc2626'}[_dc.autopilot_level]||'#2563eb';
        var _toastEl=CRMW.toast(
          '📋 新草稿 ['+(_dc.autopilot_level||'?')+'] '+(_dc.chat_name||_dc.platform||'?')+'：'+(_dc.peer_text||'').slice(0,30),
          _lvlColor);
        if(_toastEl && _dc.autopilot_level!=='L2'){
          // 非 L2 需要人工审批 → 点击 toast 跳转草稿审批页
          _toastEl.style.cursor='pointer';
          _toastEl.onclick=function(){ location.href='/workspace/drafts'; };
        }
        // 刷新顶栏草稿角标
        refreshL4();
        // 通过 CustomEvent 告知草稿审批页面刷新列表（若当前页已打开）
        try{ document.dispatchEvent(new CustomEvent('draft_created',{detail:_dc})); }catch(_){}
      } else if(msg && msg.type==='draft_sla_breach' && msg.data){
        // K1：草稿 SLA 超时 → 主管 toast + 转发 CustomEvent
        if(MY_IS_SUP){
          var _br=msg.data;
          var _brEl=CRMW.toast(
            '⏰ 草稿 SLA 超时：'+(_br.peer_text_preview||_br.draft_id||'').slice(0,40)
              +' 已等待 '+(_br.wait_min||'?')+'分钟（'+(_br.autopilot_level||'')+'）',
            '#b91c1c');
          if(_brEl){ _brEl.style.cursor='pointer'; _brEl.onclick=function(){ location.href='/workspace/drafts'; }; }
          try{ document.dispatchEvent(new CustomEvent('draft_sla_breach',{detail:_br})); }catch(_){}
          refreshL4();
        }
      } else if(msg && msg.type==='draft_reassigned' && msg.data){
        // K2：草稿自动再分配 → 被分配人 toast + 转发 CustomEvent
        var _ra=msg.data;
        if(MY_IS_SUP || (_ra.to_agent&&_ra.to_agent===MY_AGENT_ID)){
          var _raLabel=(_ra.to_agent===MY_AGENT_ID)?'草稿已转派给您':'草稿已自动转派给 '+(_ra.to_agent_name||_ra.to_agent||'?');
          CRMW.toast('🔄 '+_raLabel+'（来自离线坐席 '+(_ra.from_agent||'?')+'）','#0f766e');
          try{ document.dispatchEvent(new CustomEvent('draft_reassigned',{detail:_ra})); }catch(_){}
        }
      // P24：通知中心 — 所有重要事件写入铃铛
      if(msg && ['inbox_message','draft_sla_breach','draft_reassigned','anomaly_alert','sla_alert','escalation','queue_alert','stage_advance','stage_advance_pending','stage_downgrade','stage_reunion','stage_sync','workflow_step','workflow_execution_completed','workflow_execution_failed','workflow_execution_cancelled'].indexOf(msg.type)>=0){
        if(window.__wsNotif) window.__wsNotif.add(msg);
      }
      // P3：auto_assign 自动派单 → 仅「被分配到的坐席」收到 toast（可点开聚焦该会话）
      if(msg && msg.type==='conversation_claim' && msg.data && msg.data.action==='auto_claimed'){
        var _ac=msg.data, _acClaim=_ac.claim||{};
        if(_acClaim.agent_id && _acClaim.agent_id===MY_AGENT_ID){
          var _acMsg=_ac.matched_language?'🌐 系统已按语言把一位客户分给你':'📥 系统已把一位客户自动分给你';
          var _acEl=CRMW.toast(_acMsg+'（可在工作台查看 / 释放）','#0f766e');
          if(_acEl && _ac.conversation_id){
            _acEl.style.cursor='pointer';
            _acEl.onclick=function(){
              try{ sessionStorage.setItem('ws_focus_conv',_ac.conversation_id); }catch(_){}
              location.href='/workspace';
            };
          }
        }
      }
      // P46：待确认进阶
      if(msg && msg.type==='stage_advance_pending' && msg.data){
        var _sap=msg.data;
        var _sapEl=CRMW.toast('⏳ 待确认进阶：'+(_sap.confirmed_stage_label||'?')+' → '+(_sap.pending_stage_label||'?'),'#b45309');
        if(_sapEl && _sap.conversation_id){
          _sapEl.style.cursor='pointer';
          _sapEl.onclick=function(){
            try{ sessionStorage.setItem('ws_focus_conv',_sap.conversation_id); }catch(_){}
            location.href='/workspace';
          };
        }
      }
      // P43/P46：关系阶段确认进阶
      if(msg && msg.type==='stage_advance' && msg.data){
        var _sa=msg.data;
        CRMW.toast('🎉 关系进阶：'+(_sa.previous_stage_label||'?')+' → '+(_sa.stage_label||'?'),'#7c3aed');
      }
      if(msg && msg.type==='stage_downgrade' && msg.data){
        CRMW.toast('↓ 关系降级至 '+(msg.data.stage_label||'?'),'#b45309');
      }
      if(msg && msg.type==='stage_reunion' && msg.data){
        CRMW.toast('🌸 确认回暖 · '+(msg.data.stage_label||''),'#be185d');
      }
      // P47：工作链终态通知
      if(msg && msg.type==='workflow_execution_failed' && msg.data){
        CRMW.toast('❌ 工作链失败：'+(msg.data.chain_name||''),'#ef4444');
      }
      // P44：工作链步骤通知
      if(msg && msg.type==='workflow_step' && msg.data){
        var _ws=msg.data;
        var _wsEl=CRMW.toast('⚡ 工作链步骤：'+(_ws.suggested_text||'').slice(0,40),'#0f766e');
        if(_wsEl && _ws.conversation_id){
          _wsEl.style.cursor='pointer';
          _wsEl.onclick=function(){
            try{ sessionStorage.setItem('ws_focus_conv',_ws.conversation_id); }catch(_){}
            location.href='/workspace';
          };
        }
      }
      // P32：SLA 坐席定向告警 — 仅向当前负责坐席展示 toast
      if(msg && msg.type==='queue_alert' && msg.data){
        var _qa=msg.data;
        var _qaToAgent=String(_qa.to_agent_id||'');
        // 仅当：(1) 告警发给我，或 (2) 广播（to_agent_id为空）且我是在线状态
        var _isMe=MY_AGENT_ID&&_qaToAgent===MY_AGENT_ID;
        var _isBroadcast=!_qaToAgent;
        if(_isMe || _isBroadcast){
          var _qaColor=_qa.sla_level==='crit'?'#dc2626':'#d97706';
          var _qaPrefix=_qa.sla_level==='crit'?'🚨 严重超时':'⚠ 响应超时';
          var _qaEl=CRMW.toast(
            _qaPrefix+'：客户「'+(_qa.display_name||'?')+'」已等待 '+(_qa.wait_min||'?')+'分钟未回复',
            _qaColor);
          if(_qaEl && _qa.conversation_id){
            _qaEl.style.cursor='pointer';
            _qaEl.onclick=function(){
              try{ sessionStorage.setItem('ws_focus_conv',_qa.conversation_id); }catch(_){}
              location.href='/workspace';
            };
          }
        }
        if(MY_IS_SUP) refreshEsc(); // 主管同步刷新升级徽标
      }
      if(msg && msg.type==='escalation' && msg.data){
        var _d=msg.data;
        var _rz={unclaimed:'无人认领',holder_offline:'坐席离线',holder_quiet:'坐席静音'}[_d.reason]||_d.reason;
        var _assigned=String(_d.assigned_to||'');
        var _isMe=MY_AGENT_ID&&(_assigned===MY_AGENT_ID);
        if(_isMe){
          // 指派给我 → loud 紫色 toast（点击跳转对应会话）
          var _toastEl=CRMW.toast(
            '🔔 升级已指派给您：客户「'+(_d.name||'?')+'」'+fmtWaitMin(_d.wait_sec)+'未回复（'+_rz+'）',
            '#7c3aed');
          if(_toastEl && _d.conversation_id){
            _toastEl.style.cursor='pointer';
            _toastEl.onclick=function(){
              try{ sessionStorage.setItem('ws_focus_conv',_d.conversation_id); }catch(_){}
              location.href='/workspace';
            };
          }
        } else if(MY_IS_SUP && !_isMe){
          // 主管但不是我的单 → 低调灰色 toast（知情不干扰）
          CRMW.toast('📋 升级（指派给 '+(_assigned||'未指定')+'）：客户「'+(_d.name||'?')+'」','#64748b');
        }
        // 普通坐席不收升级 toast（仅徽标更新）
        refreshEsc();
      }
    };
    window.addEventListener('beforeunload',function(){ try{ es.close(); }catch(_){ } });
  }catch(_){ }
})();
</script>
<!-- P24: 通知中心面板 -->
<div id="ws-notif-panel" class="ws-notif-panel">
  <div class="ws-notif-hdr">
    <strong>通知中心</strong>
    <span class="ws-notif-read" id="ws-notif-read">全部已读</span>
  </div>
  <div class="ws-notif-list" id="ws-notif-list"></div>
</div>
<script>
(function(){
  var _notifications = [];
  var _readAt = 0;
  var _open = false;
  var btn = document.getElementById('ws-notif-btn');
  var panel = document.getElementById('ws-notif-panel');
  var badge = document.getElementById('ws-notif-badge');
  var list = document.getElementById('ws-notif-list');
  var readBtn = document.getElementById('ws-notif-read');

  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  var _TYPE_META = {
    inbox_message:  { icon:'💬', bg:'#dbeafe', label:'新消息' },
    draft_sla_breach:{ icon:'⏰', bg:'#fee2e2', label:'草稿超时' },
    draft_reassigned:{ icon:'🔄', bg:'#d1fae5', label:'草稿转派' },
    anomaly_alert:  { icon:'📊', bg:'#fef3c7', label:'异常告警' },
    sla_alert:      { icon:'⚠️', bg:'#fee2e2', label:'SLA 告警' },
    escalation:     { icon:'🔔', bg:'#ede9fe', label:'升级告警' },
  };

  function _fmtTs(ts){
    if(!ts) return '';
    var d = new Date(ts);
    var now = Date.now();
    var diff = now - ts;
    if(diff < 60000) return '刚刚';
    if(diff < 3600000) return Math.floor(diff/60000)+'分钟前';
    if(diff < 86400000) return Math.floor(diff/3600000)+'小时前';
    return d.getMonth()+1+'月'+d.getDate()+'日';
  }

  function _renderNotif(){
    if(!list) return;
    if(!_notifications.length){
      list.innerHTML = '<div class="ws-notif-empty">暂无通知</div>';
      return;
    }
    list.innerHTML = _notifications.slice().reverse().slice(0,50).map(function(n){
      var meta = _TYPE_META[n.type] || { icon:'📌', bg:'#f3f4f6', label:n.type||'通知' };
      var ts = n._notif_ts || 0;
      var unread = ts > _readAt;
      var d = n.data || {};
      var title = meta.label;
      var sub = '';
      if(n.type==='inbox_message'){
        sub = (d.display_name||d.chat_key||'?') + '：' + (d.text||'').slice(0,40);
      } else if(n.type==='sla_alert'){
        sub = '客户「'+(d.name||'?')+'」等待 '+(d.wait_min||Math.round((d.wait_sec||0)/60))+'分钟';
      } else if(n.type==='anomaly_alert'){
        sub = (d.metric||'指标')+' 异常：'+(d.message||d.desc||'').slice(0,40);
      } else if(n.type==='escalation'){
        sub = '客户「'+(d.name||'?')+'」升级';
      } else if(n.type==='draft_sla_breach'){
        sub = '草稿等待 '+(d.wait_min||'?')+'分钟未审批';
      } else if(n.type==='draft_reassigned'){
        sub = '转派给 '+(d.to_agent_name||d.to_agent||'?');
      }
      return '<div class="ws-notif-item'+(unread?' unread':'')+'" onclick="window.__wsNotif.click(\''+esc(JSON.stringify(n).replace(/'/g,'\\'+"'"))+'\')">'
        +'<div class="ws-notif-icon" style="background:'+meta.bg+'">'+meta.icon+'</div>'
        +'<div class="ws-notif-body">'
          +'<div class="ws-notif-title">'+esc(title)+'</div>'
          +'<div class="ws-notif-sub">'+esc(sub)+'</div>'
        +'</div>'
        +'<div class="ws-notif-ts">'+_fmtTs(ts)+'</div>'
        +'</div>';
    }).join('');
  }

  function _updateBadge(){
    var unread = _notifications.filter(function(n){ return (n._notif_ts||0) > _readAt; }).length;
    if(!badge) return;
    badge.textContent = unread > 99 ? '99+' : String(unread);
    badge.style.display = unread ? 'block' : 'none';
  }

  function _addNotif(evt){
    _notifications.push(evt);
    if(_notifications.length > 200) _notifications.splice(0, _notifications.length - 200);
    _updateBadge();
    if(_open) _renderNotif();
  }

  function _toggle(){
    _open = !_open;
    if(panel){ panel.style.display = _open ? 'flex' : 'none'; }
    if(_open){ _renderNotif(); }
  }

  function _markRead(){
    _readAt = Date.now();
    _updateBadge();
    _renderNotif();
    fetch('/api/workspace/notifications/read',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).catch(function(){});
  }

  // 点击面板外关闭
  document.addEventListener('click', function(e){
    if(!_open) return;
    if(btn && btn.contains(e.target)) return;
    if(panel && panel.contains(e.target)) return;
    _open = false;
    if(panel) panel.style.display = 'none';
  });

  if(btn) btn.addEventListener('click', _toggle);
  if(readBtn) readBtn.addEventListener('click', function(e){ e.stopPropagation(); _markRead(); });

  // 拉取历史通知（SSE 断线重连后同步）
  function _loadNotifications(){
    fetch('/api/workspace/notifications?limit=50').then(function(r){return r.json();}).then(function(d){
      if(!d||!d.ok) return;
      var hist = d.notifications || [];
      _notifications = hist;
      _updateBadge();
      if(_open) _renderNotif();
    }).catch(function(){});
  }
  _loadNotifications();

  // 导出：供 SSE handler 调用 addNotif
  window.__wsNotif = {
    add: _addNotif,
    click: function(jsonStr){
      try{
        var n = JSON.parse(jsonStr);
        var d = n.data || {};
        // 新消息/升级 → 跳转会话
        if((n.type==='inbox_message'||n.type==='escalation') && d.conversation_id){
          try{ sessionStorage.setItem('ws_focus_conv', d.conversation_id); }catch(_){}
          location.href='/workspace';
        } else if(n.type==='draft_sla_breach'||n.type==='draft_reassigned'){
          location.href='/workspace/drafts';
        } else if(n.type==='sla_alert'){
          if(d.conversation_id){
            try{ sessionStorage.setItem('ws_focus_conv', d.conversation_id); }catch(_){}
          }
          location.href='/workspace';
        }
      }catch(_){}
      _toggle();
    },
    reload: _loadNotifications,
  };
})();

// P39: 全局搜索
(function(){
  var _timer=null, _panel=null, _input=null;
  var _TYPE_ICON={message:'💬',contact:'👤',note:'📝'};
  var _TYPE_COLOR={message:'#2563eb',contact:'#7c3aed',note:'#0f766e'};
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function fmtTs(ts){if(!ts)return '';var d=new Date(ts<1e12?ts*1000:ts);return d.toLocaleDateString();}

  window._gsOnInput=function(val){
    clearTimeout(_timer);
    _panel=document.getElementById('gs-panel');
    if(!val||val.length<2){if(_panel)_panel.style.display='none';return;}
    _timer=setTimeout(function(){_gsSearch(val);},280);
  };
  window._gsKey=function(e){
    if(e.key==='Escape'){
      document.getElementById('gs-input').value='';
      if(_panel)_panel.style.display='none';
    }
  };
  function _gsSearch(q){
    _panel=document.getElementById('gs-panel');
    if(!_panel) return;
    _panel.style.display='block';
    _panel.innerHTML='<div style="padding:10px;font-size:12px;color:#94a3b8;">搜索中…</div>';
    fetch('/api/workspace/search?'+new URLSearchParams({q:q,limit:'15'}))
      .then(function(r){return r.json();}).then(function(d){
        if(!d.ok||!d.results||!d.results.length){
          _panel.innerHTML='<div style="padding:12px;font-size:12px;color:#94a3b8;text-align:center;">无结果</div>';
          return;
        }
        _panel.innerHTML=d.results.map(function(r){
          var icon=_TYPE_ICON[r.type]||'•';
          var color=_TYPE_COLOR[r.type]||'#64748b';
          return '<a href="'+esc(r.url||'#')+'" style="display:flex;gap:8px;align-items:flex-start;padding:8px 12px;text-decoration:none;border-bottom:1px solid #f1f5f9;" '
            +'onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'
            +'<span style="font-size:15px;flex:0 0 22px;margin-top:1px;">'+icon+'</span>'
            +'<div style="flex:1;min-width:0;">'
              +'<div style="font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(r.title||'')+'</div>'
              +'<div style="font-size:11px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(r.preview||'')+'</div>'
            +'</div>'
            +'<div style="font-size:10px;color:#94a3b8;flex:0 0 auto;margin-top:3px;">'+fmtTs(r.ts)+'</div>'
            +'<div style="font-size:9px;background:'+color+'22;color:'+color+';border-radius:4px;padding:1px 5px;flex:0 0 auto;">'+esc(r.type)+'</div>'
            +'</a>';
        }).join('')
        +'<div style="padding:6px;text-align:center;font-size:11px;color:#94a3b8;">共 '+d.total+' 条结果</div>';
      }).catch(function(){
        if(_panel)_panel.innerHTML='<div style="padding:10px;font-size:12px;color:#ef4444;">搜索失败</div>';
      });
  }
  // 点击外部关闭
  document.addEventListener('click',function(e){
    _panel=document.getElementById('gs-panel');
    var wrap=document.getElementById('gs-wrap');
    if(_panel&&wrap&&!wrap.contains(e.target)) _panel.style.display='none';
  });
})();
</script>
<main class="ws-body">
{% block content %}{% endblock %}
</main>
</body>
</html>
