{% extends "workspace_base.html" %}
{% block title %}经营 ROI 看板{% endblock %}
{% block head %}
<style>
  /* 令牌驱动（继承 workspace_base 的 --tk-*），日/夜两版自动适配；AI=蓝/人工=橙 双色序列保留。 */
  .roi-wrap{height:100%;overflow-y:auto;background:var(--tk-bg);padding:18px;}
  .roi-head{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;}
  .roi-head h2{margin:0;font-size:19px;color:var(--tk-text);}
  .roi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
  .roi-card{background:var(--tk-surface);border:1px solid var(--tk-border);border-radius:var(--tk-radius-lg,14px);padding:18px;box-shadow:var(--tk-shadow);}
  .roi-card .v{font-size:30px;font-weight:800;color:var(--tk-text);line-height:1.1;}
  .roi-card .v.good{color:var(--tk-ok-ink);} .roi-card .v.warn{color:var(--tk-warn-ink);} .roi-card .v.bad{color:var(--tk-danger-ink);}
  .roi-card .l{font-size:12px;color:var(--tk-text-muted);margin-top:6px;}
  .roi-card .s{font-size:11px;color:var(--tk-text-muted);margin-top:2px;}
  .roi-sec{background:var(--tk-surface);border:1px solid var(--tk-border);border-radius:var(--tk-radius-lg,14px);padding:18px;margin-bottom:14px;box-shadow:var(--tk-shadow);}
  .roi-sec h3{margin:0 0 12px;font-size:14px;color:var(--tk-text);}
  .roi-bar{height:10px;border-radius:6px;background:var(--tk-surface-2);overflow:hidden;display:flex;}
  .roi-bar i{display:block;height:100%;}
  .roi-bar .ai{background:var(--tk-brand);} .roi-bar .hu{background:var(--tk-amber);}
  .roi-legend{display:flex;gap:16px;font-size:12px;color:var(--tk-text-muted);margin-top:8px;}
  .roi-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle;}
  .roi-back{font-size:12px;color:var(--tk-brand);text-decoration:none;}
  .roi-delta{font-size:11px;margin-top:4px;font-weight:600;}
  .roi-delta.up{color:var(--tk-ok-ink);} .roi-delta.down{color:var(--tk-danger-ink);} .roi-delta.flat{color:var(--tk-text-muted);}
  .roi-spark{display:flex;align-items:flex-end;gap:3px;height:46px;margin-top:6px;}
  .roi-spark .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;min-width:3px;}
  .roi-spark .col i{display:block;border-radius:1px;}
  .roi-spark .col .ai{background:var(--tk-brand);} .roi-spark .col .hu{background:var(--tk-amber);}
  .roi-pill{font-size:12px;padding:4px 10px;border:1px solid var(--tk-border);border-radius:14px;background:var(--tk-surface);color:var(--tk-text);cursor:pointer;}
  .roi-pill.active{background:var(--tk-brand);color:#fff;border-color:var(--tk-brand);}
  .health{display:flex;align-items:center;gap:10px;}
  .health-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;}
  .health-ok{background:rgba(16,185,129,.14);color:var(--tk-ok-ink);} .health-warn{background:rgba(245,158,11,.16);color:var(--tk-warn-ink);}
  .health-error{background:rgba(225,29,72,.14);color:var(--tk-danger-ink);}
  .health-issue{font-size:12px;color:var(--tk-text-muted);padding:5px 0;border-bottom:1px solid var(--tk-border);}
  .health-issue b{color:var(--tk-text);}
</style>
{% endblock %}
{% block content %}
<div class="roi-wrap">
  <a class="roi-back" href="/workspace/dash">← 返回今日概览</a>
  <div class="roi-head">
    <h2>经营 ROI 看板</h2>
    <div style="display:flex;gap:8px;">
      <span class="roi-pill active" data-days="7" onclick="roiSetDays(7,this)">近 7 天</span>
      <span class="roi-pill" data-days="30" onclick="roiSetDays(30,this)">近 30 天</span>
    </div>
  </div>

  <div class="roi-grid" id="roi-cards"></div>

  <div class="roi-sec">
    <h3>AI 自动应答 vs 人工接管</h3>
    <div class="roi-bar" id="roi-aibar"><i class="ai" style="width:0"></i><i class="hu" style="width:0"></i></div>
    <div class="roi-legend">
      <span><span class="roi-dot" style="background:var(--tk-brand)"></span>AI 自动 <b id="roi-ai-n">0</b></span>
      <span><span class="roi-dot" style="background:var(--tk-amber)"></span>人工 <b id="roi-hu-n">0</b></span>
      <span style="color:var(--tk-text-muted);">拦截未发 <b id="roi-sup-n">0</b></span>
    </div>
    <div class="roi-spark" id="roi-spark"></div>
    <div style="font-size:11px;color:var(--tk-text-muted);margin-top:4px;">每日 AI（蓝）/ 人工（橙）发送量</div>
  </div>

  <div class="roi-sec">
    <h3>配置健康度</h3>
    <div class="health" id="roi-health">加载中…</div>
    <div id="roi-health-issues" style="margin-top:10px;"></div>
  </div>
</div>

<script>
var ROI_DAYS = 7;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function roiSetDays(d, el){
  ROI_DAYS = d;
  document.querySelectorAll('.roi-pill').forEach(function(p){p.classList.remove('active');});
  if(el) el.classList.add('active');
  loadRoi();
}

function deltaHtml(dp, unit){
  // dp: 环比数值（百分点或百分比）；null=无基数
  if(dp==null) return '<div class="roi-delta flat">环比 —</div>';
  var cls = dp>0?'up':(dp<0?'down':'flat');
  var arrow = dp>0?'▲':(dp<0?'▼':'■');
  return '<div class="roi-delta '+cls+'">环比 '+arrow+' '+Math.abs(dp)+(unit||'%')+'</div>';
}

function card(v, label, sub, cls, deltaH){
  return '<div class="roi-card"><div class="v '+(cls||'')+'">'+esc(v)+'</div>'
    +'<div class="l">'+esc(label)+'</div>'
    +(sub?'<div class="s">'+esc(sub)+'</div>':'')
    +(deltaH||'')+'</div>';
}

function renderSpark(trend){
  var el=document.getElementById('roi-spark');
  if(!trend||!trend.length){ el.innerHTML='<span style="font-size:11px;color:var(--tk-text-muted);">暂无数据</span>'; return; }
  var max=1;
  trend.forEach(function(t){ var s=(t.ai||0)+(t.human||0); if(s>max)max=s; });
  el.innerHTML=trend.map(function(t){
    var ai=t.ai||0, hu=t.human||0;
    var aih=Math.round(ai/max*44), huh=Math.round(hu/max*44);
    return '<div class="col" title="'+esc(t.day)+'：AI '+ai+' / 人工 '+hu+'">'
      +'<i class="hu" style="height:'+huh+'px"></i>'
      +'<i class="ai" style="height:'+aih+'px"></i></div>';
  }).join('');
}

function loadRoi(){
  fetch('/api/workspace/roi?days='+ROI_DAYS).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) return;
    var a=d.automation||{}, b=d.business||{}, h=d.config_health||{}, cmp=a.compare||{}, rel=d.relationship||{};
    // KPI 卡
    var cards='';
    if(rel.active_relationships>0){
      cards+=card(rel.active_relationships,'活跃关系','期内有用户互动的关系数','good');
      cards+=card(rel.sticky_rate_pct+'%','关系黏性',
        rel.sticky_relationships+' 个跨天回访（越高越好）',
        rel.sticky_rate_pct>=40?'good':(rel.sticky_rate_pct>=20?'warn':'bad'));
      cards+=card(rel.avg_turns,'人均往来轮次','关系深度（越高越深）',
        rel.avg_turns>=10?'good':(rel.avg_turns>=4?'warn':'bad'));
      cards+=card(rel.retention_d7_pct+'%','D7 留存',
        '新关系 '+(rel.cohort_size||0)+' 个的 7 日回访',
        rel.retention_d7_pct>=30?'good':(rel.retention_d7_pct>=15?'warn':'bad'));
    }
    cards+=card(a.ai_share_pct!=null?a.ai_share_pct+'%':'—','AI 自动应答占比','共 '+(a.total_sent||0)+' 条回复',
      a.ai_share_pct>=50?'good':'', deltaHtml(cmp.ai_share_delta_pp,'pp'));
    cards+=card(a.saved_hours!=null?a.saved_hours:'—','节省人力（人时）','按每条 '+(a.sec_per_reply||180)+'s 估算',
      'good', deltaHtml(cmp.saved_hours_delta_pct));
    if(a.cost_per_hour>0){
      cards+=card('¥'+(a.saved_money||0),'节省金额','按 ¥'+a.cost_per_hour+'/人时','good', deltaHtml(cmp.saved_hours_delta_pct));
    }
    cards+=card(a.human_sent||0,'人工接管','坐席处置后发送');
    cards+=card(b.conversions||0,'引流成功','转化率 '+(b.conversion_rate||0)+'%','good');
    cards+=card((b.frt_attain_rate||0)+'%','首响达标率','已响应 '+(b.frt_responded||0)+' 会话', b.frt_attain_rate>=80?'good':(b.frt_attain_rate>=50?'warn':'bad'));
    cards+=card(b.new_contacts||0,'新增客户','留资率 '+(b.lead_rate||0)+'%');
    document.getElementById('roi-cards').innerHTML=cards;
    // AI/人工 条
    var ai=a.ai_sent||0, hu=a.human_sent||0, tot=ai+hu;
    var aip=tot?Math.round(ai/tot*100):0;
    var bar=document.getElementById('roi-aibar');
    bar.querySelector('.ai').style.width=aip+'%';
    bar.querySelector('.hu').style.width=(100-aip)+'%';
    document.getElementById('roi-ai-n').textContent=ai;
    document.getElementById('roi-hu-n').textContent=hu;
    document.getElementById('roi-sup-n').textContent=a.suppressed||0;
    renderSpark(a.trend);
    // 配置健康度
    var hEl=document.getElementById('roi-health');
    if(!h.available){ hEl.innerHTML='<span class="tk-load">配置自检不可用</span>'; }
    else {
      var st=h.status||'ok';
      var badge=st==='error'?'<span class="health-badge health-error">✗ '+h.errors+' 错误</span>'
        :(st==='warn'?'<span class="health-badge health-warn">! '+h.warnings+' 警告</span>'
        :'<span class="health-badge health-ok">✓ 配置正常</span>');
      hEl.innerHTML=badge+'<span style="font-size:12px;color:var(--tk-text-muted);">'
        +(st==='ok'?'未发现问题':'运行 <code>python main.py --check</code> 查看详情')+'</span>';
      var iss=(h.top_issues||[]).map(function(i){
        return '<div class="health-issue"><b>['+esc(i.severity)+']</b> '+esc(i.path)+'：'+esc(i.message)+'</div>';
      }).join('');
      document.getElementById('roi-health-issues').innerHTML=iss;
    }
  }).catch(function(){});
}
loadRoi();
setInterval(loadRoi, 60000);
</script>
{% endblock %}
