{% extends "workspace_base.html" %}
{% block title %}用量计量{% endblock %}
{% block head %}
<style>
  .ug-wrap{height:100%;overflow-y:auto;background:#f7f8fa;padding:18px;max-width:900px;margin:0 auto;}
  .ug-head{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;}
  .ug-head h2{margin:0;font-size:19px;}
  .ug-back{font-size:12px;color:#2563eb;text-decoration:none;}
  .ug-pill{font-size:12px;padding:4px 10px;border:1px solid #d1d5db;border-radius:14px;background:#fff;cursor:pointer;}
  .ug-pill.active{background:#2563eb;color:#fff;border-color:#2563eb;}
  .ug-lic{display:flex;align-items:center;gap:12px;border-radius:12px;padding:12px 16px;margin-bottom:16px;
    border:1px solid #e5e7eb;background:#fff;font-size:13px;}
  .ug-lic .badge{padding:3px 10px;border-radius:14px;font-size:12px;font-weight:700;}
  .ug-lic.ok .badge{background:#dcfce7;color:#15803d;}
  .ug-lic.warn .badge{background:#fef3c7;color:#b45309;}
  .ug-lic.over .badge{background:#fee2e2;color:#b91c1c;}
  .ug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:14px;margin-bottom:16px;}
  .ug-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;}
  .ug-card .v{font-size:28px;font-weight:800;color:#0f172a;}
  .ug-card .l{font-size:12px;color:#64748b;margin-top:4px;}
  .ug-card .d{font-size:11px;margin-top:4px;font-weight:600;}
  .ug-card .d.up{color:#15803d;} .ug-card .d.down{color:#b91c1c;} .ug-card .d.flat{color:#94a3b8;}
  .ug-sec{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin-bottom:14px;}
  .ug-sec h3{margin:0 0 12px;font-size:14px;color:#374151;}
  .ug-spark{display:flex;align-items:flex-end;gap:3px;height:90px;margin-top:6px;}
  .ug-spark .col{flex:1;min-width:3px;display:flex;flex-direction:column;justify-content:flex-end;gap:1px;}
  .ug-spark .col .m{background:#93c5fd;border-radius:1px;}
  .ug-spark .col .a{background:#2563eb;border-radius:1px;}
  .ug-legend{display:flex;gap:14px;font-size:12px;color:#475569;margin-top:10px;}
  .ug-dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;}
</style>
{% endblock %}
{% block content %}
<div class="ug-wrap">
  <a class="ug-back" href="/workspace/dash">← 返回今日概览</a>
  <div class="ug-head">
    <h2>用量计量</h2>
    <div style="display:flex;gap:8px;">
      <span class="ug-pill" data-days="7" onclick="ugDays(7,this)">近 7 天</span>
      <span class="ug-pill active" data-days="30" onclick="ugDays(30,this)">近 30 天</span>
    </div>
  </div>

  <div class="ug-lic ok" id="ug-lic" style="display:none;">
    <span style="font-size:1.2rem;">🔑</span>
    <div style="flex:1;">
      <div id="ug-lic-title" style="font-weight:700;color:#0f172a;"></div>
      <div id="ug-lic-sub" style="color:#64748b;font-size:12px;margin-top:2px;"></div>
    </div>
    <span class="badge" id="ug-lic-badge"></span>
  </div>

  <div id="ug-empty" style="display:none;color:#94a3b8;font-size:14px;padding:40px;text-align:center;">
    暂无用量数据（接入渠道并开始收发消息后将逐步积累）。
  </div>

  <div id="ug-body" style="display:none;">
    <div class="ug-grid" id="ug-cards"></div>
    <div class="ug-sec">
      <h3>每日用量趋势</h3>
      <div class="ug-spark" id="ug-spark"></div>
      <div class="ug-legend">
        <span><span class="ug-dot" style="background:#93c5fd;"></span>消息量</span>
        <span><span class="ug-dot" style="background:#2563eb;"></span>AI 调用数</span>
      </div>
    </div>
    <div style="font-size:11px;color:#94a3b8;text-align:center;">
      口径：消息量=收发消息条数；AI 调用数=生成的 AI 草稿数；活跃坐席=窗口内有处置记录的去重坐席数。
    </div>
  </div>

  <!-- C2-1 计费对账 -->
  <div class="ug-sec" style="margin-top:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
      <h3 style="margin:0;">计费对账单</h3>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="month" id="bl-month" style="font-size:13px;padding:4px 8px;border:1px solid #d1d5db;border-radius:8px;">
        <button class="ug-pill" onclick="blLoad()">生成</button>
        <button class="ug-pill" onclick="blCsv()" style="background:#2563eb;color:#fff;border-color:#2563eb;">导出 CSV</button>
      </div>
    </div>
    <div id="bl-meta" style="font-size:12px;color:#64748b;margin-bottom:10px;"></div>
    <table id="bl-table" style="width:100%;border-collapse:collapse;font-size:13px;display:none;">
      <thead><tr style="text-align:left;color:#64748b;border-bottom:1px solid #e5e7eb;">
        <th style="padding:6px 4px;">项目</th><th style="padding:6px 4px;text-align:right;">数量</th></tr></thead>
      <tbody id="bl-rows"></tbody>
    </table>
    <div id="bl-charges" style="margin-top:14px;display:none;">
      <div style="font-size:13px;color:#374151;font-weight:700;margin-bottom:6px;">应收金额</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <tbody id="bl-charge-rows"></tbody>
      </table>
      <div id="bl-total" style="text-align:right;font-size:16px;font-weight:800;color:#0f172a;margin-top:8px;"></div>
    </div>
    <div id="bl-empty" style="color:#94a3b8;font-size:13px;padding:14px 4px;display:none;">该账期暂无用量数据。</div>
  </div>
</div>
<script>
var UG_DAYS=30;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function planName(p){return {community:'社区版',basic:'基础版',pro:'专业版',flagship:'旗舰版'}[p]||p||'—';}

function ugDays(d,el){
  UG_DAYS=d;
  var pills=document.querySelectorAll('.ug-pill');
  for(var i=0;i<pills.length;i++) pills[i].classList.remove('active');
  if(el) el.classList.add('active');
  load();
}

function deltaHtml(v,suffix){
  if(v==null) return '<span class="d flat">— 无环比</span>';
  var cls=v>0?'up':(v<0?'down':'flat');
  var arrow=v>0?'▲':(v<0?'▼':'—');
  return '<span class="d '+cls+'">'+arrow+' '+Math.abs(v)+(suffix||'%')+' 环比</span>';
}

function renderLicense(lic,quota){
  var el=document.getElementById('ug-lic'); if(!el||!lic) return;
  el.style.display='flex';
  var lvl=(quota&&quota.level)||'ok';
  el.className='ug-lic '+(lvl==='over'?'over':(lvl==='warn'?'warn':'ok'));
  document.getElementById('ug-lic-title').textContent=planName(lic.plan)+(lic.state==='unlicensed'?'（社区模式）':'');
  document.getElementById('ug-lic-sub').textContent=(quota&&quota.text)||'';
  var b=document.getElementById('ug-lic-badge');
  b.textContent=lvl==='over'?'超额':(lvl==='warn'?'接近上限':'正常');
}

function renderCards(u,cmp){
  var cards=[
    {v:u.messages_total, l:'消息总量', d:deltaHtml(cmp.messages_delta_pct)},
    {v:u.ai_calls, l:'AI 调用数', d:deltaHtml(cmp.ai_calls_delta_pct)},
    {v:u.ai_sent, l:'AI 自动发送', d:''},
    {v:u.active_agents, l:'活跃坐席', d:''}
  ];
  document.getElementById('ug-cards').innerHTML=cards.map(function(c){
    return '<div class="ug-card"><div class="v">'+c.v+'</div><div class="l">'+c.l+'</div>'+(c.d||'')+'</div>';
  }).join('');
}

function renderSpark(trend){
  var el=document.getElementById('ug-spark'); if(!el) return;
  if(!trend||!trend.length){ el.innerHTML='<span style="color:#94a3b8;font-size:12px;">暂无趋势</span>'; return; }
  var max=1;
  trend.forEach(function(t){ max=Math.max(max,t.messages||0,t.ai_calls||0); });
  el.innerHTML=trend.map(function(t){
    var mh=Math.round((t.messages||0)/max*80);
    var ah=Math.round((t.ai_calls||0)/max*80);
    return '<div class="col" title="'+esc(t.day)+'：消息 '+(t.messages||0)+' / AI '+(t.ai_calls||0)+'">'
      +'<i class="m" style="height:'+mh+'px;"></i><i class="a" style="height:'+ah+'px;"></i></div>';
  }).join('');
}

function load(){
  fetch('/api/workspace/usage?days='+UG_DAYS).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) return;
    renderLicense(d.license, d.quota);
    if(!d.available || !(d.usage&&d.usage.messages_total)){
      document.getElementById('ug-empty').style.display='block';
      document.getElementById('ug-body').style.display='none';
      return;
    }
    document.getElementById('ug-empty').style.display='none';
    document.getElementById('ug-body').style.display='block';
    renderCards(d.usage, d.compare||{});
    renderSpark(d.trend||[]);
  }).catch(function(){});
}
function blMonth(){
  var el=document.getElementById('bl-month');
  if(el&&el.value) return el.value;
  var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function blLoad(){
  var m=blMonth();
  fetch('/api/workspace/billing?month='+encodeURIComponent(m)).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) return;
    var rec=d.reconcile||{};
    var meta='账期 '+esc(d.period)+' · 套餐 '+planName(d.plan)
      +(d.customer?(' · 客户 '+esc(d.customer)):'')
      +' · 席位 '+(d.seats||0)+'（活跃 '+(rec.active_agents||0)+'）';
    if(rec.over_seats>0) meta+=' · ⚠ 超额 '+rec.over_seats;
    document.getElementById('bl-meta').textContent=meta;
    var items=(d.available&&d.line_items)||[];
    var ch=d.charges||null;
    if(!items.length){
      document.getElementById('bl-table').style.display='none';
      document.getElementById('bl-empty').style.display='block';
      document.getElementById('bl-charges').style.display='none';
      return;
    }
    document.getElementById('bl-empty').style.display='none';
    document.getElementById('bl-table').style.display='table';
    document.getElementById('bl-rows').innerHTML=items.map(function(li){
      return '<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:6px 4px;">'+esc(li.label)
        +'</td><td style="padding:6px 4px;text-align:right;font-weight:600;">'+(li.qty||0)+'</td></tr>';
    }).join('');
    if(ch && ch.lines){
      document.getElementById('bl-charges').style.display='block';
      document.getElementById('bl-charge-rows').innerHTML=ch.lines.map(function(ln){
        return '<tr style="border-bottom:1px solid #f1f5f9;"><td style="padding:6px 4px;color:#475569;">'+esc(ln.label)
          +'</td><td style="padding:6px 4px;text-align:right;">'+esc(ch.currency)+' '+(ln.amount||0)+'</td></tr>';
      }).join('');
      document.getElementById('bl-total').textContent='合计 '+esc(ch.currency)+' '+(ch.total||0);
    } else {
      document.getElementById('bl-charges').style.display='none';
    }
  }).catch(function(){});
}
function blCsv(){
  window.open('/api/workspace/billing?format=csv&month='+encodeURIComponent(blMonth()), '_blank');
}
(function(){ var el=document.getElementById('bl-month'); if(el&&!el.value){ el.value=blMonth(); } blLoad(); })();

load();
setInterval(load, 120000);
</script>
{% endblock %}
