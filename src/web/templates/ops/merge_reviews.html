<!doctype html>
<html lang="{{ 'zh-CN' if (ui_lang|default('zh')) == 'zh' else 'en' }}"><head><meta charset="utf-8">
<title>Merge Reviews · Ops</title>
{% include "_i18n_bootstrap.html" %}
<style>
body{font-family:-apple-system,Segoe UI,sans-serif;max-width:1100px;margin:20px auto;padding:0 20px;background:#fafafa;color:#222}
h1{font-size:20px;margin-bottom:4px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:14px 18px;margin:12px 0}
.conf{font-weight:600;color:#2563eb}
.breakdown{font-size:12px;color:#555;margin:6px 0}
.breakdown span{display:inline-block;padding:2px 6px;background:#f3f4f6;border-radius:3px;margin-right:4px}
.actions{margin-top:10px}
button{padding:6px 14px;margin-right:8px;border:1px solid #ccc;border-radius:5px;background:#fff;cursor:pointer;font-size:13px}
.btn-ok{background:#10b981;color:#fff;border-color:#10b981}
.btn-reject{background:#ef4444;color:#fff;border-color:#ef4444}
.empty{padding:40px;text-align:center;color:#888}
.nav{margin-bottom:20px}
.nav a{margin-right:14px;font-size:13px;color:#2563eb;text-decoration:none}
.nav a.active{font-weight:700;color:#1e3a8a;border-bottom:2px solid #2563eb;padding-bottom:2px}
</style></head>
<body>
{% include "ops/_ops_nav.html" %}
<h1>{{ (i18n or {}).get('ops.mr.title', '合并审核队列') }}</h1>
<div id="list"></div>
<script>
function escapeHtml(s){return (s+'').replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function load(){
  const data = await fetch('/api/merge-reviews').then(r=>r.json());
  const list = document.getElementById('list');
  if(!data.items||data.items.length===0){
    list.innerHTML='<div class="empty">'+window.T('ops.mr.empty')+'</div>';return;
  }
  list.innerHTML = data.items.map(it=>{
    const cand = it.candidate_ci||{};
    const tgt = it.target_contact||{};
    const bd = Object.entries(it.breakdown||{}).map(([k,v])=>`<span>${escapeHtml(k)}: ${v}</span>`).join('');
    return `<div class="card" id="card-${it.review_id}">
      <div><b>${window.T('ops.mr.candidate')}</b>${window.Tf('ops.mr.cand_rest',{name:escapeHtml(cand.display_name||'-'),ch:'<b>'+escapeHtml(cand.channel||'-')+'</b>',id:escapeHtml(cand.external_id||'-')})}</div>
      <div><b>${window.T('ops.mr.target')}</b>${window.Tf('ops.mr.tgt_rest',{name:escapeHtml(tgt.primary_name||'-'),lang:escapeHtml(tgt.language_hint||'-'),tz:escapeHtml(tgt.timezone_hint||'-')})}</div>
      <div>${window.T('ops.mr.confidence')} <span class="conf">${(it.confidence*100).toFixed(1)}%</span></div>
      <div class="breakdown">${bd}</div>
      <div class="actions">
        <button class="btn-ok" onclick="act('${it.review_id}','approve')">${window.T('ops.mr.approve')}</button>
        <button class="btn-reject" onclick="act('${it.review_id}','reject')">${window.T('ops.mr.reject')}</button>
      </div>
    </div>`;
  }).join('');
}
async function act(rid, kind){
  const r = await fetch(`/api/merge-reviews/${rid}/${kind}`, {method:'POST'});
  if(r.ok){
    document.getElementById(`card-${rid}`).style.opacity='0.4';
    setTimeout(load, 500);
  } else {
    alert(window.T('ops.mr.op_fail')+' status='+r.status);
  }
}
load().catch(e=>document.body.innerHTML+='<p style="color:red">'+window.T('ops.mr.load_fail')+': '+e+'</p>');
</script>
</body></html>
