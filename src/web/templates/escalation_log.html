{% extends "workspace_base.html" %}
{% block title %}升级历史{% endblock %}
{% block head %}
<style>
  /* 令牌驱动（继承 workspace_base 的 --tk-*），日/夜两版自动适配。 */
  .el-wrap{height:100%;display:flex;flex-direction:column;background:var(--tk-bg);}
  .el-bar{padding:12px 18px;background:var(--tk-surface);border-bottom:1px solid var(--tk-border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--tk-text);}
  .el-bar a.back{font-size:12px;color:var(--tk-brand);text-decoration:none;}
  .el-sel{border:1px solid var(--tk-border);border-radius:7px;padding:7px 9px;font-size:13px;background:var(--tk-surface);color:var(--tk-text);}
  .el-stats{display:flex;gap:10px;flex-wrap:wrap;padding:12px 18px;}
  .el-card{background:var(--tk-surface);border:1px solid var(--tk-border);border-radius:10px;padding:10px 14px;min-width:120px;box-shadow:var(--tk-shadow);}
  .el-num{font-size:20px;font-weight:800;background:var(--tk-num-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--tk-brand);}
  .el-lbl{font-size:12px;color:var(--tk-text-muted);margin-top:2px;}
  .el-list{flex:1;overflow-y:auto;padding:0 18px 18px;}
  .el-row{background:var(--tk-surface);border:1px solid var(--tk-border);border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--tk-shadow);}
  .el-name{font-weight:600;font-size:14px;cursor:pointer;color:var(--tk-text);}
  .el-name:hover{color:var(--tk-brand);}
  .el-meta{font-size:12px;color:var(--tk-text-muted);margin-top:3px;}
  .el-rz{display:inline-block;font-size:10px;font-weight:600;border-radius:5px;padding:1px 6px;background:rgba(168,85,247,.16);color:var(--tk-violet);}
  .el-right{margin-left:auto;text-align:right;white-space:nowrap;}
  .el-taken{color:var(--tk-ok-ink);font-weight:600;} .el-pending{color:var(--tk-warn-ink);font-weight:600;}
</style>
{% endblock %}
{% block content %}
<div class="el-wrap">
  <div class="el-bar">
    <a class="back" href="/workspace/dash">← 概览</a>
    <span style="font-weight:600;">升级历史 / 接管时延</span>
    <select class="el-sel" id="el-days" onchange="EL.load()">
      <option value="7">近 7 日</option>
      <option value="30">近 30 日</option>
    </select>
  </div>
  <div class="el-stats" id="el-stats"></div>
  <div class="el-list" id="el-list"><span class="tk-load">加载中…</span></div>
</div>
<script>
(function(){
  var RZ={unclaimed:'无人认领',holder_offline:'坐席离线',holder_quiet:'坐席静音/免打扰'};
  function esc(s){return CRMW.esc(s);}
  function fmtDur(s){return CRMW.fmtDur(s);}
  function fmtTs(ts){ if(!ts) return '—'; var d=new Date(ts*1000); return d.toLocaleDateString()+' '+d.toLocaleTimeString().slice(0,5); }
  function card(num,lbl){ return '<div class="el-card"><div class="el-num">'+num+'</div><div class="el-lbl">'+esc(lbl)+'</div></div>'; }
  function render(d){
    var s=d.stats||{};
    document.getElementById('el-stats').innerHTML=
      card(s.total||0,'升级总数')
      +card((s.taken||0)+' ('+(s.taken_rate||0)+'%)','已接管')
      +card(s.taken? fmtDur(s.avg_takeover_sec):'—','平均接管时延');
    var its=d.items||[];
    var box=document.getElementById('el-list');
    if(!its.length){ box.innerHTML='<span class="tk-load">该窗口暂无升级记录</span>'; return; }
    box.innerHTML=its.map(function(it){
      var rz=RZ[it.reason]||it.reason;
      var taken = it.takeover_sec!=null
        ? '<span class="el-taken">接管 '+fmtDur(it.takeover_sec)+'</span>'
        : '<span class="el-pending">未接管</span>';
      var holder = it.agent_name||it.agent_id;
      return '<div class="el-row">'
        +'<div><div class="el-name" onclick="EL.go(\''+esc(it.conversation_id)+'\')">'+esc(it.name)+' <span class="tk-load" style="font-size:11px;">'+esc(it.platform)+'</span></div>'
        +'<div class="el-meta"><span class="el-rz">'+esc(rz)+'</span> · 等待 '+fmtDur(it.wait_sec)+(holder?(' · 原认领 '+esc(holder)):'')+' · '+fmtTs(it.ts)+'</div></div>'
        +'<div class="el-right">'+taken+(it.taken_by?('<div class="el-meta">by '+esc(it.taken_by)+'</div>'):'')+'</div>'
        +'</div>';
    }).join('');
  }
  window.EL={
    load:function(){
      document.getElementById('el-list').innerHTML='<span class="tk-load">加载中…</span>';
      var days=document.getElementById('el-days').value;
      fetch('/api/workspace/escalation-log?days='+days).then(function(r){return r.json();}).then(function(d){
        if(!d.ok){ document.getElementById('el-list').innerHTML='<span class="tk-load">收件箱未启用</span>'; return; }
        render(d);
      }).catch(function(){ document.getElementById('el-list').innerHTML='<span class="tk-fail">加载失败</span>'; });
    },
    go:function(cid){ try{ sessionStorage.setItem('ws_focus_conv', cid); }catch(_){ } location.href='/workspace'; }
  };
  EL.load(); setInterval(EL.load, 60000);
})();
</script>
{% endblock %}
