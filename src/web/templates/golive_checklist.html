{% extends "workspace_base.html" %}
{% block title %}上线自检{% endblock %}
{% block head %}
<style>
  .gl-wrap{height:100%;overflow-y:auto;background:#f7f8fa;padding:18px;max-width:760px;margin:0 auto;}
  .gl-back{font-size:12px;color:#2563eb;text-decoration:none;}
  .gl-light{display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:22px 24px;margin:12px 0 18px;}
  .gl-dot{width:54px;height:54px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 6px rgba(0,0,0,.04);}
  .gl-dot.green{background:#16a34a;} .gl-dot.yellow{background:#f59e0b;} .gl-dot.red{background:#dc2626;}
  .gl-light h2{margin:0 0 4px;font-size:20px;}
  .gl-light p{margin:0;font-size:13px;color:#64748b;}
  .gl-sum{margin-left:auto;text-align:right;font-size:12px;color:#64748b;}
  .gl-sum b{font-size:18px;}
  .gl-item{display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 18px;margin-bottom:10px;}
  .gl-ico{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
  .gl-ico.ok{background:#16a34a;} .gl-ico.warn{background:#f59e0b;} .gl-ico.fail{background:#dc2626;}
  .gl-body{flex:1;min-width:0;}
  .gl-name{font-size:14px;font-weight:600;color:#0f172a;}
  .gl-detail{font-size:12px;color:#64748b;margin-top:2px;}
  .gl-act{font-size:12px;font-weight:600;color:#2563eb;text-decoration:none;border:1px solid #bfdbfe;border-radius:8px;padding:6px 12px;background:#eff6ff;white-space:nowrap;}
  .gl-act:hover{background:#dbeafe;}
  .gl-refresh{font-size:12px;color:#2563eb;cursor:pointer;border:1px solid #d1d5db;border-radius:8px;padding:6px 12px;background:#fff;}
</style>
{% endblock %}
{% block content %}
<div class="gl-wrap">
  <a class="gl-back" href="/workspace/setup">← 返回接入向导</a>
  <div class="gl-light" id="gl-light">
    <div class="gl-dot" id="gl-dot"></div>
    <div><h2 id="gl-title">检测中…</h2><p id="gl-sub"></p></div>
    <div class="gl-sum" id="gl-sum"></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:10px;">
    <span class="gl-refresh" onclick="load()">↻ 重新检测</span>
  </div>
  <div id="gl-list"></div>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

var LIGHT={green:{t:'✅ 可以上线',s:'所有硬性条件已满足，开张吧！'},
           yellow:{t:'⚠ 可上线，但有建议项',s:'硬性条件已满足，黄色项建议尽快完善。'},
           red:{t:'⛔ 暂不可上线',s:'存在必须修复的硬性问题，见下方红色项。'}};

function icon(st){ return st==='ok'?'<div class="gl-ico ok">✓</div>'
  :(st==='warn'?'<div class="gl-ico warn">!</div>':'<div class="gl-ico fail">✕</div>'); }

function render(d){
  var light=d.light||'red', meta=LIGHT[light]||LIGHT.red;
  document.getElementById('gl-dot').className='gl-dot '+light;
  document.getElementById('gl-title').textContent=meta.t;
  document.getElementById('gl-sub').textContent=meta.s;
  var s=d.summary||{};
  document.getElementById('gl-sum').innerHTML='<b style="color:#16a34a;">'+(s.ok||0)+'</b> 通过　'
    +'<b style="color:#f59e0b;">'+(s.warn||0)+'</b> 建议　'
    +'<b style="color:#dc2626;">'+(s.fail||0)+'</b> 待修';
  document.getElementById('gl-list').innerHTML=(d.checks||[]).map(function(c){
    var act=c.action_url?'<a class="gl-act" href="'+esc(c.action_url)+'">'+esc(c.action_label||'处理')+'</a>':'';
    return '<div class="gl-item">'+icon(c.status)
      +'<div class="gl-body"><div class="gl-name">'+esc(c.name)+'</div>'
      +'<div class="gl-detail">'+esc(c.detail)+'</div></div>'+act+'</div>';
  }).join('');
}

function load(){
  fetch('/api/setup/checklist').then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) return; render(d);
  }).catch(function(){});
}
load();
</script>
{% endblock %}
