{% extends "workspace_base.html" %}
{% block title %}知识库冷启动{% endblock %}
{% block head %}
<style>
  .ks-wrap{height:100%;overflow-y:auto;background:#f7f8fa;padding:18px;max-width:880px;margin:0 auto;}
  .ks-head{margin:6px 0 14px;}
  .ks-head h2{margin:0 0 4px;font-size:19px;}
  .ks-head p{margin:0;font-size:13px;color:#64748b;}
  .ks-status{display:flex;gap:14px;align-items:center;background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px 18px;margin-bottom:16px;}
  .ks-status .big{font-size:30px;font-weight:800;color:#0f172a;}
  .ks-status .lbl{font-size:12px;color:#64748b;}
  .ks-flag{margin-left:auto;font-size:12px;font-weight:700;padding:5px 12px;border-radius:9px;}
  .ks-flag.cold{background:#fef3c7;color:#b45309;} .ks-flag.warm{background:#dcfce7;color:#15803d;}
  .ks-packs{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .ks-pack{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px;display:flex;flex-direction:column;}
  .ks-pack h3{margin:0 0 4px;font-size:15px;color:#0f172a;}
  .ks-pack .d{font-size:12px;color:#64748b;flex:1;}
  .ks-pack .c{font-size:11px;color:#94a3b8;margin:8px 0;}
  .ks-pack button{border:0;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer;background:#2563eb;color:#fff;}
  .ks-pack button:hover{background:#1d4ed8;}
  .ks-pack button:disabled{background:#cbd5e1;cursor:default;}
  .ks-msg{font-size:12px;margin-top:8px;min-height:16px;}
  .ks-msg.ok{color:#15803d;} .ks-msg.err{color:#b91c1c;}
  .ks-next{margin-top:18px;background:#eff6ff;border-radius:12px;padding:14px 16px;font-size:13px;color:#1e40af;}
  .ks-next a{color:#1d4ed8;font-weight:600;}
  .ks-back{font-size:12px;color:#2563eb;text-decoration:none;}
</style>
{% endblock %}
{% block content %}
<div class="ks-wrap">
  <a class="ks-back" href="/workspace/setup">← 返回接入向导</a>
  <div class="ks-head">
    <h2>知识库冷启动</h2>
    <p>渠道接好了，但 AI 还没有可答的私域知识。选一个场景一键播种起步话术，随后到知识库微调。</p>
  </div>

  <div class="ks-status" id="ks-status">
    <div><div class="big" id="ks-count">—</div><div class="lbl">已启用知识条目</div></div>
    <div><div class="big" id="ks-cat">—</div><div class="lbl">覆盖分类</div></div>
    <span class="ks-flag" id="ks-flag">检测中…</span>
  </div>

  <div class="ks-packs" id="ks-packs"></div>

  <div class="ks-next">
    播种后建议：① 到 <a href="/knowledge">知识库管理</a> 按自家业务修改话术；
    ② 用 <a href="/knowledge">沙盒测试</a> 输入客户问法，确认 AI 能命中作答。
  </div>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function renderStatus(r){
  document.getElementById('ks-count').textContent=r.enabled_entries!=null?r.enabled_entries:'—';
  document.getElementById('ks-cat').textContent=r.category_count!=null?r.category_count:'—';
  var flag=document.getElementById('ks-flag');
  if(!r.available){ flag.className='ks-flag cold'; flag.textContent='知识库不可用'; return; }
  if(r.is_cold){ flag.className='ks-flag cold'; flag.textContent='❄ 偏冷，建议播种'; }
  else { flag.className='ks-flag warm'; flag.textContent='✓ 已有知识'; }
}

function renderPacks(packs){
  document.getElementById('ks-packs').innerHTML=(packs||[]).map(function(p){
    return '<div class="ks-pack"><h3>'+esc(p.name)+'</h3>'
      +'<div class="d">'+esc(p.desc)+'</div>'
      +'<div class="c">'+p.count+' 条起步话术</div>'
      +'<button onclick="seed(\''+p.id+'\',this)">一键播种</button>'
      +'<div class="ks-msg" id="ks-msg-'+p.id+'"></div></div>';
  }).join('');
}

function seed(domain, btn){
  var msg=document.getElementById('ks-msg-'+domain);
  btn.disabled=true; msg.className='ks-msg'; msg.textContent='播种中…';
  fetch('/api/kb/seed-pack',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({domain:domain})}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){ btn.disabled=false; msg.className='ks-msg err'; msg.textContent=d.detail||'播种失败'; return; }
    msg.className='ks-msg ok';
    msg.textContent='新增 '+d.added+' 条'+(d.skipped?'，跳过 '+d.skipped+' 条已存在':'');
    btn.textContent='再次播种';
    btn.disabled=false;
    if(d.readiness) renderStatus(d.readiness);
  }).catch(function(){ btn.disabled=false; msg.className='ks-msg err'; msg.textContent='网络错误'; });
}

function load(){
  fetch('/api/kb/cold-start').then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok) return;
    renderStatus(d.readiness||{});
    renderPacks(d.packs||[]);
  }).catch(function(){});
}
load();
</script>
{% endblock %}
