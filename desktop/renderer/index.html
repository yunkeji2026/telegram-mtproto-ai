<!DOCTYPE html>
<html lang="zh" data-cp-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-src 'self' http://127.0.0.1:* http://localhost:*;" />
  <link rel="icon" href="brand/boundless-mark-256.png" type="image/png">
  <title>智聊 · 桌面工作台</title>
  <link rel="stylesheet" href="shared/copilot/tokens.css" />
  <link rel="stylesheet" href="shared/copilot/theme-dark.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <nav id="rail"></nav>
    <main id="stage">
      <div id="webviews"></div>
    </main>
    <aside id="copilot">
      <div class="cp-sidebar-resize" id="cp-sidebar-resize" title="拖动调节宽度（双击恢复默认）"></div>
      <div class="cp-head">
        <span id="cp-title">业务助手</span>
        <span id="cp-open-inbox" title="在统一收件箱打开该会话" hidden>📥</span>
        <span id="cp-accounts-toggle" title="账号管理（多账号扫码登录）">👥</span>
        <span id="cp-health-toggle" title="自动化健康：全账号注入命中 + 受控出站队列概览">🩺</span>
        <span id="cp-mode-toggle" title="切换统一 App（实验，与网页同源同款）">🧪</span>
        <span id="cp-toggle" title="折叠/展开">⟩</span>
      </div>
      <div id="cp-accounts-panel" hidden>
        <cp-accounts id="cp-accounts"></cp-accounts>
      </div>
      <div id="cp-health-panel" hidden></div>
      <div class="cp-tabs" id="cp-tabs" hidden>
        <button class="cp-tab active" data-tab="reply">回复台<span class="cp-tab-badge" id="cp-tab-badge-reply"></span></button>
        <button class="cp-tab" data-tab="customer">客户&关系<span class="cp-tab-badge" id="cp-tab-badge-customer"></span></button>
        <button class="cp-tab" data-tab="tools">工具箱<span class="cp-tab-badge" id="cp-tab-badge-tools"></span></button>
      </div>
      <div class="cp-body">
        <div class="cp-empty" id="cp-empty">打开一个会话即可显示智能草拟、AI 分析、知识库与客户档案</div>

        <!-- 可折叠卡片（与网页 unified_inbox 同款：卡头图标+标题+状态 pill+chevron，
             折叠态 localStorage 记忆、展开懒取数；核心逻辑复用 sidebar-chrome.createCardController）。 -->
        <section class="cp-sec cp-card" id="cp-draft-sec" data-tab="reply" data-cp-card="draft" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="draft">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="spark"></span>AI 回复</span>
            <span class="cp-card-pill" id="cpp-draft"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd">
            <div id="cp-auto-bar">
              <label id="cp-auto-switch" title="开启后：当前会话收到客户消息会自动生成并发送回复（低风险才自动发，命中风控转人工）">
                <input type="checkbox" id="cp-auto-toggle" />
                <span class="cp-auto-label">全自动托管</span>
              </label>
              <span id="cp-auto-status" class="cp-auto-status">已关闭</span>
            </div>
            <cp-draft id="cp-draft" persona contrast pin></cp-draft>
          </div>
        </section>

        <section class="cp-sec cp-card" id="cp-voice-sec" data-tab="reply" data-cp-card="voice" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="voice">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="mic"></span>语音克隆 / 发送</span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd">
            <cp-voice id="cp-voice"></cp-voice>
            <p class="cp-voice-note">与 📥 统一收件箱同源 API；完整横向工具栏请用统一收件箱标签。</p>
          </div>
        </section>

        <section class="cp-sec cp-card" id="cp-script-sec" data-tab="reply" data-cp-card="script" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="script">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="film"></span>剧本话题</span>
            <span class="cp-card-pill" id="cpp-script"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><cp-script id="cp-script"></cp-script></div>
        </section>

        <section class="cp-sec cp-card" id="cp-kb-sec" data-tab="reply" data-cp-card="kb" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="kb">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="book"></span>知识库</span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd">
            <div class="cp-search">
              <input id="cp-kb-input" type="text" placeholder="搜索话术/知识条目…" />
              <button id="cp-kb-btn">搜</button>
            </div>
            <div id="cp-kb" class="cp-list"></div>
          </div>
        </section>

        <section class="cp-sec cp-card" id="cp-tpl-sec" data-tab="reply" data-cp-card="tpl" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="tpl">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="zap"></span>快捷回复</span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><div id="cp-tpl" class="cp-list"></div></div>
        </section>

        <section class="cp-sec cp-card" id="cp-relstage-sec" data-tab="customer" data-cp-card="relstage" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="relstage">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="heart"></span>关系阶段</span>
            <span class="cp-card-pill" id="cpp-relstage"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><cp-rel-stage id="cp-relstage"></cp-rel-stage></div>
        </section>

        <section class="cp-sec cp-card" id="cp-collab-sec" data-tab="customer" data-cp-card="collab" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="collab">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="users"></span>协作上下文</span>
            <span class="cp-card-pill" id="cpp-collab"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><cp-collab id="cp-collab"></cp-collab></div>
        </section>

        <section class="cp-sec cp-card" id="cp-profile-sec" data-tab="customer" data-cp-card="profile" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="profile">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="user"></span>客户档案</span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><div id="cp-profile" class="cp-box"></div></div>
        </section>

        <section class="cp-sec cp-card" id="cp-nba-sec" data-tab="tools" data-cp-card="nba" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="nba">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="zap"></span>下一步建议</span>
            <span class="cp-card-pill" id="cpp-nba"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><cp-next-actions id="cp-nba"></cp-next-actions></div>
        </section>

        <section class="cp-sec cp-card" id="cp-chain-sec" data-tab="tools" data-cp-card="chain" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="chain">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="link"></span>工作链执行</span>
            <span class="cp-card-pill" id="cpp-chain"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd"><cp-chain-exec id="cp-chain"></cp-chain-exec></div>
        </section>

        <section class="cp-sec cp-card" id="cp-analyze-sec" data-tab="tools" data-cp-card="analysis" hidden>
          <button type="button" class="cp-card-hd" data-cp-toggle="analysis">
            <span class="cp-card-ttl"><span class="cp-card-ic" data-cp-ic="brain"></span>AI 对话分析</span>
            <span class="cp-card-pill" id="cpp-analysis"></span>
            <span class="cp-card-chev" aria-hidden="true"></span>
          </button>
          <div class="cp-card-bd">
            <button id="cp-analyze-btn" class="cp-btn-primary">分析当前对话</button>
            <div id="cp-analyze" class="cp-box" hidden></div>
            <div id="cp-analyze-replies" class="cp-list"></div>
          </div>
        </section>
      </div>
      <!-- 灰度:统一前端 App(与网页同源同款,iframe 加载 /copilot/app.html)。默认隐藏。 -->
      <div id="cp-appframe-wrap" hidden>
        <iframe id="cp-appframe" title="统一业务面板" referrerpolicy="no-referrer"></iframe>
      </div>
    </aside>
  </div>
  <!-- Copilot 组件 i18n（须在组件前加载，否则组件取不到 CopilotShared.t 会显示原始 key）。
       桌面壳为中文/深色专属：无 CP_LANG/?lang= 时按 <html lang="zh"> 回退中文，保持原行为。 -->
  <!-- 平台原生图标库(与网页端同一份，桌面壳本地副本)：window.platformIconSVG -->
  <script src="platform-icons.js"></script>
  <script src="shared/copilot/i18n/cp-i18n.js"></script>
  <script src="shared/copilot/client/copilot-client.js"></script>
  <script src="shared/copilot/sidebar-chrome.js"></script>
  <script src="shared/copilot/components/cp-panel-base.js"></script>
  <script src="shared/copilot/components/cp-draft.js"></script>
  <script src="shared/copilot/components/cp-rel-stage.js"></script>
  <script src="shared/copilot/components/cp-next-actions.js"></script>
  <script src="shared/copilot/components/cp-script.js"></script>
  <script src="shared/copilot/components/cp-collab.js"></script>
  <script src="shared/copilot/components/cp-chain-exec.js"></script>
  <script src="shared/copilot/components/cp-accounts.js"></script>
  <script src="shared/copilot/components/cp-voice.js"></script>
  <script src="../webview-ua.js"></script>
  <script src="inject-status.js"></script>
  <script src="account-utils.js"></script>
  <script src="renderer.js"></script>
  <script src="first-run.js"></script>
  <script src="health-panel.js"></script>
</body>
</html>
