name: tests

on:
  push:
    # feat-* 也触发：避免长命名分支攒一堆 Linux-only 问题，直到开 PR 才暴露。
    branches: [main, 'feat-*']
  pull_request:
    branches: [main]

# 同一分支新推送时取消进行中的旧跑，省 runner、加快反馈。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # 两版本互不熔断：一个挂也要看另一个结果，便于定位是否版本特异问题。
      fail-fast: false
      matrix:
        # 3.12 = CI 主支持档；3.13 = 开发机实跑档（防本地能跑/CI 挂的漂移）。
        # 矩阵会产出两个检查上下文：`regression (3.12)` / `regression (3.13)`，
        # 二者均已设为分支保护必需检查。
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Validate dependency graph (pip check)
        # 校验已装依赖之间版本兼容、无缺失子依赖（与 --collect-only 互补）。
        run: pip check

      - name: Collect tests (fast fail on import errors)
        # pytest.ini 当前 0 ignore（全量纳入）；本步只做 collect，import 期错误会快速失败
        run: python -m pytest tests/ --collect-only -q

      - name: Run regression (parallel, file-level isolation)
        # -n auto 让 xdist 按文件分 worker 并行；当前规模 ~6500 tests，CI(ubuntu) ~4min、本地 ~4min
        run: python -m pytest tests/ -n auto -q --tb=line

  lint:
    # 与 regression 并行的快速门禁：跑 .pre-commit-config.yaml 中「只检查、不改写」的
    # 钩子，拦住坏 YAML / 残留合并标记 / 误留 pdb/breakpoint / 无法编译的 .py 进 main。
    # 刻意不跑 trailing-whitespace / end-of-file-fixer（会改写文件，且存量违规多，
    # 应作为独立清理 PR，不在门禁里）。
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Run check-only hooks (yaml / merge-conflict / debug-statements)
        run: |
          pre-commit run check-yaml --all-files
          pre-commit run check-merge-conflict --all-files
          pre-commit run debug-statements --all-files
