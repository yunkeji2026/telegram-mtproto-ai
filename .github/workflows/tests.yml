name: contacts-handoff-regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Collect targeted tests (fast fail on import errors)
        run: |
          python -m pytest \
            tests/test_contacts_*.py \
            tests/test_gateway_*.py \
            tests/test_account_limiter.py \
            tests/test_handoff_readiness.py \
            tests/test_intimacy_engine.py \
            tests/test_reactivation_scheduler.py \
            tests/test_handoff_*.py \
            tests/test_cap_alert.py \
            tests/test_rpa_contact_hooks_wireup.py \
            --collect-only -q

      - name: Run targeted regression
        run: |
          python -m pytest \
            tests/test_contacts_*.py \
            tests/test_gateway_*.py \
            tests/test_account_limiter.py \
            tests/test_handoff_readiness.py \
            tests/test_intimacy_engine.py \
            tests/test_reactivation_scheduler.py \
            tests/test_handoff_*.py \
            tests/test_cap_alert.py \
            tests/test_rpa_contact_hooks_wireup.py \
            -q --tb=line -p no:warnings
