name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Collect tests (fast fail on import errors)
        # pytest.ini 里已 --ignore 掉 14 个预存不稳定文件（污染型 7 + 失败型 7）
        run: python -m pytest tests/ --collect-only -q

      - name: Run regression (parallel, file-level isolation)
        # -n auto 让 xdist 按文件分 worker 并行，本地实测 ~9s 跑完 912 tests
        run: python -m pytest tests/ -n auto -q --tb=line
