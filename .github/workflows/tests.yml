name: tests

on:
  push:
    # feat-* 也触发：避免长命名分支攒一堆 Linux-only 问题，直到开 PR 才暴露。
    branches: [main, 'feat-*']
  pull_request:
    branches: [main]

# 同一分支新推送时取消进行中的旧跑，省 runner、加快反馈。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt

      - name: Install CI deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Validate dependency graph (pip check)
        # 校验已装依赖之间版本兼容、无缺失子依赖（与 --collect-only 互补）。
        run: pip check

      - name: Collect tests (fast fail on import errors)
        # pytest.ini 里已 --ignore 掉 14 个预存不稳定文件（污染型 7 + 失败型 7）
        run: python -m pytest tests/ --collect-only -q

      - name: Run regression (parallel, file-level isolation)
        # -n auto 让 xdist 按文件分 worker 并行；当前规模 ~6500 tests，CI(ubuntu) ~4min、本地 ~4min
        run: python -m pytest tests/ -n auto -q --tb=line
