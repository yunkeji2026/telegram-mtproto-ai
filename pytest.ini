[pytest]
testpaths = tests
asyncio_mode = strict

# 暂时 ignore 的测试文件 — 存在污染或尚未修复的预存问题。
# 本地 `pytest tests/` 和 CI 都跳这些，但单跑 `pytest tests/test_xxx.py` 仍可定位排查。
# 每修好一个就从此处删一行，让 coverage 渐进扩大。
# 分类见文档 docs/PROJECT_SCOPE.md 和 memory reference_broken_tests_scope.md。
addopts =
    -p no:warnings
    --tb=short
    --ignore=tests/test_web_alert.py
    --ignore=tests/test_web_api.py
    --ignore=tests/test_web_auth.py
    --ignore=tests/test_web_diff_rollback.py
    --ignore=tests/test_web_episodic_memory_api.py
    --ignore=tests/test_web_templates.py
    --ignore=tests/test_web_users.py
    --ignore=tests/test_channel_metrics_intent.py
    --ignore=tests/test_episodic_backfill.py
    --ignore=tests/test_hooks.py
    --ignore=tests/test_kb_direct_render.py
    --ignore=tests/test_p8_modules.py
    --ignore=tests/test_persona_api.py
    --ignore=tests/test_process_message_kb_skip.py
